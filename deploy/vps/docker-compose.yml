services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

  backend:
    build:
      context: ../..
      dockerfile: deploy/vps/Dockerfile.backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PORT: 3000
    volumes:
      - app_storage:/app/storage
      - app_sqlite:/app/server-data
    expose:
      - "3000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dandpak}
      POSTGRES_USER: ${POSTGRES_USER:-dandpak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/vps/.env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - db_backups:/backups
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    expose:
      - "6379"

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  app_storage:
  app_sqlite:
  db_backups:
