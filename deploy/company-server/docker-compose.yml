services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

  app:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      NODE_ENV: production
    volumes:
      # SQLite database — dữ liệu bền vững, không mất khi update
      - app_sqlite:/app/server-data
      # File uploads và tài liệu
      - app_storage:/app/storage
      # Permanent JSON archive (thanh toán, đơn hàng...)
      - app_permanent:/app/server/permanent-storage
      # Bản cài auto-update (exe/apk + manifest) — bền vững qua mỗi lần redeploy
      - app_releases:/app/server/releases
      # Uploads runtime (ảnh món, avatar, tài liệu DMS) — TRƯỚC ĐÂY nằm trong
      # container nên mỗi lần rebuild là MẤT; giờ bền vững qua volume.
      - app_uploads:/app/server/uploads
      # Ảnh SKU KiotViet (521MB, gitignore nên không nằm trong image) — seed
      # một lần bằng: docker compose cp <thư-mục-ảnh>/. app:/app/server/assets/product-images/
      - app_product_images:/app/server/assets/product-images
    # Mở 3000 trực tiếp bên cạnh Caddy:80 — app POS/tablet nhập IP trần sẽ tự
    # nối cổng 3000 (mặc định của máy chủ LAN) nên phải cho vào được.
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  caddy_data:
  caddy_config:
  app_sqlite:
  app_storage:
  app_permanent:
  app_releases:
  app_uploads:
  app_product_images:
