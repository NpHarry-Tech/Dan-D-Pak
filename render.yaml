services:
  - type: web
    name: dan-d-pak
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node server/index.js
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SQLITE_PATH
        value: /data/store.db
      - key: NODE_ENV
        value: production
      - key: DEPLOYMENT_TARGET
        value: render
      - key: PORT
        value: 10000
      - key: DISABLE_DEMO_SEED
        value: false
