<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Retail POS</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/runtime-config.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
.rtwrap{display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,380px);gap:12px;height:calc(100vh - 120px)}
@media(max-width:980px){.rtwrap{grid-template-columns:1fr;height:auto}}
.rtleft{display:flex;flex-direction:column;min-height:0;min-width:0;order:1}
.scanbox{display:grid;grid-template-columns:minmax(200px,460px) auto auto max-content;gap:8px;margin-bottom:10px;align-items:center;justify-content:start}
.scanbox input{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:12px 15px;font-family:var(--mono);font-size:15px}
.scanbox input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-dim)}
.camerascan-btn{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;color:var(--text);padding:12px 15px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;height:100%}
.camerascan-btn:hover{border-color:var(--brand);color:var(--brand)}
.rtmain{display:flex;flex-direction:column;flex:1;min-height:0}
.stocktoggle{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--text);padding:10px 12px;border:1px solid var(--border2);border-radius:10px;cursor:pointer;background:var(--surface);white-space:nowrap}
.stocktoggle:hover{border-color:var(--brand);color:var(--brand)}
.catside{display:none}
.catside .stocktoggle{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text);padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;background:var(--surface2)}
.catlist{display:flex;flex-direction:column;overflow-y:auto;padding:6px}
.catpill{text-align:left;width:100%;padding:10px 12px;border-radius:8px;background:transparent;border:none;color:var(--text);font-weight:600;font-size:12.5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;justify-content:space-between;gap:8px;align-items:center}
.catpill:hover{background:var(--surface2)}
.catpill.on{background:var(--brand-dim);color:var(--brand);font-weight:800}
.catpill .cc{font-family:var(--mono);font-size:10.5px;color:var(--faint);font-weight:600}
.catpill.on .cc{color:var(--brand)}
.gridwrap{display:flex;flex-direction:column;min-height:0;flex:1}
.rtcount{font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:8px}
/* POS product tile — touch friendly */
.rtgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(154px,1fr));gap:10px;overflow-y:auto;align-content:start;padding:0 4px 4px 0;flex:1;min-height:0}
.rtitem{background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:.12s;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(20,33,47,.04);min-height:206px}
.rtitem:hover{border-color:var(--brand);box-shadow:0 6px 18px rgba(8,145,178,.14)}
.rtitem:active{transform:scale(.97)}
.rtitem .photo,.rtitem .em{height:122px;width:100%;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);flex:0 0 auto}
.rtitem .photo img{width:100%;height:100%;object-fit:contain;display:block;padding:7px}
.rtitem .photo.no-photo,.rtitem .em{font-size:36px;background:linear-gradient(180deg,#fff,var(--surface2));color:var(--faint)}
.rtitem .photo.no-photo span{opacity:.7}
.rtitem .body{padding:8px 10px 10px;display:flex;flex-direction:column;gap:2px;flex:1;background:var(--surface)}
.rtitem .nm{font-weight:750;font-size:12px;line-height:1.26;color:var(--text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:31px}
.rtitem .pr{font-family:var(--mono);color:var(--brand);font-size:14px;font-weight:800;margin-top:auto}
.rtitem .stk{font-size:10.5px;color:var(--muted);font-weight:600}
.rtitem.low .stk{color:var(--doing)}
.rtitem.out{cursor:not-allowed}
.rtitem.out .photo,.rtitem.out .em{filter:grayscale(1) opacity(.5)}
.rtitem.out .nm,.rtitem.out .pr{opacity:.55}
.rtitem .oosbadge{position:absolute;top:8px;left:8px;background:var(--late);color:#fff;font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;letter-spacing:.3px}
.rtitem .gift{display:inline-flex;margin-left:4px}
.rtitem .promo{position:absolute;top:8px;right:8px;z-index:3;color:#fff;background:var(--doing);border-radius:999px;padding:3px 9px;font-size:10px;font-weight:800;cursor:pointer;border:1px solid rgba(255,255,255,.5);box-shadow:0 2px 7px rgba(20,33,47,.14);max-width:calc(100% - 16px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rtitem .promo:hover{filter:brightness(1.08);transform:scale(1.04)}
.custline{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin:4px 0 10px;font-size:13px}
.custlist{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-top:4px}
.custrow{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--border);border-radius:10px;padding:9px 11px;cursor:pointer;background:var(--surface)}
.custrow:hover{border-color:var(--brand)}.custrow.on{border-color:var(--brand);background:var(--brand-dim)}
.custrow .mini{color:var(--muted);font-size:11px;margin-top:2px}
.ptag{display:inline-block;margin-left:7px;background:var(--done-bg);color:var(--done);border-radius:999px;padding:1px 8px;font-size:10px;font-weight:800}
.rtitem .bc{display:none}
.rtitem.noimg .photo img{display:none}
.rtitem.noimg .photo::after{content:"📦";font-size:38px;opacity:.5}
.cartpane{background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;min-height:0;overflow:hidden;order:2}
.rtwrap > .cartpane + .rtleft + .cartpane{display:none}
.cartpane .bh{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;font-weight:700}
.cartitems{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;min-height:120px}
.cart-empty{margin:auto;min-height:240px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--faint);gap:12px;padding:24px 16px}
.cart-empty img{width:min(210px,68%);max-height:86px;object-fit:contain;opacity:.9}
.cart-empty .hint-pill{border:1px dashed var(--border2);background:var(--surface2);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:750;color:var(--muted)}
.cart-empty small{font-size:11px;line-height:1.45;color:var(--faint)}
.cline{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.cline .r1{display:flex;justify-content:space-between;gap:8px;font-weight:600;font-size:12.5px}
.cline .r1 .name{min-width:0;line-height:1.25}.cline .r1 .p{font-family:var(--mono);color:var(--brand);white-space:nowrap}
.lotrow{margin-top:7px;display:flex;align-items:center;gap:7px}
.lotrow select,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:8px 10px;font-size:12px}
.lotrow select:focus,.modal select:focus{outline:none;border-color:var(--brand)}
.lotrow .tag{font-size:10.5px;color:var(--faint);white-space:nowrap}
.promohint{margin-top:6px;color:var(--doing);font-size:11px;font-weight:700}
.cline .r2{display:flex;align-items:center;gap:8px;margin-top:8px}
.qbtn{width:24px;height:24px;border-radius:7px;background:var(--surface3);color:var(--text);font-weight:700;font-size:13px}
.qbtn:hover{background:var(--brand);color:#fff}
.cline .qty{font-family:var(--mono);font-weight:700;min-width:18px;text-align:center}
.cline .rm{margin-left:auto;color:var(--faint);background:none;font-size:15px}.cline .rm:hover{color:var(--late)}
.cartfoot{border-top:1px solid var(--border);padding:13px 16px}
.brow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);padding:2px 0;gap:10px}
.brow span:last-child{font-family:var(--mono);white-space:nowrap}
.brow.good span:last-child{color:var(--done)}.brow.warn span:last-child{color:var(--doing)}
.brow.tt{font-size:17px;font-weight:800;color:var(--text);padding-top:7px}
.brow.tt span:last-child{color:var(--brand)}
.shift-report{max-height:260px;overflow:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface2);padding:8px}
.payline{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin-bottom:7px;font-size:12.5px}
.payline b{font-family:var(--mono);margin-left:auto}.payline .x{color:var(--faint);background:none;font-size:14px}.payline .x:hover{color:var(--late)}
.payadd{display:grid;grid-template-columns:1fr 130px auto;gap:8px;align-items:end}
@media(max-width:520px){.payadd{grid-template-columns:1fr}.viewhead .right{margin-left:0}.rtwrap{height:auto}}
.remain{display:flex;justify-content:space-between;font-weight:800;font-size:14px;padding:10px 2px}
.remain span:last-child{font-family:var(--mono)}.remain.ok span:last-child{color:var(--done)}.remain.no span:last-child{color:var(--doing)}
.receipt{background:#fdfdf8;color:#1a1a1a;font-family:var(--mono);font-size:12px;border-radius:6px;padding:18px 16px;max-width:340px;margin:0 auto;box-shadow:0 8px 30px rgba(20,33,47,.18)}
.receipt .c{text-align:center}.receipt h4{font-size:14px}
.receipt hr{border:none;border-top:1px dashed #999;margin:8px 0}
.receipt .li{display:flex;justify-content:space-between;gap:8px;padding:1.5px 0}
.receipt .tt{font-weight:700;font-size:13.5px}
.receipt .qr{width:74px;height:74px;margin:8px auto 2px;display:flex;align-items:center;justify-content:center;background:#fff}
.receipt .qr img{width:100%;height:100%;object-fit:contain;display:block}
.receipt.template,.receipt.rc-flow{padding:10px;overflow:visible}
.rc-flow .rc-text{white-space:pre-wrap;line-height:1.22;margin:1px 0}
.rc-flow .rc-line{border-top:1px dashed #777;margin:5px 0}
.rc-flow .rc-img{margin:2px 0 4px}.rc-flow .rc-img img{display:inline-block;max-width:100%}
.rc-flow .rc-qr{display:flex;flex-direction:column;align-items:center;margin:6px 0}
.rc-flow .rc-qr .qr{width:min(100%,150px);height:auto;aspect-ratio:1;margin:0}
.rc-items{width:100%;border-collapse:collapse;font-size:11.5px;margin:2px 0}
.rc-items td{vertical-align:top;padding:0}
.rc-items thead td{font-weight:700;border-bottom:1px dashed #777;padding-bottom:2px}
.rc-items thead .rc-qty{text-align:center}.rc-items thead .rc-amt{text-align:right}
.rc-items .rc-nm{text-align:left;word-break:break-word}
.rc-items .rc-nrow td{padding-top:3px}.rc-items .rc-frow td{padding-bottom:3px}
.rc-items .rc-pr{text-align:left;white-space:nowrap}
.rc-items .rc-qty{width:30px;text-align:center;white-space:nowrap}
.rc-items .rc-amt{width:84px;text-align:right;white-space:nowrap}
.rc-items .rc-grp td{font-weight:700;padding-top:4px}.rc-items .rc-mod{font-size:10px;color:#555;padding-left:6px}
.receipt-printbar{display:grid;grid-template-columns:auto 78px 1fr;gap:8px;align-items:center;width:100%;margin-right:auto;font-size:12px;color:var(--muted)}
.receipt-printbar input{height:32px;text-align:center;font-weight:800}
.receipt-printbar .btn{height:32px}
.salerow,.voucherrow{display:flex;align-items:center;gap:8px;font-size:12px;padding:8px 2px;border-bottom:1px dashed var(--border)}
.salerow:last-child,.voucherrow:last-child{border:none}.salerow b,.voucherrow b{font-family:var(--mono)}
.voucherrow{align-items:flex-start}.voucherrow .meta{color:var(--muted);font-size:11px;line-height:1.45}
.formgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.formgrid .full{grid-column:1/-1}
@media(max-width:620px){.formgrid{grid-template-columns:1fr}}
.sw{width:38px;height:21px;border-radius:99px;background:var(--surface3);border:1px solid var(--border2);position:relative;flex:0 0 auto;cursor:pointer}
.sw::after{content:"";position:absolute;width:15px;height:15px;border-radius:50%;background:var(--muted);left:3px;top:2px;transition:.15s}
.sw.on{background:var(--done-bg);border-color:rgba(63,224,143,.45)}.sw.on::after{left:18px;background:var(--done)}
/* Promo picker UI */
.promo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin:14px 0}
.promo-card{border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.15s;background:var(--surface2);position:relative;display:flex;flex-direction:column;gap:6px}
.promo-card:hover{border-color:var(--brand);box-shadow:0 4px 16px rgba(8,145,178,.14)}
.promo-card.active{border-color:var(--done);background:var(--done-bg)}
.promo-card.active::after{content:"✓";position:absolute;top:10px;right:12px;color:var(--done);font-weight:900;font-size:16px}
.promo-card .pc-icon{font-size:26px;line-height:1}
.promo-card .pc-name{font-weight:800;font-size:14px;color:var(--text)}
.promo-card .pc-desc{font-size:12px;color:var(--muted);line-height:1.45}
.promo-card .pc-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(52,210,238,.12);color:var(--brand);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;margin-top:2px;width:fit-content}
.promo-card.active .pc-tag{background:var(--done-bg);color:var(--done)}
/* Tab bar UI similar to KiotViet */
.tab-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px 12px;
  margin: 0 0 16px;
  max-width: 100%;
  overflow-x: auto;
  scrollbar-width: none; /* Hide scrollbar Firefox */
}
.tab-bar::-webkit-scrollbar {
  display: none; /* Hide scrollbar Webkit */
}
.tab-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  background: var(--surface);
  border: 1px solid var(--border2);
  transition: all 0.15s ease;
  user-select: none;
}
.tab-item:hover {
  background: var(--surface3);
  color: var(--text);
  border-color: var(--border);
}
.tab-item.active {
  background: var(--brand);
  color: #fff;
  font-weight: 800;
  border-color: var(--brand);
  box-shadow: 0 4px 12px var(--brand-dim);
}
.tab-item .close-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  font-size: 10px;
  color: inherit;
  opacity: 0.6;
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all 0.12s;
  padding: 0;
  line-height: 1;
}
.tab-item .close-tab:hover {
  opacity: 1;
  background: rgba(20,33,47,.08);
}
.tab-item.active .close-tab:hover {
  background: rgba(255,255,255,0.25);
}
.add-tab-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: var(--surface3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.add-tab-btn:hover {
  border-color: var(--brand);
  color: var(--brand);
  background: var(--surface2);
}
/* Sync Pay Modal Styles from POS */
.pay-helper {
  margin-top: 10px;
  border: 1px dashed var(--border2);
  background: var(--surface2);
  border-radius: 12px;
  padding: 10px;
}
.pay-qr {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 18px;
  align-items: start;
}
.pay-qr img {
  width: 220px;
  height: 220px;
  object-fit: contain;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px;
}
.pay-qr-info { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
.pay-qr-prov { font-weight: 800; font-size: 13px; color: var(--brand); display: flex; align-items: center; gap: 6px; }
.pay-bankrow { display: flex; justify-content: space-between; gap: 12px; font-size: 12.5px; border-bottom: 1px dashed var(--border); padding-bottom: 5px; }
.pay-bankrow span { color: var(--muted); white-space: nowrap; }
.pay-bankrow b { text-align: right; word-break: break-all; }
.pay-bankrow b.amt { color: var(--brand); font-size: 15px; }
.pay-ref {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  word-break: break-all;
}
.pay-modal {
  max-width: 640px !important;
}
.pay-summary {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 13px;
  margin: 12px 0;
  color: var(--muted);
}
.pay-summary b {
  font-family: var(--mono);
  font-size: 18px;
  color: var(--brand);
}
.pay-grid {
  display: grid;
  grid-template-columns: 1.05fr .95fr;
  gap: 12px;
  align-items: start;
}
.pay-methods {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}
.pay-methods .opt {
  min-height: 46px;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 7px;
  white-space: normal;
  text-align: left;
  line-height: 1.25;
  padding: 9px 10px;
}
.pay-fields {
  display: grid;
  gap: 8px;
}
.pay-actions {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  align-items: center;
}
.pay-lines {
  min-height: 74px;
  max-height: 158px;
  overflow: auto;
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 8px;
  background: var(--surface2);
}
.pay-modal .mfoot {
  position: sticky;
  bottom: -20px;
  background: var(--surface);
  padding-top: 12px;
}
@media (max-width: 720px) {
  .pay-grid {
    grid-template-columns: 1fr;
  }
  .pay-qr {
    grid-template-columns: 1fr;
  }
  .pay-qr img {
    margin: auto;
  }
  .pay-methods {
    grid-template-columns: 1fr;
  }
}
/* Layout optimizations to prevent vertical cut off */
.view {
  display: flex !important;
  flex-direction: column !important;
  overflow: hidden !important;
}
.rtwrap {
  flex: 1;
  min-height: 0;
  height: auto !important;
}
@media(max-width:1180px), (max-height:820px){
  .view{padding:9px 10px!important}
  .viewhead{margin-bottom:8px}
  .viewhead .sub{max-width:430px}
  .tab-bar{margin-bottom:8px;padding:5px 7px;border-radius:10px;gap:6px}
  .tab-item{padding:6px 10px;font-size:12px;gap:7px;max-width:170px}
  .tab-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .add-tab-btn{width:30px;height:30px;flex:0 0 30px}
  .rtwrap{grid-template-columns:minmax(0,1fr) minmax(300px,34vw);gap:10px}
  .scanbox{grid-template-columns:minmax(120px,1fr) auto 64px auto;gap:7px;margin-bottom:8px}
  .scanbox input{height:38px;padding:8px 11px;font-size:12.5px}
  .camerascan-btn{height:38px;padding:7px 10px;font-size:12.5px;border-radius:9px}
  .stocktoggle{min-height:38px;padding:7px 9px;font-size:11px;border-radius:9px}
  .sw{width:31px;height:18px}.sw::after{width:12px;height:12px}.sw.on::after{left:15px}
  .rtcount{font-size:10.5px;margin-bottom:5px}
  .rtgrid{grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:8px;padding-right:2px}
  .rtitem{min-height:172px;border-radius:10px}
  .rtitem .photo,.rtitem .em{height:94px}
  .rtitem .photo img{padding:5px}
  .rtitem .photo.no-photo,.rtitem .em{font-size:30px}
  .rtitem .body{padding:7px 8px 8px;gap:2px}
  .rtitem .nm{font-size:11px;line-height:1.22;min-height:27px;-webkit-line-clamp:2}
  .rtitem .pr{font-size:12px}
  .rtitem .stk{font-size:9.5px}

<script type="module">
import { api, connect, money, toast, esc, startClock, topbar, requireModuleAccess, renderUserChip, getUser, pollPayosPaid, openCameraScanner } from '/shared/client.js';
import { mountShift } from '/shared/shift.js';
import { mountOrderHistory } from '/shared/orderHistory.js';
import { perkTag, perkAmount, openCustomerPicker, loadCustomers } from '/shared/customer.js';
import { createCompanyInvoiceDraft, companyInvoiceHtml, bindCompanyInvoiceBox, companyInvoicePayload, invoiceReceiptCustomerName, invoiceReceiptTaxCode } from '/shared/invoiceRequest.js';
import { danBillVars } from '/shared/danBill.js';
document.getElementById('top').innerHTML = topbar('retail', {
  title: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>Retail POS',
  sub: 'Quét mã vạch hoặc chạm sản phẩm · chọn lot/date trong giỏ · voucher retail',
  actions: `<span id="shiftMount"></span>
      <span id="histMount"></span>
      <button class="btn sm" id="custBtn">👤 Khách không xuất hóa đơn</button>
      <button class="btn sm" id="voucherBtn">🎁 Voucher</button>`,
});
await requireModuleAccess('retail'); renderUserChip();

let skus=[], lots=[], activeVouchers=[], allVouchers=[], cart=[], editingVoucher=null, operationsCfg=null, shiftCtl=null;
let selectedCustomer=null;
let tabs = [];
let activeTabId = 1;
let tabCounter = 1;

function saveStateToStorage() {
  const activeTab = tabs.find(t => t.id === activeTabId);
  if (activeTab) {
    activeTab.cart = cart;
    activeTab.selectedCustomer = selectedCustomer;
    activeTab.activePromo = activePromo;
  }
  const serializableTabs = tabs.map(t => ({
    id: t.id,
    name: t.name,
    cart: t.cart,
    selectedCustomer: t.selectedCustomer,
    activePromoKey: t.activePromo?.key || null
  }));
  try {
    localStorage.setItem('retail_tabs', JSON.stringify(serializableTabs));
    localStorage.setItem('retail_active_tab_id', activeTabId.toString());
    localStorage.setItem('retail_tab_counter', tabCounter.toString());
  } catch (e) {}
}

function renameTabs() {
  tabs.forEach((t, index) => {
    t.name = `Hóa đơn ${String(index + 1).padStart(2, '0')}`;
  });
  tabCounter = Math.max(tabs.length, ...tabs.map(t=>Number(t.id)||0));
  saveStateToStorage();
}

function loadStateFromStorage() {
  try {
    const storedTabs = localStorage.getItem('retail_tabs');
    const storedActiveTabId = localStorage.getItem('retail_active_tab_id');
    const storedTabCounter = localStorage.getItem('retail_tab_counter');
    if (storedTabs) {
      const parsedTabs = JSON.parse(storedTabs);
      if (Array.isArray(parsedTabs) && parsedTabs.length > 0) {
        const promos = buildPromoList();
        tabs = parsedTabs.map(t => ({
          id: t.id,
          name: t.name,
          cart: (t.cart || []).map(item => ({
            ...item,
            promoKey: item.promoKey !== undefined ? item.promoKey : 'buy5get1'
          })),
          selectedCustomer: t.selectedCustomer || null,
          activePromo: promos.find(p => p.key === t.activePromoKey) || null
        }));
        activeTabId = parseInt(storedActiveTabId) || tabs[0].id;
        tabCounter = parseInt(storedTabCounter) || tabs.length;
        const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0];
        cart = activeTab.cart || [];
        selectedCustomer = activeTab.selectedCustomer || null;
        activePromo = activeTab.activePromo || null;
        renameTabs();
        return;
      }
    }
  } catch (e) {}
  tabs = [
    { id: 1, name: 'Hóa đơn 01', cart: [], selectedCustomer: null, activePromo: null }
  ];
  activeTabId = 1;
  tabCounter = 1;
  cart = [];
  selectedCustomer = null;
  activePromo = null;
}

function renderTabs() {
  const container = document.getElementById('tabBar');
  if (!container) return;
  renameTabs();
  container.innerHTML = `
    ${tabs.map(t => {
      const isActive = t.id === activeTabId;
      const count = t.cart.length ? ` (${t.cart.reduce((s,c)=>s+c.qty, 0)})` : '';
      return `
        <div class="tab-item ${isActive ? 'active' : ''}" onclick="switchTab(${t.id})">
          <span>📄 ${esc(t.name)}${count}</span>
          <button class="close-tab" onclick="closeTab(${t.id}, event)">✕</button>
        </div>
      `;
    }).join('')}
    <button class="add-tab-btn" onclick="addTab()" title="Thêm hóa đơn mới">＋</button>
  `;
}

function switchTab(id) {
  const activeTab = tabs.find(t => t.id === activeTabId);
  if (activeTab) {
    activeTab.cart = cart;
    activeTab.selectedCustomer = selectedCustomer;
    activeTab.activePromo = activePromo;
  }
  activeTabId = id;
  const newTab = tabs.find(t => t.id === activeTabId);
  if (newTab) {
    cart = newTab.cart || [];
    selectedCustomer = newTab.selectedCustomer || null;
    activePromo = newTab.activePromo || null;
  }
  renderCustBtn();
  renderCart();
  renderGrid();
}

function addTab() {
  const newId = Math.max(0, ...tabs.map(t=>Number(t.id)||0)) + 1;
  tabCounter = newId;
  tabs.push({
    id: newId,
    name: '',
    cart: [],
    selectedCustomer: null,
    activePromo: null
  });
  renameTabs();
  switchTab(newId);
}

function closeTab(id, event) {
  if (event) event.stopPropagation();
  if (tabs.length === 1) {
    toast('Phải giữ lại ít nhất 1 hóa đơn', true);
    return;
  }
  const idx = tabs.findIndex(t => t.id === id);
  if (idx === -1) return;
  if (activeTabId === id) {
    const nextActiveTab = tabs[idx + 1] || tabs[idx - 1];
    switchTab(nextActiveTab.id);
  }
  tabs = tabs.filter(t => t.id !== id);
  renameTabs();
  renderTabs();
}

window.switchTab = switchTab;
window.addTab = addTab;
window.closeTab = closeTab;

const BUY_X=5; // mua 5 tặng 1 cùng loại

// Chương trình KM đang được chọn cho bill hiện tại (chỉ 1 lần / bill)
let activePromo = null;
// activePromo = { key: 'buy5get1' | 'voucher:<id>', label, icon, calcDiscount(cart) }

// Danh sách tất cả chương trình KM tĩnh + voucher động + ưu đãi khách hàng
function buildPromoList(){
  const list = [];
  // 1. Ưu đãi riêng của khách hàng (được tính là 1 CTKM riêng, không cộng dồn)
  const c = selectedCustomer;
  if(c && c.perk_type && c.perk_type !== 'none'){
    const perkDesc = c.perk_type==='free' ? 'Miễn phí 100% — khách ưu tiên đặc biệt'
      : c.perk_type==='pct' ? `Giảm ${c.perk_value}% toàn bộ đơn hàng`
      : `Giảm cố định ${money(c.perk_value)} mỗi đơn`;
    const perkTag = c.perk_type==='free' ? 'FREE 100%'
      : c.perk_type==='pct' ? `-${c.perk_value}%`
      : `-${money(c.perk_value)}`;
    list.push({
      key: 'customer_perk',
      icon: '👤',
      name: `Ưu đãi khách hàng — ${c.name}`,
      desc: perkDesc,
      tag: perkTag,
      calcDiscount: (cart) => {
        const sub = cart.reduce((s,c)=>s+c.sku.price*c.qty, 0);
        if(c.perk_type==='free') return sub;
        if(c.perk_type==='pct') return Math.min(sub, Math.floor(sub*(c.perk_value||0)/100));
        if(c.perk_type==='amount') return Math.min(sub, c.perk_value||0);
        return 0;
      },
    });
  }
  // 2. Voucher toàn bill đang active
  activeVouchers.filter(v=>v.scope==='order').forEach(v=>{
    list.push({
      key: 'voucher:'+v.id,
      icon: '🏷️',
      name: v.name,
      desc: `${v.type==='pct'?'Giảm '+v.value+'% cho toàn bill':'Giảm '+money(v.value)+' cho toàn bill'}${v.min_total?` · Đơn từ ${money(v.min_total)}`:''}`,
      tag: v.type==='pct' ? `-${v.value}%` : `-${money(v.value)}`,
      voucherId: v.id,
      calcDiscount: (cart) => {
        const sub = cart.reduce((s,c)=>s+c.sku.price*c.qty,0);
        if(sub < (v.min_total||0)) return 0;
        return v.type==='pct' ? Math.floor(sub*(v.value||0)/100) : Math.min(sub, v.value||0);
      },
    });
  });
  return list;
}
connect('retail', {
  'inventory:updated':()=>loadData(),
  'vouchers:updated':()=>loadData(),
  'customers:updated':()=>loadCustomers(),
  'shift:updated':()=>shiftCtl&&shiftCtl.reload(),
});
shiftCtl = await mountShift('#shiftMount');  // mở/kết ca — dùng chung 1 ca với POS
mountOrderHistory('#histMount', { allowRefund: true, onAfterChange: () => loadData() });  // lịch sử + in lại + đổi trả chung 1 chỗ

const scan=document.getElementById('scan');

function retailShiftRequired(){
  const cfg = operationsCfg || shiftCtl?.getState?.()?.config || {};
  return cfg.shifts?.requireOpenShift !== false;
}
function retailSalesLocked(){
  return retailShiftRequired() && !shiftCtl?.getState?.()?.shift;
}
async function ensureRetailShiftOpen(){
  operationsCfg = await api('/operations/config').catch(()=>operationsCfg);
  if(shiftCtl?.reload) await shiftCtl.reload();
  if(!retailSalesLocked()) return true;
  toast('Cần mở ca làm việc trước khi bán hàng.', true);
  shiftCtl?.openPanel?.();
  return false;
}

async function loadData(){
  operationsCfg=await api('/operations/config').catch(()=>operationsCfg);
  const [skuRows, lotRows, activeRows] = await Promise.all([
    api('/skus?channel=retail'),
    api('/warehouse/lots?item_type=sku'),
    api('/vouchers/active'),
  ]);
  skus=skuRows; lots=lotRows; activeVouchers=activeRows;
  try{ allVouchers=await api('/vouchers'); }catch{ allVouchers=activeVouchers; }
  loadStateFromStorage();
  reconcileCart();
  renderGrid();
  renderCart();
  renderTabs();
}
async function loadCustomersAndRefresh(){
  try{
    const list=await loadCustomers();
    if(selectedCustomer){
      const fresh=list.find(c=>c.id===selectedCustomer.id);
      if(fresh) selectedCustomer=fresh;
    }
    renderCustBtn();
  }catch{}
}
function renderCustBtn(){
  const b=document.getElementById('custBtn'); if(!b) return;
  b.textContent = `👤 ${customerDisplay(selectedCustomer)}`;
  b.classList.toggle('primary', !!selectedCustomer);
}

function reconcileCart(){
  cart=cart
    .map(c=>{
      const sku=skus.find(s=>s.id===c.sku.id);
      if(!sku) return null;
      const avail=availableFor({...c,sku});
      if(avail<=0) return null;
      return {...c,sku,qty:Math.min(c.qty,Math.max(1,Math.floor(avail)))};
    })
    .filter(Boolean);
}

let searchText='', inStockOnly=true;
const MAX_TILES=320;

function visibleSkus(){
  let list=skus;
  if(inStockOnly) list=list.filter(s=>s.stock>0);
  if(searchText){
    const q=searchText.toLowerCase();
    list=list.filter(s=>(s.name||'').toLowerCase().includes(q)||(s.barcode||'').includes(q));
  }
  return list;
}
function renderGrid(){
  const list=visibleSkus();
  const shown=list.slice(0,MAX_TILES);
  document.getElementById('rtcount').textContent=`${list.length} SP${list.length>MAX_TILES?` (hiện ${MAX_TILES})`:''}`;
  const grid=document.getElementById('grid');
  if(!list.length){ grid.innerHTML='<div class="empty" style="grid-column:1/-1;padding:50px">Không có sản phẩm phù hợp.<br>Thử bỏ lọc "Chỉ còn hàng" hoặc đổi từ khóa.</div>'; return; }
  grid.innerHTML=shown.map(s=>{
    const promo=bestSkuVoucher(s.id, s.price, 1);
    const out=s.stock<=0;
    const media=s.image
      ? `<div class="photo"><img src="${esc(s.image)}" alt="" loading="lazy" onerror="if(!this.dataset.fallback && '${esc(s.source_url||'')}'.startsWith('http')){this.dataset.fallback='1';this.src='${esc(s.source_url||'')}';}else{this.closest('.rtitem').classList.add('noimg');}"></div>`
      : `<div class="photo no-photo"><span>${s.emoji||'📦'}</span></div>`;
    const customPromo=activeVouchers.find(v=>v.scope==='sku' && v.sku_id===s.id && v.type==='buy_x_get_1');
    const x = customPromo ? customPromo.value : 5;
    const hasPromo=true; // tất cả SP đang chạy "mua 5 tặng 1 cùng loại" (hoặc theo voucher SKU buy_x_get_1)
    return `<div class="rtitem ${out?'out':''} ${(s.low&&!out)?'low':''}" data-id="${s.id}">
      ${out?'<span class="oosbadge">Hết hàng</span>':''}
      ${hasPromo?`<button class="promo" data-vbtn="${s.id}" title="Xem khuyến mãi">🎁 Mua ${x} tặng 1${promo?` · -${promoLabel(promo.voucher)}`:''}</button>`:''}
      ${media}
      <div class="body">
        <div class="nm">${esc(s.name)}</div>
        <div class="pr">${money(s.price)}</div>
        <div class="stk">Tồn: ${roundQty(s.stock)} ${esc(s.unit||'')}</div>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('[data-vbtn]').forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    const skuId = b.dataset.vbtn;
    const sku = skus.find(x=>x.id===skuId);
    if(sku){
      let idx = cart.findIndex(c=>c.sku.id===skuId);
      if(idx===-1){
        await addToCart(sku);
        idx = cart.findIndex(c=>c.sku.id===skuId);
      }
      if(idx!==-1){
        openProductPromoPicker(idx);
      }
    }
  });
  grid.querySelectorAll('.rtitem').forEach(el=>el.onclick=()=>{
    const s=skus.find(x=>x.id===el.dataset.id);
    if(s&&s.stock>0)addToCart(s); else toast('Hết hàng — vào Kho để nhập thêm',true);
  });
}
function openProductPromoPicker(idx) {
  const c = cart[idx];
  if (!c) return;
  
  const promos = [];
  const cartItemLot = c.lot_id ? lots.find(l => l.id === c.lot_id) : null;
  const cartItemLotNo = cartItemLot ? cartItemLot.lot_no : null;
  
  // 1. Mua X Tặng 1
  const customPromo = activeVouchers.find(v => 
    v.scope === 'sku' && 
    v.sku_id === c.sku.id && 
    v.type === 'buy_x_get_1' &&
    (!v.lot_no || v.lot_no === cartItemLotNo)
  );
  const x = customPromo ? customPromo.value : 5;
  promos.push({
    key: 'buy5get1',
    icon: '🎁',
    name: `Mua ${x} Tặng 1`,
    desc: `Mua đủ ${x} cái, cái thứ ${x+1} được tặng miễn phí.`,
    tag: `Mỗi ${x} cái tặng 1`,
    calcDiscount: () => buy5get1Amount(c.qty, c.sku.price, c.sku.id, c.lot_id)
  });
  
  // 2. SKU-level vouchers
  activeVouchers.filter(v =>

async function addToCart(s){
  if(!(await ensureRetailShiftOpen())) return;
  const lot=defaultLot(s);
  const line=cart.find(c=>c.sku.id===s.id);
  if(line){
    if(line.qty+1>availableFor(line)) return toast('Vượt tồn lot/kho',true);
    line.qty++;
  } else {
    if((lot?.qty_on_hand ?? s.stock)<=0) return toast('Hết hàng',true);
    cart.push({sku:s,qty:1,lot_id:lot?.id||null,promoKey:'buy5get1'});
  }
  renderCart();
}

function buy5get1Free(qty, skuId, lotId = null){
  const cartItemLot = lotId ? lots.find(l => l.id === lotId) : null;
  const cartItemLotNo = cartItemLot ? cartItemLot.lot_no : null;
  const customPromo = activeVouchers.find(v => 
    v.scope === 'sku' && 
    v.sku_id === skuId && 
    v.type === 'buy_x_get_1' &&
    (!v.lot_no || v.lot_no === cartItemLotNo)
  );
  const x = customPromo ? customPromo.value : 5;
  return Math.floor((qty||0)/(x+1));
}
function buy5get1Amount(qty,price,skuId,lotId = null){ const f=buy5get1Free(qty,skuId,lotId); return (f>0&&price>0)?f*price:0; }
// Tổng giảm theo dòng: mua 5 tặng 1 + voucher SKU (nếu có) trên phần còn lại.
function lineProductDiscount(skuId,price,qty,lotId = null){
  const base=price*qty;
  let amt=buy5get1Amount(qty,price,skuId,lotId);
  const v=bestSkuVoucher(skuId,Math.max(0,base-amt),qty,lotId);
  if(v) amt+=v.amount;
  return Math.min(base,amt);
}
function customerPerkAmount(base){
  return perkAmount(selectedCustomer, base);
}
function calcTotals(orderVoucherId='',manual=0){
  const subtotal=cart.reduce((s,c)=>s+c.sku.price*c.qty,0);
  let productDiscount = 0, voucherDiscount = 0, customerPerk = 0;
  let usedVoucher = null;

  productDiscount = cart.reduce((sum, c) => {
    if(c.promoKey==='buy5get1'){
      return sum + buy5get1Amount(c.qty,c.sku.price,c.sku.id,c.lot_id);
    } else if(c.promoKey && c.promoKey.startsWith('voucher:')){
      const vId = c.promoKey.split(':')[1];
      const v = activeVouchers.find(x => x.id === vId && x.scope === 'sku');
      if(v) {
        return sum + voucherAmount(v, c.sku.price * c.qty, c.qty);
      }
    }
    return sum;
  }, 0);

  if(activePromo){
    if(activePromo.key==='customer_perk' && !orderVoucherId){
      customerPerk = activePromo.calcDiscount(cart);
    } else if(activePromo.voucherId && !orderVoucherId){
      const v=activeVouchers.find(x=>x.id===activePromo.voucherId);
      if(v && subtotal>=(v.min_total||0)){
        voucherDiscount = Math.min(subtotal, voucherAmount(v,subtotal,1));
        usedVoucher = v;
      }
    }
  }

  if(orderVoucherId){
    const v=activeVouchers.find(x=>x.id===orderVoucherId && x.scope==='order');
    if(v){
      const eligibleSubtotal = cart
        .filter(c => !c.promoKey)
        .reduce((sum, c) => sum + c.sku.price * c.qty, 0);

      if(eligibleSubtotal >= (v.min_total||0)){
        voucherDiscount = Math.min(eligibleSubtotal, voucherAmount(v, eligibleSubtotal, 1));
        usedVoucher = v;
      }
    }
  }

  const base=Math.max(0,subtotal-productDiscount-voucherDiscount-customerPerk);
  const manualD=Math.min(Math.max(0,base),Math.max(0,Math.round(manual)||0));
  return {subtotal,productDiscount,voucherDiscount,customerPerk,manual:manualD,total:Math.max(0,base-manualD),voucher:usedVoucher};
}

function bestSkuVoucher(skuId, base, qty, lotId = null){
  const cartItemLot = lotId ? lots.find(l => l.id === lotId) : null;
  const cartItemLotNo = cartItemLot ? cartItemLot.lot_no : null;
  return activeVouchers
    .filter(v=>v.scope==='sku' && v.sku_id===skuId && v.type!=='buy_x_get_1' && (!v.lot_no || v.lot_no === cartItemLotNo) && base>=(v.min_total||0))
    .map(v=>({voucher:v,amount:voucherAmount(v,base,qty)}))
    .filter(x=>x.amount>0)
    .sort((a,b)=>b.amount-a.amount)[0] || null;
}

function voucherAmount(v, base, qty){
  if(v.type==='buy_x_get_1') return 0;
  if(v.type==='pct') return Math.floor(base*(v.value||0)/100);
  return Math.min(base, v.scope==='sku' ? (v.value||0)*qty : (v.value||0));
}
function promoLabel(v){
  if(v.type==='buy_x_get_1') return `Mua ${v.value} tặng 1`;
  return v.type==='pct' ? `${v.value}%` : money(v.value);
}

function payMethod(key){ return (operationsCfg?.payment?.methods||[]).find(m=>m.key===key) || {key,label:key,kind:'other'}; }

function makePaymentRef(method, tab){
  const prefix=(operationsCfg?.payment?.transferPrefix||'DANBILL').replace(/\s+/g,'').toUpperCase();
  const n=`RT${String(tab?.id || '01').padStart(2, '0')}`;
  if(['card','visa','pos_card'].includes(method)) return `POS-${n}`;
  if(['internet_banking','qrcode','qr','momo','zalopay'].includes(method)) return `${prefix}-${n}`;
  return '';
}

function dynamicQrUrl(amount, ref){
  const p=operationsCfg?.payment||{};
  if(!p.bankCode||!p.bankAccount) return '';
  const qs=new URLSearchParams({amount:String(Math.max(0,parseInt(amount)||0)),addInfo:ref||'',accountName:p.accountName||''});
  return `https://img.vietqr.io/image/${encodeURIComponent(p.bankCode)}-${encodeURIComponent(p.bankAccount)}-compact2.png?${qs.toString()}`;
}

async function openPay(){

  let voucherId='', lines=[], curMethod='cash', manualVal=0, manualType='amount';
  let paidViaPayos=false, payosPollStop=null;
  const stopPayosPoll=()=>{ if(payosPollStop){ payosPollStop(); payosPollStop=null; } };

    invoiceDraft.enabled = true;
    invoiceDraft.tax_code = selectedCustomer.tax_code || '';

    invoiceDraft.name = selectedCustomer.name || '';
    invoiceDraft.address = selectedCustomer.address || '';
    invoiceDraft.email = selectedCustomer.email || '';
    invoiceDraft.phone = selectedCustomer.phone || '';
  }

  if(!methods.some(m=>m.key===curMethod)) curMethod=methods[0]?.key||'cash';
  const ov=document.createElement('div'); ov.className='overlay show'; document.body.appendChild(ov);

  const activeTab = tabs.find(t => t.id === activeTabId);

  function draw(){
    const subtotal = cart.reduce((s,c)=>s+c.sku.price*c.qty,0);
    let manualAmount = 0;
    if (manualType === 'pct') {
      manualAmount = Math.round(subtotal * manualVal / 100);
    } else {
      manualAmount = manualVal;
    }

    const totals=calcTotals(voucherId, manualAmount);
    const total = totals.total;
    const paid = lines.reduce((s,l)=>s+l.amount,0);
    const remain = Math.max(0,total-paid);
    const change = Math.max(0,paid-total);

    ov.innerHTML=`<div class="modal pay-modal"><h2>Thanh toán retail ${activeTab?`#${activeTab.name}`:''}</h2>
      ${customerLineHtml(selectedCustomer,'payPickCust')}
      ${companyInvoiceHtml(invoiceDraft,{id:'retailInvoice'})}

      </div>
      
      <div class="remain ${remain===0?'ok':'no'}" style="margin-top: 12px;">
        <span>${remain===0?'Tiền thối':'Còn thiếu'}</span>

    bindModal(totals, remain, change);
  }

  function bindModal(totals, remain, change) {
    const remainEl=ov.querySelector('.remain'), amtEl=ov.querySelector('#payAmt'), refEl=ov.querySelector('#ref'), helper=ov.querySelector('#payHelper');
    let qrSeq=0;
    
    const setDefaultRef=()=>{
      const ref=makePaymentRef(curMethod, activeTab);
      if(ref && !refEl.value.trim()) refEl.value=ref;
    };

    function renderQrCard(data, amt, ref){
      const p=operationsCfg?.payment||{};
      const img=data?.imageUrl||'';
      const prov=data?.providerLabel||'VietQR';
      const warn=data?.warning?`<div class="mini" style="color:var(--late)">⚠ ${esc(data.warning)}</div>`:'';
      const link=data?.qrLink?`<a class="mini" href="${esc(data.qrLink)}" target="_blank" rel="noopener" style="color:var(--brand)">Mở link thanh toán ↗</a>`:'';
      helper.innerHTML=`<div class="pay-helper"><div class="pay-qr">
        ${img?`<img src="${esc(img)}" alt="QR">`:'<div class="empty">Chưa cấu hình ngân hàng/QR trong Setting</div>'}
        <div class="pay-qr-info">
          <div class="pay-qr-prov">📱 ${esc(prov)}</div>
          <div class="pay-bankrow"><span>Ngân hàng</span><b>${esc(data?.bankName||p.bankName||p.bankCode||'—')}</b></div>
          <div class="pay-bankrow"><span>Số tài khoản</span><b>${esc(data?.bankAccount||p.bankAccount||'—')}</b></div>
          <div class="pay-bankrow"><span>Chủ tài khoản</span><b>${esc(data?.userBankName||p.accountName||'—')}</b></div>
          <div class="pay-bankrow"><span>Số tiền</span><b class="amt">${money(amt)}</b></div>
          <div class="pay-bankrow"><span>Nội dung CK</span><b>${esc(data?.reference||ref)}</b></div>
          <div class="mini">Khách quét QR (hoặc chuyển khoản đúng nội dung) — hệ thống tự đối soát.</div>
          ${link}${warn}
        </div>
      </div></div>`;
    }
    function renderPaidCard(){
      helper.innerHTML=`<div class="pay-helper" style="border-style:solid;border-color:var(--done);background:var(--done-bg)">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="font-size:36px;line-height:1">✅</div>
          <div><b style="color:var(--done);font-size:15px">Khách đã thanh toán qua payOS</b>
          <div class="mini">Tiền đã về tài khoản. Bấm <b>Xác nhận thanh toán</b> để hoàn tất và in hoá đơn.</div></div>
        </div></div>`;
    }
    function drawHelper(){
      stopPayosPoll();
      const m=payMethod(curMethod);
      const amt=parseInt(amtEl.value)||remain||totals.total;
      const ref=refEl.value.trim()||makePaymentRef(curMethod, activeTab);
      const isQr=['qr','wallet'].includes(m.kind)||['internet_banking','qrcode','qr','momo','zalopay'].includes(m.key);
      if(paidViaPayos && isQr){ renderPaidCard(); return; }
      if(isQr){
        const seq=++qrSeq;
        // Hiện QR fallback ngay (không trống), rồi nâng cấp bằng QR theo provider từ server.
        renderQrCard({imageUrl:dynamicQrUrl(amt,ref), reference:ref, providerLabel:'Đang tạo QR…'}, amt, ref);
        api('/payment-qr',{method:'POST',body:{amount:amt,reference:ref,method:m.key}})
          .then(data=>{
            if(seq!==qrSeq) return;
            renderQrCard(data, amt, ref);
            // payOS: tự hỏi trạng thái (poll) → khi PAID thì tự đánh dấu đã trả + chờ nhân viên xác nhận.
            if(data.provider==='payos' && data.orderCode){
              stopPayosPoll();
              payosPollStop=pollPayosPaid(data.orderCode,{ onPaid:()=>{
                paidViaPayos=true; stopPayosPoll();
                if(remain>0) lines.push({method:m.key,amount:remain,reference:data.reference||ref});
                toast('✅ Khách đã thanh toán qua payOS');
                draw();
              }});
            }
          })
          .catch(()=>{});
      }else if(['pos','card'].includes(m.kind)||['card','visa','pos_card'].includes(m.key)){
        helper.innerHTML=`<div class="pay-helper"><b>${esc(operationsCfg?.payment?.posTerminalName||'Máy POS')}</b><div class="mini">Nhập approval code nếu máy POS trả về mã. Mã gợi ý: <span class="pay-ref">${esc(ref)}</span></div></div>`;
      }else helper.innerHTML='';
    }

    bindCompanyInvoiceBox(ov, invoiceDraft, { id:'retailInvoice', onRedraw:draw });

    ov.querySelector('#payPickCust').onclick=()=>{
      openCustomerPicker(selectedCustomer, c=>{
        selectedCustomer = c || null;
        if(activePromo?.key === 'customer_perk') activePromo = null;
        if(selectedCustomer && selectedCustomer.perk_type && selectedCustomer.perk_type !== 'none'){
          const promos = buildPromoList();
          const custPromo = promos.find(p => p.key === 'customer_perk');
          if(custPromo) activePromo = custPromo;
        }
        if(selectedCustomer && selectedCustomer.auto_invoice){
          invoiceDraft.enabled = true;
          invoiceDraft.tax_code = selectedCustomer.tax_code || '';
          invoiceDraft.company = selectedCustomer.company || '';
          invoiceDraft.name = selectedCustomer.name || '';
          invoiceDraft.address = selectedCustomer.address || '';
          invoiceDraft.email = selectedCustomer.email || '';
          invoiceDraft.phone = selectedCustomer.phone || '';
        } else {
          invoiceDraft.enabled = false;
        }
        renderCustBtn(); renderCart(); draw();
      });
    };

    ov.querySelector('#payPromoBtn').onclick=()=>{
      openPromoPicker(null, () => {
        draw();
      });
    };

    const md=ov.querySelector('#manualDisc');
    const mt=ov.querySelector('#manualType');

    md.onchange=()=>{
      manualVal=Math.max(0,parseInt(md.value)||0);
      lines=[];
      draw();
    };

    mt.onchange=()=>{
      manualType=mt.value;
      lines=[];
      draw();
    };

    ov.querySelectorAll('[data-disc]').forEach(b=>b.onclick=()=>{
      const val=+b.dataset.disc;
      if (val === 0) {
        manualVal = 0;
        manualType = 'amount';
      } else {
        manualVal = val;
        manualType = 'pct';
      }
      lines=[];
      draw();
    });

    ov.querySelector('#voucherSel').onchange=e=>{
      voucherId=e.target.value;
      lines=[];
      draw();
    };

    ov.querySelectorAll('#pm .opt').forEach(o=>o.onclick=()=>{
      ov.querySelectorAll('#pm .opt').forEach(x=>x.classList.remove('sel'));
      o.classList.add('sel');
      curMethod=o.dataset.m;
      refEl.value='';
      setDefaultRef();
      drawHelper();
    });

    ov.querySelectorAll('[data-x]').forEach(b=>b.onclick=()=>{
      lines.splice(+b.dataset.x,1);
      draw();
    });

    ov.querySelector('#addPay').onclick=()=>{
      const v=parseInt(amtEl.value)||0;
      if(v<=0)return toast('Nhập số tiền > 0',true);
      lines.push({method:curMethod,amount:v,reference:refEl.value.trim()||makePaymentRef(curMethod, activeTab)});
      draw();
    };

    ov.querySelector('#fillPay').onclick=()=>{
      if(remain<=0)return;
      lines.push({method:curMethod,amount:remain,reference:refEl.value.trim()||makePaymentRef(curMethod, activeTab)});
      draw();
    };

    ov.querySelector('#cancel').onclick=()=>{ stopPayosPoll(); ov.remove(); };

    ov.querySelector('#confirm').onclick=async()=>{
      stopPayosPoll();
      if(!lines.length){
        const amt=parseInt(amtEl.value)||0;
        if(amt>0) lines.push({method:curMethod,amount:amt,reference:refEl.value.trim()||makePaymentRef(curMethod, activeTab)});
      }
      if(lines.reduce((s,l)=>s+l.amount,0)<totals.total) return toast('Chưa đủ tiền',true);
      let invoice_customer=null;
      try{ invoice_customer=companyInvoicePayload(invoiceDraft); }
      catch(e){ return toast(e.message,true); }
      try{
        const receipt=await api('/retail/checkout',{method:'POST',body:{
          items:cart.map(c=>({sku_id:c.sku.id,qty:c.qty,lot_id:c.lot_id||null})),
          voucher_id:voucherId||null,
          payments:lines,
          customer:selectedCustomer||null,
          customer_id:selectedCustomer?.id||null,
          invoice_customer,
          manual_discount:totals.manual||0,
        }});
        const currentId = activeTabId;
        if (tabs.length > 1) {
          const idx = tabs.findIndex(t => t.id === currentId);
          const nextActiveTab = tabs[idx + 1] || tabs[idx - 1];
          switchTab(nextActiveTab.id);
          tabs = tabs.filter(t => t.id !== currentId);
          renameTabs();
          const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0];
          activeTabId = activeTab.id;
          cart = activeTab.cart || [];
          selectedCustomer = activeTab.selectedCustomer || null;
          activePromo = activeTab.activePromo || null;
          renderCustBtn();
          renderCart();
        } else {
          cart = [];
          selectedCustomer = null;
          activePromo = null;
          const activeTab = tabs.find(t => t.id === currentId);
          if (activeTab) {
            activeTab.cart = [];
            activeTab.selectedCustomer = null;
            activeTab.activePromo = null;
          }
          renderCustBtn();
          renameTabs();
          renderCart();
        }
        ov.remove(); await loadData(); autoPrintReceipt(receipt); toast('✅ Bán thành công — đang in receipt'); scan.focus();
      }catch(e){toast(e.message,true);}
    };

    setDefaultRef();
    drawHelper();
    amtEl.oninput=drawHelper;
    refEl.oninput=drawHelper;
  }

  draw();
}

function methodName(m){
  const cfg=(operationsCfg?.payment?.methods||[]).find(x=>x.key===m);
  return cfg?.label || {cash:'Tiền mặt',card:'Máy POS',qr:'QR',qrcode:'QR Code',bank_transfer:'Chuyển khoản',internet_banking:'Internet Banking',momo:'MoMo Pay',zalopay:'ZaloPay',visa:'Visa',voucher:'Voucher'}[m]||m;
}
function enabledRetailMethods(){
  const fallback=[{key:'cash',label:'Tiền mặt',enabled:true,kind:'cash'},{key:'card',label:'Máy POS',enabled:true,kind:'pos'},{key:'internet_banking',label:'Internet Banking',enabled:true,kind:'qr'},{key:'qrcode',label:'QR Code',enabled:true,kind:'qr'},{key:'voucher',label:'Voucher',enabled:true,kind:'voucher'}];
  const rows=operationsCfg?.payment?.methods;
  return (Array.isArray(rows)&&rows.length?rows:fallback).filter(m=>m.enabled!==false);
}
function methodIcon(m){ return ({cash:'💵',internet_banking:'🏦',qrcode:'📱',qr:'📱',card:'💳',visa:'💳',momo:'🟣',zalopay:'🔵',voucher:'🎟️'}[m.key||m]||'•'); }
const NO_INVOICE_CUSTOMER='Khách không xuất hóa đơn';
function customerDisplay(c){ return c ? `${c.name}${perkTag(c)}` : NO_INVOICE_CUSTOMER; }
function customerActionLabel(c){ return c ? 'Đổi khách' : 'Chọn khách'; }
function customerLineHtml(c,id='payPickCust'){
  return `<div class="custline"><span>👤 <b>${esc(customerDisplay(c))}</b></span><button class="btn sm" id="${id}">${customerActionLabel(c)}</button></div>`;
}

let printConfig = {};
const cfgKey=k=>`pos_erp_${k}_settings`;
function readLocalCfg(k){ try{return JSON.parse(localStorage.getItem(cfgKey(k))||'null');}catch{return null;} }
function hasLocalPrintCfg(){ return ['einvoice','labels','bill','printers','label_template','cup_label_template','bill_template'].some(k=>localStorage.getItem(cfgKey(k))); }
function isLegacyBillTemplate(tpl){

function mergePrintConfig(remote={}){
  const r=remote||{};
  if(r.updated_at||!hasLocalPrintCfg()) return r;
  const localBillTemplate=readLocalCfg('bill_template');
  const local={
    einvoice:readLocalCfg('einvoice')||{},

    printers:readLocalCfg('printers')||r.printers,
    templates:{label:readLocalCfg('cup_label_template')||readLocalCfg('label_template')||r.templates?.label,bill:isLegacyBillTemplate(localBillTemplate)?r.templates?.bill:(localBillTemplate||r.templates?.bill)},
  };
  return {...r,einvoice:{...(r.einvoice||{}),...local.einvoice},labels:{...(r.labels||{}),...local.labels},bill:{...(r.bill||{}),...local.bill},printers:local.printers||r.printers,templates:{...(r.templates||{}),...local.templates}};
}
async function refreshPrintConfig(){ printConfig=mergePrintConfig(await api('/print/config').catch(()=>printConfig||{})); }

function activePrintConfig(r){ return r?.print_config || printConfig || {}; }
function activeBillCfg(r){ return activePrintConfig(r).bill || {}; }
function activeBillTemplate(r){ return activePrintConfig(r).templates?.bill || null; }

function replaceVars(text, vars){
  let s = String(text||'');
  if (vars && vars.preview) {
    s = s.replace(/HÓA ĐƠN THANH TOÁN/g, 'HÓA ĐƠN TẠM TÍNH');
    s = s.replace(/HOA DON THANH TOAN/g, 'HOA DON TAM TINH');
  }
  return s.replace(/\{(\w+)\}/g,(_,k)=>vars[k]??`{${k}}`);
}
function qrImageUrl(value,size=180){
  const data=String(value||'').trim().slice(0,1200);
  return data?`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&margin=8&data=${encodeURIComponent(data)}`:'';
}
function qrTextForElement(el={},vars={}){

    lookup:'{invoiceLookupUrl}',
    tax:'{taxAuthorityCode}',

}
function qrBoxHtml(el={},vars={},size=180){

}
function vndPlain(n){ return Math.round(Number(n)||0).toLocaleString('en-US'); }
function pad2(n){ return String(n).padStart(2,'0'); }
function receiptDate(d){ return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`; }
function receiptTime(d){ return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }
function internalBillNo(r,d){
  if(r.bill_no && /^Dan\d{7,}$/i.test(r.bill_no)) return r.bill_no;
  const seed=String(r.order_id||r.number||'1');
  let n=0; for(const ch of seed) n=(n*31+ch.charCodeAt(0))%1000;
  return `Dan${pad2(d.getDate())}${pad2(d.getMonth()+1)}${String(d.getFullYear()).slice(-2)}${String(n||1).padStart(3,'0')}`;
}
function numberToVietnamese(n){
  n=Math.round(Number(n)||0);
  if(n===0) return 'Không đồng';
  const digit=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'], unit=['','nghìn','triệu','tỷ'];
  function triad(num, full=false){
    const tr=Math.floor(num/100), ch=Math.floor((num%100)/10), dv=num%10, out=[];
    if(tr>0||full) out.push(digit[tr]+' trăm');
    if(ch>1){ out.push(digit[ch]+' mươi'); if(dv===1) out.push('mốt'); else if(dv===5) out.push('lăm'); else if(dv) out.push(digit[dv]); }
    else if(ch===1){ out.push('mười'); if(dv===5) out.push('lăm'); else if(dv) out.push(digit[dv]); }
    else if(dv){ if(tr>0||full) out.push('lẻ'); out.push(digit[dv]); }
    return out.join(' ');
  }
  const parts=[]; let x=n, idx=0;
  while(x>0){ const g=x%1000; if(g) parts.unshift(`${triad(g, parts.length>0)} ${unit[idx]}`.trim()); x=Math.floor(x/1000); idx++; }
  const s=parts.join(' ').replace(/\s+/g,' ').trim();
  return s.charAt(0).toUpperCase()+s.slice(1)+' đồng chẵn';
}
function lineCategory(i){ return i.station==='retail'||i.sku_id ? 'retail' : 'fnb'; }
function itemLineAmount(i,rate,priceIncludesVat){
  const gross=(Number(i.unit_price)||0)*(Number(i.qty)||1);
  return priceIncludesVat ? Math.round(gross/(1+rate/100)) : gross;
}
function formatReceiptItemRow(idx,i,rate,priceIncludesVat){
  const name=String(i.name||'').replace(/\s+/g,' ').slice(0,24).padEnd(24,' ');
  const qty=String(i.qty||1).padStart(2,' ');
  const unit=Math.round(itemLineAmount({...i,qty:1},rate,priceIncludesVat));
  const amount=itemLineAmount(i,rate,priceIncludesVat);
  return `${String(idx).padStart(2,'0')}   ${name} ${qty} ${vndPlain(unit).padStart(9,' ')} ${vndPlain(amount).padStart(12,' ')}`;
}
function receiptItemsText(r){
  const tax=r.tax||{}, rate=Number(tax.vat_rate||8)||0, inc=tax.price_includes_vat!==false;
  const groups={fnb:[],retail:[]};
  (r.items||[]).forEach(i=>groups[lineCategory(i)].push(i));
  const rows=[]; let idx=1;
  if(groups.fnb.length){ rows.push('[DANH MỤC F&B - NHÀ HÀNG / ĐỒ UỐNG]'); groups.fnb.forEach(i=>rows.push(formatReceiptItemRow(idx++,i,rate,inc))); }
  if(groups.retail.length){ if(rows.length) rows.push(''); rows.push('[DANH MỤC RETAIL - SẢN PHẨM TIÊU DÙNG]'); groups.retail.forEach(i=>rows.push(formatReceiptItemRow(idx++,i,rate,inc))); }
  return rows.join('\n');
}
function isItemsHeaderText(t){

function receiptVarsBcm(r){
  const cfg=activeBillCfg(r), ein=activePrintConfig(r).einvoice || {};
  const lines=r.lines||[], tax=r.tax||{};
  const rate=Number(tax.vat_rate||ein.defaultVatRate||8)||0;
  const priceIncludesVat=tax.price_includes_vat!==false;
  const gross=Number(r.total||0);
  const taxable=priceIncludesVat ? Math.round(gross/(1+rate/100)) : Number(r.subtotal||gross);
  const vat=priceIncludesVat ? gross-taxable : Math.round(taxable*rate/100);
  const grand=priceIncludesVat ? gross : taxable+vat-(Number(r.discount)||0);
  const d=new Date(r.paid_at||Date.now());
  const billNo=r.preview ? '' : internalBillNo(r,d);
  const taxNote=cfg.taxIncludedText || (priceIncludesVat ? `Giá đã bao gồm thuế GTGT ${rate}% theo quy định` : `Chưa bao gồm thuế GTGT ${rate}%`);
  const res = {

    storeSubtitle:cfg.storeSubtitle||'(Hệ thống Phân phối F&B & Retail BCM)',

    phone:cfg.phone||'',

    invoiceSeries:tax.invoice_series||ein.series||'',

    orderNo:billNo,

    timeOnly:receiptTime(d),
    customerName:invoiceReceiptCustomerName(r.customer||selectedCustomer, NO_INVOICE_CUSTOMER),
    customerTaxCode:invoiceReceiptTaxCode(r.customer||selectedCustomer, ''),
    items:receiptItemsText(r),
    subtotal:vndPlain(r.subtotal||0),
    taxableAmount:vndPlain(taxable),
    vatRate:String(rate),
    vatAmount:vndPlain(vat),
    discount:vndPlain(r.discount||0),
    total:vndPlain(r.total||0),
    grandTotal:vndPlain(grand),
    totalWords:numberToVietnamese(grand),
    taxNote,
    method:lines.length?lines.map(l=>methodName(l.method)).join(' / '):(r.preview?'Chưa thanh toán':'-'),
    paymentStatus:r.preview?'Chưa thanh toán':'Đã thanh toán',
    taxAuthorityCode:r.tax_authority_code||r.invoice?.lookup_code||'',
    invoiceLookupUrl:r.invoice?.lookup_url || `https://tracuu.example.vn/?code=${encodeURIComponent(r.invoice?.lookup_code || r.tax_authority_code || r.bill_no || r.number || '')}`,
footer:cfg.footer||'Xin cảm ơn và hẹn gặp lại',

  for(const k of ['storeNameC','storeSubtitleC','taxNoteC','footerBrandC','footerC','qrNoteC']){
    if(res[k]) res[k]=String(res[k]).trim();
  }
  return res;
}
function receiptTextLines(text, charsPerLine){
  return String(text||'').split('\n').reduce((sum,line)=>sum+Math.max(1,Math.ceil(line.length/Math.max(8,charsPerLine))),0);
}
function estimateReceiptHeight(tpl,vars,widthPx){
  const widthMm=Number(tpl.widthMm)||72;
  const hMm=Math.max(300,Math.min(1600,Number(tpl.heightMm)||320));
  let heightPx=Math.max(360,Math.round(widthPx*hMm/widthMm));
  for(let pass=0;pass<3;pass++){
    let needed=heightPx;
    for(const el of tpl.elements||[]){
      const top=(Number(el.y)||0)/100*heightPx;
      const boxH=(el.type==='line'?0:(Number(el.h)||8)/100*heightPx);
      let bottom=top+boxH+18;
      if(el.type==='text'){
        const block=el.id==='bill_body';
        const fontSize=block?Math.max(6.7,Number(el.fontSize)||6.7):(Number(el.fontSize)||5);
        const fontPx=Math.max(block?12.5:8,fontSize*1.95);
        const boxW=Math.max(40,widthPx*((Number(el.w)||20)/100)-(block?20:0));
        const chars=Math.max(8,Math.floor(boxW/(fontPx*.56)));
        bottom=top+receiptTextLines(replaceVars(el.text,vars),chars)*fontPx*1.14+(block?34:12);
      }
      needed=Math.max(needed,bottom);
    }
    heightPx=Math.min(5200,Math.max(360,Math.ceil(needed)));
  }
  return heightPx;
}
function renderTemplateReceipt(r){
  const tpl=activeBillTemplate(r);
  if(!tpl?.elements?.length) return '';
  const vars=receiptVarsBcm(r);
  const w=Number(tpl.widthMm)||72;
  const displayWidth=w<=58?280:360;
  // In dạng DÒNG CHẢY dọc (theo vị trí trên→dưới) để bill TỰ CO GIÃN theo số món:
  // ít món không thừa khoảng trắng, nhiều món không bị chèn/đè.
  const ordered=[...tpl.elements].sort((a,b)=>(Number(a.y)||0)-(Number(b.y)||0)||(Number(a.x)||0)-(Number(b.x)||0));
  const blocks=ordered.map((el)=>{
    const align=el.align==='center'?'center':el.align==='right'?'right':el.align==='justify'?'justify':'left';
    if(el.type==='line') return `<div class="rc-line"></div>`;
    if(el.type==='image') return el.src?`<div class="rc-img" style="text-align:${align}"><img src="${esc(el.src)}" style="width:${Math.max(20,Math.min(100,Number(el.w)||60))}%"></div>`:'';
    if(el.type==='qr') return `<div class="rc-qr">${qrBoxHtml(el,vars,360)}</div>`;
    const txt=String(el.text||'');
    if(isItemsHeaderText(txt) && !txt.includes('{items}')) return '';
    const decoration=[el.underline?'underline':'',el.strike?'line-through':''].filter(Boolean).join(' ')||'none';

    const block=el.id==='bill_body';
    const mono=block||el.mono?`;font-family:'Courier New',ui-monospace,monospace`:'';
    const style=`font-size:${Math.max(8,(Number(el.fontSize)||5)*1.95)}px;font-weight:${el.bold?800:500};font-style:${el.italic?'italic':'normal'};text-decoration:${decoration};text-align:${align}${mono}`;
    if(!block && /\{items\}/.test(txt)){
      const [before, ...rest] = txt.split('{items}');
      const after = rest.join('{items}');
      return `${before.trim() ? `<div class="rc-text" style="${style}">${esc(replaceVars(before, vars))}</div>` : ''}${receiptItemsTableHtml(r)}${after.trim() ? `<div class="rc-text" style="${style}">${esc(replaceVars(after, vars))}</div>` : ''}`;
    }
    return `<div class="rc-text" style="${style}">${esc(replaceVars(txt,vars))}</div>`;
  }).join('');
  const cfg=activeBillCfg(r);
  const hasTaxNote=tpl.elements.some(el=>String(el.text||'').includes('{taxNote}'));
  const taxFallback=cfg.showTax!=='0' && !hasTaxNote ? `<div class="rc-text" style="text-align:center;font-size:10px;color:#555">${esc(vars.taxNote||'')}</div>` : '';
  const hasItems=tpl.elements.some(el=>/\{items\}/.test(String(el.text||'')));
  const itemsFallback=hasItems?'':receiptItemsTableHtml(r);
  const hasQr=tpl.elements.some(el=>el.type==='qr');
  const qrFallback=cfg.showQr!=='0'&&!r.preview&&!hasQr?`<div class="rc-qr">${qrBoxHtml({qrMode:cfg.qrMode||'lookup',qrText:cfg.qrText||'{invoiceLookupUrl}',qrCaption:cfg.qrCaption||'Quét QR tra cứu hóa đơn'},vars,360)}</div>`:'';
  return `<div class="receipt rc-flow" style="max-width:${displayWidth}px;margin:0 auto">${itemsFallback}${blocks}${taxFallback}${qrFallback}</div>`;
}

function printReceiptFrame(r){
  return new Promise(resolve=>{
  const frame=document.createElement('iframe');
  frame.style.position='fixed'; frame.style.right='0'; frame.style.bottom='0'; frame.style.width='1px'; frame.style.height='1px'; frame.style.border='0'; frame.style.opacity='0';
  document.body.appendChild(frame);
    let done=false;
    const finish=()=>{ if(done) return; done=true; setTimeout(()=>frame.remove(),300); resolve(); };
    try{ frame.contentWindow.addEventListener('afterprint',finish,{once:true}); }catch{}
  const doc=frame.contentDocument||frame.contentWindow.document;
    doc.open(); doc.write(receiptPrintDoc(r)); doc.close();
    const waitImages=()=>Promise.all([...doc.images].map(img=>img.complete?Promise.resolve():new Promise(res=>{img.onload=img.onerror=res;setTimeout(res,1800);})));
    setTimeout(async()=>{ await waitImages(); try{ frame.contentWindow.focus(); frame.contentWindow.print(); } catch{} setTimeout(finish,3500); },220);
  });
}
async function printReceiptNow(r,copies=readReceiptCopies()){
  const n=saveReceiptCopies(copies);
  for(let i=0;i<n;i++){
    await printReceiptFrame({...r,copy_index:i+1,copy_total:n});
    if(i<n-1) await new Promise(res=>setTimeout(res,350));
  }
}

  const copies=Math.max(1,Math.min(9,parseInt(activeBillCfg(r).copies)||2));
  return printReceiptNow(r,copies).catch(()=>{});
}

      ${inv.customer?.name?`<div class="li"><span>Người mua</span><span>${esc(inv.customer.name)}</span></div>`:''}
      ${inv.customer?.tax_code?`<div class="li"><span>MST</span><span>${esc(inv.customer.tax_code)}</span></div>`:''}
      <div class="li tt"><span>Tổng tiền</span><span>${money(inv.total)}</span></div><hr>
      <div class="qr"></div>
      <div class="c" style="font-size:10px">Mã tra cứu: <b>${esc(inv.lookup_code)}</b><br>${esc(inv.lookup_url||'')}</div>
    </div>
    <div class="mfoot"><button class="btn primary" onclick="this.closest('.overlay').remove()">Đóng</button></div>
  </div>`;
  document.body.appendChild(ov);
}

document.getElementById('voucherBtn').onclick=()=>openVoucherManager();
document.getElementById('custBtn').onclick=()=>openCustomerPicker(selectedCustomer, c=>{
  selectedCustomer = c || null;
  if(activePromo?.key === 'customer_perk') activePromo = null;
  if(selectedCustomer && selectedCustomer.perk_type && selectedCustomer.perk_type !== 'none'){
    const promos = buildPromoList();
    const custPromo = promos.find(p => p.key === 'customer_perk');
    if(custPromo) activePromo = custPromo;
  }
  renderCustBtn(); renderCart();
});

function openVoucherManager(){
  editingVoucher=null;
  const ov=document.createElement('div'); ov.className='overlay show'; document.body.appendChild(ov);
  renderVoucherManager(ov);
}

function renderVoucherManager(ov){
  const v=editingVoucher||{};
  ov.innerHTML=`<div class="modal" style="max-width:760px"><h2>🎁 Voucher retail</h2><div class="sub">Tạo voucher toàn bill hoặc gán promo riêng cho từng SKU</div>
    <div class="formgrid">
      <div><label>Tên chương trình</label><input type="text" id="vName" value="${esc(v.name||'')}" placeholder="VD: Weekend discount"></div>
      <div><label>Mã voucher</label><input type="text" id="vCode" value="${esc(v.code||'')}" placeholder="VD: WEEKEND10"></div>
      <div><label>Phạm vi</label><select id="vScope"><option value="order" ${v.scope!=='sku'?'selected':''}>Toàn bill</option><option value="sku" ${v.scope==='sku'?'selected':''}>Gán SKU</option></select></div>
      <div><label>SKU áp dụng</label><select id="vSku" ${v.scope==='sku'?'':'disabled'}><option value="">Chọn SKU</option>${skus.map(s=>`<option value="${s.id}" ${v.sku_id===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}</select></div>
      <div><label>Lot/Date áp dụng</label><input type="text" id="vLot" list="vLotList" value="${esc(v.lot_no||'')}" placeholder="Nhập hoặc chọn Lot/Date" ${v.scope==='sku'?'':'disabled'}><datalist id="vLotList"></datalist></div>
      <div><label>Loại giảm</label><select id="vType"><option value="pct" ${v.type==='pct'?'selected':''}>Giảm theo %</option><option value="amount" ${v.type==='amount'?'selected':''}>Giảm số tiền</option><option value="buy_x_get_1" ${v.type==='buy_x_get_1'?'selected':''}>Mua X tặng 1</option></select></div>
      <div><label>Giá trị</label><input type="number" id="vValue" value="${v.value||''}" placeholder="10 hoặc 30000"></div>
      <div><label>Bill tối thiểu</label><input type="number" id="vMin" value="${v.min_total||0}"></div>
      <div><label>Trạng thái</label><select id="vActive"><option value="1" ${v.active!==false?'selected':''}>Đang bật</option><option value="0" ${v.active===false?'selected':''}>Tắt</option></select></div>
      <div><label>Từ ngày</label><input type="text" id="vStart" value="${esc(v.starts_at||'')}" placeholder="YYYY-MM-DD"></div>
      <div><label>Đến ngày</label><input type="text" id="vEnd" value="${esc(v.ends_at||'')}" placeholder="YYYY-MM-DD"></div>
      <div class="full"><label>Ghi chú</label><input type="text" id="vNote" value="${esc(v.note||'')}"></div>
    </div>
    <div class="mfoot"><button class="btn" id="vCancelEdit">${editingVoucher?'Bỏ sửa':'Làm mới'}</button><button class="btn primary" id="vSave">${editingVoucher?'Lưu chỉnh sửa':'＋ Tạo voucher'}</button></div>
    <div class="panel" style="margin:16px 0 0"><h3>Danh sách voucher</h3>
      ${allVouchers.length?allVouchers.map(x=>voucherRow(x)).join(''):'<div class="empty">Chưa có voucher</div>'}
    </div>
    <div class="mfoot"><button class="btn primary" id="vClose">Đóng</button></div></div>`;
  const updateLotList = () => {
    const skuId = ov.querySelector('#vSku').value;
    const skuLots = lots.filter(l => l.item_id === skuId);
    const uniqueLotNos = [...new Set(skuLots.map(l => l.lot_no).filter(Boolean))];
    const datalist = ov.querySelector('#vLotList');
    if (datalist) {
      datalist.innerHTML = uniqueLotNos.map(l => `<option value="${esc(l)}">`).join('');
    }
  };
  ov.querySelector('#vScope').onchange=e=>{
    const isSku=e.target.value==='sku';
    ov.querySelector('#vSku').disabled=!isSku;
    ov.querySelector('#vLot').disabled=!isSku;
    if(!isSku && ov.querySelector('#vType').value==='buy_x_get_1'){
      ov.querySelector('#vType').value='pct';
    }
    updateLotList();
  };
  ov.querySelector('#vSku').onchange=()=>{
    updateLotList();
  };
  ov.querySelector('#vType').onchange=e=>{
    if(e.target.value==='buy_x_get_1'){
      ov.querySelector('#vScope').value='sku';
      ov.querySelector('#vSku').disabled=false;
      ov.querySelector('#vLot').disabled=false;
    }
  };
  ov.querySelector('#vCancelEdit').onclick=()=>{editingVoucher=null;renderVoucherManager(ov);};
  ov.querySelector('#vClose').onclick=()=>ov.remove();
  ov.querySelector('#vSave').onclick=async()=>{
    const pin=prompt('Cần PIN của Manager hoặc Admin để xác nhận tạo/sửa voucher:');
    if(pin===null) return;
    const body={
      name:ov.querySelector('#vName').value,
      code:ov.querySelector('#vCode').value,
      scope:ov.querySelector('#vScope').value,
      sku_id:ov.querySelector('#vSku').value,
      lot_no:ov.querySelector('#vScope').value==='sku' ? ov.querySelector('#vLot').value.trim() : '',
      type:ov.querySelector('#vType').value,
      value:parseInt(ov.querySelector('#vValue').value)||0,
      min_total:parseInt(ov.querySelector('#vMin').value)||0,
      active:ov.querySelector('#vActive').value==='1',
      starts_at:ov.querySelector('#vStart').value,
      ends_at:ov.querySelector('#vEnd').value,
      note:ov.querySelector('#vNote').value,
      security_pin:pin,
    };
    try{
      if(editingVoucher) await api('/vouchers/'+editingVoucher.id+'/update',{method:'POST',body});
      else await api('/vouchers',{method:'POST',body});
      editingVoucher=null; await loadData(); renderVoucherManager(ov); toast('Đã lưu voucher');
    }catch(e){toast(e.message,true);}
  };
  updateLotList();
  ov.querySelectorAll('[data-edit-v]').forEach(b=>b.onclick=()=>{editingVoucher=allVouchers.find(v=>v.id===b.dataset.editV);renderVoucherManager(ov);});
  ov.querySelectorAll('[data-toggle-v]').forEach(b=>b.onclick=async()=>{
    const pin=prompt('Cần PIN của Manager hoặc Admin để bật/tắt voucher:');
    if(pin===null) return;
    try{
      await api('/vouchers/'+b.dataset.toggleV+'/toggle',{method:'POST',body:{active:b.dataset.on!=='1',security_pin:pin}});
      await loadData();renderVoucherManager(ov);
    }catch(e){toast(e.message,true);}
  });
}

function voucherRow(v){
  const scope=v.scope==='sku' ? `SKU · ${v.sku_emoji||''} ${esc(v.sku_name||v.sku_id||'')}${v.lot_no ? ` (Lot: ${esc(v.lot_no)})` : ''}` : 'Toàn bill';
  const val=v.type==='buy_x_get_1' ? `Mua ${v.value} tặng 1` : (v.type==='pct' ? `-${v.value}%` : `-${money(v.value)}`);
  const window=[v.starts_at||'',v.ends_at||''].filter(Boolean).join(' → ') || 'Không giới hạn ngày';
  return `<div class="voucherrow">
    <div class="sw ${v.active?'on':''}" data-toggle-v="${v.id}" data-on="${v.active?1:0}" title="Bật/tắt"></div>
    <div style="min-width:0"><b>${esc(v.name)}</b> ${v.code?`<span class="chip c-muted">${esc(v.code)}</span>`:''}<div class="meta">${scope} · ${window}${v.min_total?` · bill từ ${money(v.min_total)}`:''}</div></div>
    <b style="margin-left:auto;color:var(--brand)">${val}</b>
    <button class="btn sm" data-edit-v="${v.id}">Sửa</button>
  </div>`;
}

function roundQty(n){ return Math.round((Number(n)||0)*100)/100; }

startClock(); await loadData(); await loadCustomersAndRefresh(); await refreshPrintConfig(); scan.focus();
// Reset promo khi xóa giỏ
const origClearBtn=document.getElementById('clearBtn');
if(origClearBtn) origClearBtn.addEventListener('click',()=>{ activePromo=null; });
</script>
</body></html>
