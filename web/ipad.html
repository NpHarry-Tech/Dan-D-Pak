<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>Customer iPad — Self Order</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/shared/app.css">
  <script src="/runtime-config.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <!-- Customer-kiosk hardening: only our buttons/inputs are usable -->
  <script>
    (function () {
      try {
        var block = function (e) { e.preventDefault(); };
        document.addEventListener('contextmenu', block);                 // long-press / right-click menu
        document.addEventListener('selectstart', function (e) {            // text selection
          var t = e.target; if (t && /^(INPUT|TEXTAREA)$/.test(t.tagName)) return; e.preventDefault();
        });
        document.addEventListener('gesturestart', block);                // iOS pinch-zoom
        document.addEventListener('dragstart', block);                   // image drag
        document.addEventListener('DOMContentLoaded', function () { document.body.classList.add('kiosk'); });
      } catch (_) { }
    })();
  </script>
  <style>
    .ipad-frame {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: var(--surface);
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .ipad-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
      flex-wrap: wrap
    }

    .ipad-top .tbl {
      font-family: var(--mono);
      font-weight: 700;
      color: var(--brand);
      background: var(--brand-dim);
      border: 1px solid rgba(52, 210, 238, .35);
      padding: 4px 12px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 8px
    }

    .staff-logo {
      width: 88px;
      height: 42px;
      background: url('/assets/logo.png') center/98px 98px no-repeat;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: transparent;
      font-size: 0;
      cursor: default;
      user-select: none;
      flex: 0 0 auto
    }

    .ipad-home-logo {
      width: 150px;
      min-height: 50px;
      border: 0;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      flex: 0 0 auto;
      text-align: center
    }

    .ipad-home-logo::before {
      content: "";
      width: 126px;
      height: 38px;
      background: url('/assets/DanOnLogo.png') center/contain no-repeat;
      display: block;
      filter: drop-shadow(0 5px 8px rgba(15, 23, 42, .06))
    }

    .ipad-home-logo small {
      display: block;
      max-width: 150px;
      font-size: 9.5px;
      font-weight: 650;
      line-height: 1.1;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .ipad-home-logo:hover {
      opacity: .86
    }

    #staffUnlock {
      cursor: pointer
    }

    .ipad-top .right {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap
    }

    .ipad-top #callBtn {
      padding: 9px 15px;
      font-size: 13px;
      font-weight: 700
    }

    .tablepick {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
      padding: 24px;
      overflow-y: auto
    }

    .tablepick .tp {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 18px 10px;
      text-align: center;
      cursor: pointer;
      transition: .12s
    }

    .tablepick .tp:hover {
      border-color: var(--brand);
      transform: translateY(-2px)
    }

    .tablepick .tp.busy {
      opacity: .5
    }

    .tablepick .tp b {
      font-family: var(--mono);
      font-size: 17px
    }

    .tablepick .tp span {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px
    }

    .ipad-body {
      display: grid;
      grid-template-columns: clamp(74px, 11vw, 134px) minmax(0, 1fr) clamp(150px, 24vw, 300px);
      flex: 1;
      min-height: 0;
      overflow: hidden
    }

    .cats {
      border-right: 1px solid var(--border);
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow-y: auto;
      overflow-x: hidden;
      min-width: 0
    }

    .cat {
      word-break: break-word
    }

    .cat {
      padding: 11px 8px;
      border-radius: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border: 1px solid transparent
    }

    .cat .ci {
      font-size: 21px;
      display: block;
      margin-bottom: 3px
    }

    .cat.active {
      background: var(--brand-dim);
      color: var(--brand);
      border-color: rgba(52, 210, 238, .35)
    }

    /* 3 cột cố định trên mọi kích thước không phải mobile */
    .menulist {
      padding: 14px;
      overflow-y: auto;
      overflow-x: hidden;
      min-width: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      align-content: start
    }

    /* Food card — dùng padding-bottom trick thay aspect-ratio
       để chiều cao LUÔN đều nhau 100% dù grid stretch hay không */
    .mi {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: .14s;
      position: relative;
      display: block;
      width: 100%;
      /* height:0 + padding-bottom:75% = tỉ lệ 4:3 chuẩn, mọi card đều cao bằng nhau */
      height: 0;
      padding-bottom: 75%;
      min-width: 0
    }

    .mi:hover {
      border-color: var(--brand);
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(0, 0, 0, .35)
    }

    .mi-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #18222e
    }

    .mi-img.emoji {
      font-size: 44px;
      background: linear-gradient(135deg, #22303f, #18222e)
    }

    .mi-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block
    }

    .mi-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 34px 11px 10px;
      background: linear-gradient(180deg, rgba(8, 12, 17, 0), rgba(8, 12, 17, .72) 35%, rgba(8, 12, 17, .96));
      pointer-events: none
    }

    .mi .nm {
      font-weight: 800;
      font-size: 13px;
      line-height: 1.22;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .75);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    .mi .pr {
      font-family: var(--mono);
      color: var(--brand);
      font-weight: 900;
      font-size: 13.5px;
      text-shadow: 0 1px 4px rgba(0, 0, 0, .75);
      margin-top: 2px
    }

    .mi-desc,
    .mi .sla {
      display: none
    }

    .mi.off {
      opacity: .55;
      cursor: not-allowed
    }

    .mi.off .mi-img::after {
      content: "TẠM HẾT";
      position: absolute;
      inset: 0 0 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(14, 20, 27, .72);
      color: var(--late);
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1px
    }

    .cartpane {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
      overflow: hidden
    }

    .cartpane::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(98%, 445px);
      aspect-ratio: 1.9/1;
      transform: translate(-50%, -50%);
      background: url('/assets/DanOnLogo.png') center/contain no-repeat;
      opacity: .075;
      filter: grayscale(8%) saturate(.85);
      pointer-events: none;
      z-index: 0
    }

    .cartpane>* {
      position: relative;
      z-index: 1
    }

    .cartpane h3 {
      padding: 13px 15px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    /* Scroll vùng giữa (giỏ + đơn đã gọi) — footer hành động luôn ghim ở đáy */
    .cartscroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
      display: flex;
      flex-direction: column
    }

    .cartitems {
      flex: 0 0 auto;
      padding: 9px 11px;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .cartitems:only-child {
      flex: 1 0 auto
    }

    .cartitems:only-child .empty {
      margin: auto
    }

    .cart-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      color: var(--faint);
      font-size: 12.5px;
      font-weight: 600;
      text-align: center;
      pointer-events: none;
      z-index: 1
    }

    .cart-empty span {
      display: block;
      line-height: 1.45
    }

    .cline {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 11px
    }

    .cline .r1 {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 600;
      font-size: 12.5px
    }

    .cline .r1 .p {
      font-family: var(--mono);
      color: var(--brand);
      flex-shrink: 0
    }

    .cline .mods {
      font-size: 11px;
      color: var(--doing);
      margin-top: 2px
    }

    .cline .note {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      margin-top: 1px
    }

    .cline .r2 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 7px
    }

    .qbtn {
      width: 24px;
      height: 24px;
      border-radius: 7px;
      background: var(--surface3);
      color: var(--text);
      font-weight: 700;
      font-size: 13px
    }

    .qbtn:hover {
      background: var(--brand);
      color: #06222b
    }

    .cline .qty {
      font-family: var(--mono);
      font-weight: 700;
      min-width: 18px;
      text-align: center
    }

    .cline .rm {
      margin-left: auto;
      color: var(--faint);
      background: none;
      font-size: 15px
    }

    .cline .rm:hover {
      color: var(--late)
    }

    .cartfoot {
      border-top: 1px solid var(--border);
      padding: 13px 15px;
      flex-shrink: 0;
      background: var(--surface);
      display: flex;
      flex-direction: column;
      gap: 9px
    }

    .cartfoot .tot {
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      font-size: 15px
    }

    .cartfoot .tot span:last-child {
      font-family: var(--mono);
      color: var(--brand)
    }

    .cartfoot .btn {
      width: 100%
    }

    .cartfoot #sendBtn {
      padding: 13px;
      font-size: 14.5px;
      font-weight: 800
    }

    /* Nút thanh toán chính — to, nổi bật, thân thiện */
    .btn.pay-cta {
      padding: 16px;
      font-size: 16.5px;
      font-weight: 800;
      border: 0;
      border-radius: 13px;
      background: linear-gradient(135deg, #3fe08f, #16a866);
      color: #06251a;
      box-shadow: 0 6px 18px rgba(22, 168, 102, .34);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px
    }

    .btn.pay-cta:hover {
      filter: brightness(1.05)
    }

    .btn.pay-cta:active {
      transform: translateY(1px)
    }

    .sentlist {
      padding: 9px 11px;
      border-top: 1px dashed var(--border)
    }

    .sentlist h4 {
      font-size: 10.5px;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 6px
    }

    .sline {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 2px;
      color: var(--muted)
    }

    .sline b {
      color: var(--text);
      font-weight: 600;
      flex: 0 0 auto
    }

    .sline .sname {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .sline .st {
      margin-left: auto;
      flex: 0 0 auto
    }

    .modal-img {
      height: 150px;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .modal-img.emoji {
      font-size: 66px;
      background: linear-gradient(135deg, #22303f, #18222e)
    }

    .modal-img img {
      width: 100%;
      height: 100%;
      object-fit: cover
    }

    .item-detail-modal {
      width: calc(100vw - 36px);
      max-width: calc(100vw - 36px);
      height: calc(100vh - 36px);
      height: calc(100dvh - 36px);
      max-height: calc(100dvh - 36px);
      padding: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      border-radius: 18px;
      background: rgba(255, 255, 255, .18);
      border: 1px solid rgba(255, 255, 255, .42);
      box-shadow: 0 26px 70px rgba(15, 23, 42, .30);
      backdrop-filter: blur(18px) saturate(1.08);
      -webkit-backdrop-filter: blur(18px) saturate(1.08)
    }

    .item-detail-info {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 18px 18px;
      border-left: 1px solid rgba(255, 255, 255, .36);
      background: rgba(255, 255, 255, .76);
      backdrop-filter: blur(16px) saturate(1.08);
      -webkit-backdrop-filter: blur(16px) saturate(1.08);
      box-shadow: -8px 0 24px rgba(15, 23, 42, .08);
      z-index: 2
    }

    .item-detail-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 3px;
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    .item-detail-head h2 {
      font-size: clamp(16px, 1.32vw, 22px);
      line-height: 1.18;
      margin: 0 0 9px;
      letter-spacing: 0
    }

    .item-detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-size: 12px
    }

    .item-detail-price {
      font-family: var(--mono);
      color: var(--brand);
      font-size: clamp(15px, 1.08vw, 19px);
      font-weight: 800
    }

    .item-detail-section {
      display: grid;
      gap: 7px
    }

    .item-detail-modal #mods,
    .item-detail-modal #addons {
      display: grid;
      gap: 12px
    }

    .item-detail-modal label,
    .item-detail-section label {
      margin: 0;
      font-size: 10.5px;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--faint)
    }

    .item-detail-intro {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.48
    }

    .item-detail-modal .optrow {
      gap: 6px
    }

    .item-detail-modal .chip {
      max-width: 100%;
      white-space: normal;
      justify-content: flex-start;
      text-align: left
    }

    .item-detail-modal .opt {
      padding: 7px 10px;
      font-size: 11.5px;
      line-height: 1.25
    }

    .item-note-section textarea {
      min-height: 72px;
      resize: none;
      background: var(--surface2)
    }

    .item-detail-actions {
      margin-top: 0;
      flex-shrink: 0
    }

    .item-detail-actions .btn {
      min-height: 46px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap
    }

    .item-detail-media {
      min-width: 0;
      min-height: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(255, 255, 255, .12)
    }

    .item-detail-media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 16px
    }

    .item-detail-media.emoji {
      font-size: clamp(82px, 14vw, 180px);
      background: rgba(20, 31, 44, .38);
      color: #fff
    }

    @media (orientation: portrait),
    (max-width: 900px) {
      .item-detail-modal {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 58%) minmax(0, 42%);
        width: calc(100vw - 28px);
        height: calc(100vh - 28px);
        height: calc(100dvh - 28px);
        max-height: calc(100dvh - 28px)
      }

      .item-detail-info {
        border-left: 0;
        border-top: 1px solid rgba(255, 255, 255, .36);
        padding: 14px 16px 15px;
        gap: 10px;
        box-shadow: 0 -8px 24px rgba(15, 23, 42, .08)
      }

      .item-detail-media {
        padding: 14px 16px
      }

      .item-detail-scroll {
        gap: 9px;
        padding-right: 2px
      }

      .item-detail-head h2 {
        font-size: 20px;
        margin-bottom: 7px
      }

      .item-detail-section {
        gap: 5px
      }

      .item-note-section textarea {
        min-height: 58px
      }

      .item-detail-actions {
        display: grid;
        grid-template-columns: minmax(0, .9fr) minmax(0, 1.1fr);
        gap: 10px
      }

      .item-detail-actions .btn {
        min-height: 44px
      }
    }

    .ipad-overlay {
      background: rgba(13, 20, 29, .58);
      backdrop-filter: blur(7px) brightness(.76) saturate(.86);
      -webkit-backdrop-filter: blur(7px) brightness(.76) saturate(.86);
      z-index: 900;
      padding: 18px;
      overflow: hidden
    }

    .ipad-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .035);
      pointer-events: none
    }

    .ipad-overlay .modal {
      position: relative;
      z-index: 1;
      background: #fff;
      color: var(--text);
      box-shadow: 0 22px 58px rgba(17, 30, 43, .28)
    }

    .ipad-overlay .modal.item-detail-modal {
      background: rgba(255, 255, 255, .08);
      border: 1px solid rgba(255, 255, 255, .34);
      box-shadow: 0 26px 70px rgba(15, 23, 42, .32);
      backdrop-filter: blur(20px) saturate(1.08);
      -webkit-backdrop-filter: blur(20px) saturate(1.08)
    }

    .ipad-overlay .modal.item-detail-modal .item-detail-media {
      background: rgba(255, 255, 255, .05);
      backdrop-filter: blur(18px) saturate(1.06);
      -webkit-backdrop-filter: blur(18px) saturate(1.06)
    }

    .pay-customer-modal {
      max-width: 520px
    }

    .checkout-modal {
      max-width: 720px;
      padding: 0;
      overflow: hidden;
      border: 1px solid rgba(211, 216, 223, .9);
      box-shadow: 0 24px 70px rgba(15, 23, 42, .28)
    }

    .checkout-head {
      padding: 22px 24px 16px;
      background: linear-gradient(180deg, #fff, #f7fafc);
      border-bottom: 1px solid var(--border)
    }

    .checkout-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px
    }

    .checkout-title h2 {
      font-size: 19px;
      line-height: 1.25;
      margin: 0
    }

    .checkout-table {
      flex: 0 0 auto;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 800;
      color: var(--brand);
      background: var(--brand-dim);
      border: 1px solid rgba(8, 145, 178, .22);
      border-radius: 999px;
      padding: 5px 10px
    }

    .checkout-total-card {
      margin-top: 14px;
      border: 1px solid rgba(8, 145, 178, .18);
      background: linear-gradient(135deg, rgba(8, 145, 178, .08), rgba(63, 224, 143, .08));
      border-radius: 14px;
      padding: 13px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px
    }

    .checkout-total-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .45px
    }

    .checkout-total-card b {
      font-family: var(--mono);
      font-size: 24px;
      color: var(--brand);
      white-space: nowrap
    }

    .checkout-body {
      padding: 16px 24px 18px;
      display: grid;
      gap: 14px
    }

    .checkout-label {
      font-size: 11px;
      color: var(--faint);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .55px
    }

    .checkout-modal .pay-choice-grid {
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      margin: 7px 0 0;
      gap: 10px
    }

    }

    .realbook-reader-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0 0 38px;
      perspective: 2400px;
      perspective-origin: 50% 42%;
      touch-action: pan-y;
      overflow: hidden
    }

    .realbook-reader {
      position: relative;
      width: auto;
      height: 100%;
      max-width: 100%;
      aspect-ratio: var(--book-ratio, 566.929/850.394);
      transform-style: preserve-3d;
      filter: drop-shadow(0 18px 34px rgba(18, 31, 45, .16));
      --drag-p: 0
    }

    .realbook-sheet {
      position: absolute;
      inset: 0;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 20px 46px rgba(18, 31, 45, .2);
      transform-style: preserve-3d;
      backface-visibility: hidden;
      will-change: transform, opacity
    }

    .realbook-sheet::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255, 255, 255, .36), rgba(255, 255, 255, 0) 18%, rgba(0, 0, 0, 0) 72%, rgba(0, 0, 0, .28));
      opacity: 0;
      pointer-events: none;
      z-index: 2
    }

    .realbook-sheet::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(0, 0, 0, .28), transparent 8%, transparent 90%, rgba(0, 0, 0, .2));
      opacity: .16;
      pointer-events: none;
      z-index: 3
    }

    .realbook-sheet img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #fff
    }

    .realbook-curl,
    .realbook-dragcurl {
      position: absolute;
      bottom: 0;
      width: 42%;
      height: 42%;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      filter: drop-shadow(0 16px 18px rgba(18, 31, 45, .3))
    }

    .realbook-curl.next,
    .realbook-dragcurl.next {
      right: 0;
      transform-origin: 100% 100%;
      clip-path: polygon(100% 0, 100% 100%, 0 100%);
      background: linear-gradient(135deg, rgba(255, 255, 255, .96), rgba(225, 232, 240, .76) 46%, rgba(110, 39, 35, .28) 49%, rgba(255, 255, 255, .18) 52%, rgba(0, 0, 0, .18))
    }

    .realbook-curl.prev,
    .realbook-dragcurl.prev {
      left: 0;
      transform-origin: 0 100%;
      clip-path: polygon(0 0, 100% 100%, 0 100%);
      background: linear-gradient(225deg, rgba(255, 255, 255, .96), rgba(225, 232, 240, .76) 46%, rgba(110, 39, 35, .28) 49%, rgba(255, 255, 255, .18) 52%, rgba(0, 0, 0, .18))
    }

    .realbook-reader.drag-next .realbook-dragcurl.next {
      opacity: calc(var(--drag-p)*.95);
      transform: translate(calc(var(--drag-p)*-44%), calc(var(--drag-p)*-22%)) rotate(calc(var(--drag-p)*-24deg)) scale(calc(.26 + var(--drag-p)*.88))
    }

    .realbook-reader.drag-prev .realbook-dragcurl.prev {
      opacity: calc(var(--drag-p)*.95);
      transform: translate(calc(var(--drag-p)*44%), calc(var(--drag-p)*-22%)) rotate(calc(var(--drag-p)*24deg)) scale(calc(.26 + var(--drag-p)*.88))
    }

    .realbook-hotspots {

      color: #fff;
      white-space: nowrap;
      cursor: pointer;
      line-height: 1.2;

    .book-hotspot::before {
      content: "";
      position: absolute;
      inset: -5px;
      border-radius: 26px;
      border: 1px solid rgba(8, 145, 178, .4);
      animation: hotspotPulse 1.8s ease-in-out infinite
    }

    .book-hotspot.sold-out::before {

    @keyframes hotspotPulse {

      0%,
      100% {
        opacity: .45;
        transform: scale(.68)
      }

      50% {
        opacity: .08;
        transform: scale(1.55)
      }
    }

    .realbook-sheet.leave-left {
      transform-origin: left center;
      animation: bookLeaveLeft .78s cubic-bezier(.16, .72, .12, 1) forwards
    }

    .realbook-sheet.leave-right {
      transform-origin: right center;
      animation: bookLeaveRight .78s cubic-bezier(.16, .72, .12, 1) forwards
    }

    .realbook-sheet.leave-left::before,
    .realbook-sheet.leave-right::before {
      animation: bookCurlShade .78s ease-in-out forwards
    }

    .realbook-sheet.leave-left .realbook-curl.next {
      animation: bookCornerRight .78s cubic-bezier(.16, .72, .12, 1) forwards
    }

    .realbook-sheet.leave-right .realbook-curl.prev {
      animation: bookCornerLeft .78s cubic-bezier(.16, .72, .12, 1) forwards
    }

    .realbook-sheet.enter-right {
      animation: bookEnterRight .78s cubic-bezier(.16, .72, .12, 1) forwards
    }

    .realbook-sheet.enter-left {
      animation: bookEnterLeft .78s cubic-bezier(.16, .72, .12, 1) forwards
    }

    @keyframes bookLeaveLeft {
      0% {
        transform: translateX(0) rotateY(0) skewY(0);
        opacity: 1
      }

      32% {
        transform: translateX(-6%) rotateY(-44deg) skewY(-1.2deg);
        opacity: 1
      }

      70% {
        transform: translateX(-38%) rotateY(-92deg) skewY(-2deg);
        opacity: .78
      }

      100% {
        transform: translateX(-72%) rotateY(-142deg) skewY(-2.2deg);
        opacity: .04
      }
    }

    @keyframes bookLeaveRight {
      0% {
        transform: translateX(0) rotateY(0) skewY(0);
        opacity: 1
      }

      32% {
        transform: translateX(6%) rotateY(44deg) skewY(1.2deg);
        opacity: 1
      }

      70% {
        transform: translateX(38%) rotateY(92deg) skewY(2deg);
        opacity: .78
      }

      100% {
        transform: translateX(72%) rotateY(142deg) skewY(2.2deg);
        opacity: .04
      }
    }

    @keyframes bookEnterRight {
      0% {
        transform: translateX(12%) rotateY(18deg);
        filter: brightness(.82)
      }

      100% {
        transform: translateX(0) rotateY(0);
        filter: brightness(1)
      }
    }

    @keyframes bookEnterLeft {
      0% {
        transform: translateX(-12%) rotateY(-18deg);
        filter: brightness(.82)
      }

      100% {
        transform: translateX(0) rotateY(0);
        filter: brightness(1)
      }
    }

    @keyframes bookCurlShade {
      0% {
        opacity: .05
      }

      42% {
        opacity: .92
      }

      100% {
        opacity: .2
      }
    }

    @keyframes bookCornerLeft {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(0) scale(.24)
      }

      18% {
        opacity: .95;
        transform: translate(16%, -10%) rotate(10deg) scale(.66)
      }

      58% {
        opacity: .9;
        transform: translate(52%, -25%) rotate(22deg) scale(1)
      }

      100% {
        opacity: .08;
        transform: translate(96%, -42%) rotate(38deg) scale(1.18)
      }
    }

    @keyframes bookCornerRight {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(0) scale(.24)
      }

      18% {
        opacity: .95;
        transform: translate(-16%, -10%) rotate(-10deg) scale(.66)
      }

        opacity: .9;
        transform: translate(-52%, -25%) rotate(-22deg) scale(1)
      }

    }

    }

    .realbook-carttab .cart-toggle {

      align-items: center;
      justify-content: center;

    }

    @media (orientation:portrait) {

      }

      }

      }

    @media (max-width:560px) and (orientation:portrait) {
      .book-stage {
        padding: 12px 8px 190px
      }

      .book-page {
        min-height: 700px;
        border-radius: 15px;

      }

      }
    }

    /* ── Responsive breakpoints ────────────────────────────────────────────── */

    /* Desktop / tablet ngang (> 640px): luôn đúng 3 cột */
    @media (min-width:641px) {
      .ipad-body {
        grid-template-columns: clamp(70px, 9vw, 120px) minmax(0, 1fr) clamp(160px, 22vw, 300px)
      }

      }

    /* Mobile (≤ 640px): 2 cột */
    @media (max-width:640px) {

        grid-template-columns: clamp(58px, 14vw, 88px) minmax(0, 1fr) clamp(120px, 36vw, 190px)
      }

        gap: 8px;

      }

    /* Rất nhỏ (≤ 380px): 2 cột compact */

      }

      }
      .mi .nm { font-size: 11px }

    }
  </style>

<body>
  <div class="ipad-frame" id="frame">
    <div class="empty" style="margin:auto">Đang tải iPad…</div>
  </div>

  <script type="module">
    import { api, connect, money, toast, esc, startClock, getLang, setLang, requestPinCode, selectedBranch } from '/shared/client.js';

    let MENU = { categories: [], items: [] };
    let tableId = localStorage.getItem('ipad_table') || null;
    let tableCode = localStorage.getItem('ipad_tablecode') || null;
    let activeCat = null;
    let cart = [];          // {key, item, qty, mods:[], note}
    let sentOrder = null;   // last fetched open order
    let operationsConfig = null;
    const frame = document.getElementById('frame');
    let staffTapCount = 0, staffTapTimer = null;
    let BOOK = {
      id: 'book_default',
      title: 'Menu Bon Appetit Dan',
      pageWidth: 566.929016,
      pageHeight: 850.394043,
      pages: Array.from({ length: 28 }, (_, i) => ({ id: `p_${i + 1}`, src: `/assets/menu-book/${String(i + 1).padStart(2, '0')}.webp`, label: `Trang ${i + 1}` })),
      hotspots: [],
    };
    let bookPage = 0, bookAnimating = false, audioCtx = null;
    const portraitMq = window.matchMedia('(orientation: portrait)');
    portraitMq.addEventListener?.('change', () => render());

    function ipadHomeBrand() {
      const br = selectedBranch();
      const name = br.name || br.code || br.id || 'Dan D Pak';
      const label = getLang() === 'en' ? `Branch: ${name} · Live` : `Chi nhánh: ${name} · Trực tiếp`;
      return `<a class="ipad-home-logo" href="/" aria-label="Về màn hình chính" title="Về màn hình chính"><small>${esc(label)}</small></a>`;
    }

    function showFatal(msg) { if (frame) frame.innerHTML = `<div style="padding:30px;color:var(--late);font-family:var(--mono);font-size:13px;line-height:1.7">⚠ Lỗi iPad:<br>${msg}<br><br><button class="btn" onclick="location.reload()">Tải lại</button></div>`; }
    window.addEventListener('error', e => showFatal((e.message || 'Script error') + (e.filename ? ('<br>@ ' + e.filename + ':' + e.lineno) : '')));
    window.addEventListener('unhandledrejection', e => showFatal('Promise: ' + (e.reason?.message || e.reason)));

    const socket = connect('ipad', {
      'menu:updated': () => { loadMenu().then(render); },
      'book-menu:updated': () => { loadBookManifest().then(() => { bookPage = 0; render(); preloadBookPages(); }); },
      'order:item': (p) => { if (sentOrder && p.order_id === sentOrder.id) { sentOrder = p.order; render(); } },
      'order:pending': (p) => { if (sentOrder && p.order?.id === sentOrder.id) { sentOrder = p.order; render(); } },
      'order:updated': (p) => { if (sentOrder && p?.id === sentOrder.id) { sentOrder = p; render(); } },
      'payment:done': (p) => { if (sentOrder && p.order_id === sentOrder.id) { sentOrder = null; cart = []; toast('Bàn đã thanh toán xong. Cảm ơn quý khách!'); render(); } },
    });

    async function loadMenu() { MENU = await api('/menu'); if (!activeCat) activeCat = MENU.categories[0]?.id; }
    async function refreshOrder() { if (!tableId) return; const t = await api('/tables/' + tableId); sentOrder = t.order; }
    async function loadOperations() {
      try { operationsConfig = await api('/operations/config'); }
      catch {
        operationsConfig = {
          payment: {
            bankCode: 'VCB', bankAccount: '0123456789', accountName: 'DAN D PAK', transferPrefix: 'DANBILL', methods: [
              { key: 'qrcode', label: 'QR Code', enabled: true, kind: 'qr' },
              { key: 'internet_banking', label: 'Internet Banking', enabled: true, kind: 'qr' },
              { key: 'cash', label: 'Tiền mặt', enabled: true, kind: 'cash' },
              { key: 'card', label: 'Cà thẻ', enabled: true, kind: 'pos' },
            ]
          }
        };
      }
    }
    async function loadBookManifest() {
      try {
        const payload = await api('/book-menu');
        if (payload?.book?.pages?.length) BOOK = normalizeBook(payload.book);
      } catch { }
    }
    function normalizeBook(b) {
      const pages = (b.pages || []).map((p, i) => typeof p === 'string'
        ? { id: `p_${i + 1}`, src: p, label: `Trang ${i + 1}` }
        : { id: p.id || `p_${i + 1}`, src: p.src, label: p.label || `Trang ${i + 1}` }).filter(p => p.src);
      return {
        id: b.id || 'book_default',
        title: b.title || 'Menu',
        pageWidth: Number(b.pageWidth) || 566.929016,
        pageHeight: Number(b.pageHeight) || 850.394043,
        pages,
        hotspots: Array.isArray(b.hotspots) ? b.hotspots : [],
      };
    }
    const bookPages = () => BOOK.pages || [];
    const bookPageSrc = (idx) => bookPages()[idx]?.src || '';
    function bookHotspots(idx) {
      const items = new Map(MENU.items.map(i => [i.id, i]));
      return (BOOK.hotspots || []).filter(h => h.enabled !== false && Number(h.page) === idx && items.has(h.menu_item_id));
    }
    function hotspotItem(id) {
      const h = (BOOK.hotspots || []).find(x => x.id === id);
      return h ? MENU.items.find(i => i.id === h.menu_item_id) : null;
    }

    /**
     * Sắp xếp danh sách món: món còn hàng lên trước,
     * món tạm ngưng (available === false) xuống cuối.
     * Giữ thứ tự gốc trong từng nhóm.
     */
    function sortMenuItems(items) {
      return [
        ...items.filter(i => i.available !== false),
        ...items.filter(i => i.available === false),
      ];
    }

    function render() {
      if (!tableId) { renderTablePick(); return; }
      if (portraitMq.matches) { renderBook(); return; }
      renderLandscape();
    }

    function renderLandscape() {
      // Sắp xếp: món còn hàng trước, tạm ngưng xuống cuối
      const items = sortMenuItems(MENU.items.filter(i => i.category_id === activeCat));
      const activeSentCount = (sentOrder?.items || []).filter(i => i.status !== 'cancelled').length;
      const showCartHint = !cart.length && activeSentCount === 0;
      frame.innerHTML = `
  <div class="ipad-top">
    ${ipadHomeBrand()}
    <span class="tbl" id="staffUnlock" title="Chạm 3 lần để chọn lại bàn">Bàn ${esc(tableCode)}</span>
    <div class="sub" style="color:var(--muted);font-size:12px">Tự chọn món · chờ nhân viên xác nhận</div>
    <div class="right">
      <span class="onlinedot"><i></i><span>Online</span></span>
      <div class="lang-selector" style="display:inline-flex;gap:4px;margin-right:10px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface2);border:1px solid var(--border2);border-radius:99px;padding:4px 10px;user-select:none;">
        <span id="langViBtn" style="${getLang() === 'vi' ? 'color:var(--primary);text-decoration:underline;' : 'color:var(--muted);'}">VI</span> | 
        <span id="langEnBtn" style="${getLang() === 'en' ? 'color:var(--primary);text-decoration:underline;' : 'color:var(--muted);'}">EN</span>
      </div>
      <button class="btn sm" id="callBtn">🔔 Gọi nhân viên</button>
    </div>
  </div>
  <div class="ipad-body">
    <div class="cats">${MENU.categories.map(c => `
      <div class="cat ${c.id === activeCat ? 'active' : ''}" data-c="${c.id}">
        <span class="ci">${c.icon || '🍽️'}</span>${esc(c.name)}</div>`).join('')}</div>
    <div class="menulist">${items.map(renderMI).join('') || '<div class="empty">Chưa có món trong nhóm này</div>'}</div>
    <div class="cartpane ${cart.length || activeSentCount ? 'has-items' : 'is-empty'}">
      <h3>🛒 Giỏ hàng <span class="chip c-muted">${cart.reduce((s, c) => s + c.qty, 0)} món</span></h3>
      <div class="cartscroll">
        ${cart.length ? `<div class="cartitems">${cart.map(renderCart).join('')}</div>` : ''}
        ${showCartHint ? '<div class="cart-empty"><span>Chọn món trên màn hình</span></div>' : ''}
        ${renderSent()}
      </div>
      <div class="cartfoot">
        <div class="tot"><span>Tạm tính</span><span>${money(cartTotal())}</span></div>
        ${cart.length
          ? '<button class="btn primary" id="sendBtn">Gửi yêu cầu →</button>'
          : (activeSentCount ? `<button class="btn pay-cta" id="payBtn2">💳 Thanh toán${sentOrder?.total ? ` · ${money(sentOrder.total)}` : ''}</button>` : '')}
      </div>
    </div>
  </div>`;
      bind();
    }

    function renderBook() {
      const pages = bookPages();
      const total = pages.length || 1;
      bookPage = Math.max(0, Math.min(bookPage, total - 1));
      const ratio = `${Number(BOOK.pageWidth) || 566.929}/${Number(BOOK.pageHeight) || 850.394}`;
      const activeSentCount = (sentOrder?.items || []).filter(i => i.status !== 'cancelled').length;
      frame.innerHTML = `
  <div class="ipad-top">
    ${ipadHomeBrand()}
    <span class="tbl" id="staffUnlock" title="Chạm 3 lần để chọn lại bàn">Bàn ${esc(tableCode)}</span>
    <div class="sub" style="color:var(--muted);font-size:12px">Vuốt để lật menu</div>
    <div class="right">
      <span class="onlinedot"><i></i><span>Online</span></span>
      <div class="lang-selector" style="display:inline-flex;gap:4px;margin-right:10px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface2);border:1px solid var(--border2);border-radius:99px;padding:4px 10px;user-select:none;">
        <span id="langViBtn" style="${getLang() === 'vi' ? 'color:var(--primary);text-decoration:underline;' : 'color:var(--muted);'}">VI</span> | 
        <span id="langEnBtn" style="${getLang() === 'en' ? 'color:var(--primary);text-decoration:underline;' : 'color:var(--muted);'}">EN</span>
      </div>
      <button class="btn sm" id="callBtn">🔔 Gọi nhân viên</button>
    </div>
  </div>
  <div class="realbook">
    <div class="realbook-hint">Vuốt trái/phải để lật trang</div>
    <div class="realbook-reader-wrap" id="bookSwipe">
      <div class="realbook-reader" id="bookReader" style="--book-ratio:${ratio}">${bookSheetHtml(bookPage)}</div>
    </div>
    <div class="realbook-nav">
      <button id="bookPrev" ${bookPage <= 0 ? 'disabled' : ''}>‹</button>
      <div class="realbook-count" id="bookCount">${bookPage + 1} / ${total}</div>
      <button id="bookNext" ${bookPage >= total - 1 ? 'disabled' : ''}>›</button>
    </div>
    <div class="realbook-carttab ${cart.length || activeSentCount ? 'has-items' : 'is-empty'}">
      <button class="cart-toggle" type="button">🛒</button>
      <div class="cart-summary">
        <b>${cart.reduce((s, c) => s + c.qty, 0)} món trong giỏ</b>
        <span>${money(cartTotal())}</span>
      </div>
      ${cart.length
          ? '<button class="btn primary send" id="sendBtn">Gửi yêu cầu →</button>'
          : (activeSentCount ? `<button class="btn pay-cta send" id="payBtn2">💳 Thanh toán${sentOrder?.total ? ` · ${money(sentOrder.total)}` : ''}</button>` : '')}
    </div>
  </div>`;
      bind();
      bindBook();
    }

    function bookSheetHtml(idx, extra = '') {
      const hotspots = bookHotspots(idx);
      return `<div class="realbook-sheet ${extra}" data-page="${idx}">
    <img src="${esc(bookPageSrc(idx))}" alt="Menu page ${idx + 1}" draggable="false">
    <div class="realbook-hotspots">${hotspots.map(h => {
        const it = MENU.items.find(i => i.id === h.menu_item_id);
        const isSoldOut = it ? (it.available === false || it.available === 0) : false;
        const btnText = isSoldOut ? 'Hết món' : 'Chọn Món';
        const color = isSoldOut ? '#6b7280' : (h.color || '#0891b2');
        const styleStr = `left:${Number(h.x) || 0}%;top:${Number(h.y) || 0}%;rotate:${Number(h.angle) || 0}deg;background:${color};color:#fff;${isSoldOut ? 'opacity:0.8;cursor:not-allowed;' : ''}`;
        return `<button class="book-hotspot ${isSoldOut ? 'sold-out' : ''}" data-hotspot="${esc(h.id)}" title="${esc(h.label || it?.name || 'Món')}" style="${styleStr}">${esc(btnText)}</button>`;
      }).join('')}</div>
    <span class="realbook-curl next"></span><span class="realbook-curl prev"></span>
    <span class="realbook-dragcurl next"></span><span class="realbook-dragcurl prev"></span>
  </div>`;
    }

    function renderMI(i) {
      const img = i.image
        ? `<div class="mi-img"><img src="${esc(i.image)}" alt="" loading="lazy" onerror="this.parentElement.classList.add('emoji');this.remove();this.parentElement.textContent='${i.emoji || '🍽️'}'"></div>`
        : `<div class="mi-img emoji">${i.emoji || '🍽️'}</div>`;
      return `<div class="mi ${i.available ? '' : 'off'}" data-m="${i.id}">
    ${img}
    <div class="mi-info">
      <div class="nm">${esc(i.name)}</div>
      <div class="pr">${money(i.price)}</div>
      <div class="mi-desc">${esc(i.description || '')}</div>
      <div class="sla">⏱ ${i.sla_minutes}′ · ${stationLabel(i.station)}</div>
    </div>
  </div>`;
    }
    function renderBookItem(i) {
      const img = i.image
        ? `<img src="${esc(i.image)}" alt="" loading="lazy" onerror="this.parentElement.textContent='${i.emoji || '🍽️'}';this.remove()">`
        : `${i.emoji || '🍽️'}`;
      return `<div class="book-item ${i.available ? '' : 'off'}" data-m="${i.id}">
    <div class="book-photo">${img}</div>
    <div class="book-info">
      <b>${esc(i.name)}</b>
      <p>${esc(i.description || ((i.ingredients || []).length ? 'Nguyên liệu: ' + i.ingredients.slice(0, 5).join(', ') : 'Chạm để xem chi tiết và tùy chọn món.'))}</p>
      <div class="price">${money(i.price)}</div>
    </div>
  </div>`;
    }
    function renderCart(c, idx) {
      const modTxt = c.mods.map(m => m.name).join(', ');
      return `<div class="cline">
    <div class="r1"><span>${c.item.emoji || ''} ${esc(c.item.name)}</span><span class="p">${money(lineTotal(c))}</span></div>
    ${modTxt ? `<div class="mods">+ ${esc(modTxt)}</div>` : ''}
    ${c.note ? `<div class="note">“${esc(c.note)}”</div>` : ''}
    <div class="r2">
      <button class="qbtn" data-dec="${c.key}">−</button>
      <span class="qty">${c.qty}</span>
      <button class="qbtn" data-inc="${c.key}">+</button>
      <button class="rm" data-rm="${c.key}">✕</button>
    </div>
  </div>`;
    }
    function sentHeader(active) {
      if (active.some(i => i.status === 'pending_confirm')) return 'Chờ nhân viên xác nhận';
      if (active.some(i => ['new', 'accepted', 'preparing'].includes(i.status))) return 'Bếp đang chuẩn bị món của bạn';
      if (active.length && active.every(i => ['ready', 'served'].includes(i.status))) return 'Món đã sẵn sàng — mời quý khách dùng bữa';
      return 'Đơn của bàn';
    }
    function renderSent() {
      if (!sentOrder || !sentOrder.items?.length) return '';
      const active = sentOrder.items.filter(i => i.status !== 'cancelled');
      return `<div class="sentlist"><h4>${sentHeader(active)} · bill #${esc(sentOrder.bill_no || sentOrder.id.slice(-6).toUpperCase())}</h4>

    function bindBook() {
      const prev = document.getElementById('bookPrev');

      if (prev) prev.onclick = () => turnBook(-1);
      if (next) next.onclick = () => turnBook(1);
      document.querySelectorAll('[data-hotspot]').forEach(b => b.onclick = e => {
        e.preventDefault();

        if (it) {

            return;
          }
          openItemModal(it);
        }
      });
      const swipe = document.getElementById('bookSwipe');
      if (!swipe) return;
      const reader = document.getElementById('bookReader');
      function resetDrag() {
        reader?.classList.remove('drag-next', 'drag-prev');
        reader?.style.setProperty('--drag-p', 0);
      }
      let sx = 0, sy = 0, tracking = false;
      swipe.onpointerdown = e => {
        if (e.target.closest?.('[data-hotspot]')) return;
        tracking = true; sx = e.clientX; sy = e.clientY; swipe.setPointerCapture?.(e.pointerId);
      };
      swipe.onpointermove = e => {
        if (!tracking || !reader) return;
        const rect = swipe.getBoundingClientRect();
        const dx = e.clientX - sx, dy = e.clientY - sy;
        if (Math.abs(dx) < 8 || Math.abs(dx) < Math.abs(dy) * .75) { resetDrag(); return; }
        const dir = dx < 0 ? 1 : -1;
        const nextPage = bookPage + dir;
        if (nextPage < 0 || nextPage >= bookPages().length) { resetDrag(); return; }
        const p = Math.min(.98, Math.abs(dx) / (rect.width * .42));
        reader.style.setProperty('--drag-p', p.toFixed(3));
        reader.classList.toggle('drag-next', dir > 0);
        reader.classList.toggle('drag-prev', dir < 0);
      };
      swipe.onpointerup = e => {
        if (!tracking) return;
        tracking = false;
        const dx = e.clientX - sx, dy = e.clientY - sy;
        resetDrag();
        if (Math.abs(dx) > 54 && Math.abs(dx) > Math.abs(dy) * 1.15) turnBook(dx < 0 ? 1 : -1);
        else if (Math.abs(dx) < 8 && Math.abs(dy) < 8) {
          const rect = swipe.getBoundingClientRect();
          turnBook(e.clientX > rect.left + rect.width / 2 ? 1 : -1);
        }
      };
      swipe.onpointercancel = () => { tracking = false; resetDrag(); };

    function playFlipSound() {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        audioCtx = audioCtx || new AC();
        const ctx = audioCtx;
        if (ctx.state === 'suspended') ctx.resume();
        const dur = .18;
        const buffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * dur), ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          const t = i / data.length;
          data[i] = (Math.random() * 2 - 1) * (1 - t) * (.32 + .28 * Math.sin(t * Math.PI * 9));
        }
        const src = ctx.createBufferSource();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 950; filter.Q.value = .9;
        gain.gain.setValueAtTime(.0001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(.18, ctx.currentTime + .025);
        gain.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime + dur);
        src.buffer = buffer;
        src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        src.start();
      } catch { }
    }

      function showThanks(orderId, total) {
        ov.innerHTML = `<div class="modal pay-customer-modal">
          <div class="thanks-head"><div class="big">✅</div><h2 style="margin-top:6px">Đã nhận được tiền</h2>
            <div class="sub">Cảm ơn quý khách đã dùng bữa tại <b>Dan D Pak</b>! Hẹn gặp lại quý khách 💚</div></div>
          <div style="margin-top:16px">
            <b style="font-size:14px">Quý khách có muốn xuất hóa đơn VAT (hóa đơn đỏ) không?</b>
            <div class="pay-choice-grid" style="grid-template-columns:1fr 1fr;margin-top:10px">
              <button class="pay-choice" id="invNo">Không cần<small>Hoàn tất, cảm ơn quý khách</small></button>
              <button class="pay-choice sel" id="invYes">Có, xuất hóa đơn<small>Điền thông tin doanh nghiệp</small></button>
            </div>
          </div>
        </div>`;
        ov.querySelector('#invNo').onclick = async () => {
          try { await api('/orders/' + orderId + '/customer-invoice', { method: 'POST', body: { decision: 'decline' } }); } catch (e) { /* vẫn cho khách rời đi */ }
          toast('Cảm ơn quý khách! Hẹn gặp lại 💚'); finishFlow();
        };
        ov.querySelector('#invYes').onclick = () => showInvoiceForm(orderId, total);
      }
      function showInvoiceForm(orderId, total) {
        ov.innerHTML = `<div class="modal pay-customer-modal">
          <h2>🧾 Xuất hóa đơn đỏ (VAT)</h2>
          <div class="sub">Tổng tiền <b style="font-family:var(--mono);color:var(--brand)">${money(total)}</b> · vui lòng điền chính xác thông tin xuất hóa đơn GTGT.</div>
          <div class="inv-form">
            <div class="inv-row"><label>Mã số thuế <span class="req">*</span></label>
              <div class="inv-mst"><input id="invMst" type="text" inputmode="numeric" placeholder="Nhập MST 10 hoặc 13 số"><button id="invLookup" type="button">🔍 Truy xuất</button></div>
              <div class="inv-note" id="invMstNote">Bấm “Truy xuất” để tự điền tên đơn vị &amp; địa chỉ từ cơ quan thuế.</div>
            </div>
            <div class="inv-row"><label>Tên đơn vị / công ty</label><input id="invCompany" type="text" placeholder="Tên hiển thị trên hóa đơn"></div>
            <div class="inv-row"><label>Địa chỉ</label><input id="invAddress" type="text" placeholder="Địa chỉ đơn vị"></div>
            <div class="inv-row"><label>Số điện thoại <span class="req">*</span></label><input id="invPhone" type="text" inputmode="tel" placeholder="SĐT nhận thông báo hóa đơn"></div>
            <div class="inv-row"><label>Email nhận hóa đơn <span class="req">*</span></label><input id="invEmail" type="text" inputmode="email" placeholder="email@congty.vn"></div>
            <label class="inv-confirm"><input type="checkbox" id="invConfirm"><span>Tôi xác nhận mọi thông tin trên là chính xác và chịu trách nhiệm về thông tin xuất hóa đơn.</span></label>
          </div>
          <div class="mfoot"><button class="btn" id="invBack">Quay lại</button><button class="btn primary" id="invSubmit" disabled>Xuất hóa đơn đỏ</button></div>
        </div>`;
        const $ = s => ov.querySelector(s);
        const submitBtn = $('#invSubmit');
        const validate = () => {
          const ok = $('#invMst').value.trim() && $('#invPhone').value.trim()
            && /\S+@\S+\.\S+/.test($('#invEmail').value.trim()) && $('#invConfirm').checked;
          submitBtn.disabled = !ok;
        };
        ['#invMst', '#invCompany', '#invAddress', '#invPhone', '#invEmail'].forEach(s => $(s).oninput = validate);
        $('#invConfirm').onchange = validate;
        $('#invBack').onclick = () => showThanks(orderId, total);
        $('#invLookup').onclick = async () => {
          const mst = $('#invMst').value.trim();
          if (!mst) return toast('Nhập mã số thuế trước', true);
          const note = $('#invMstNote'), btn = $('#invLookup');
          btn.disabled = true; note.textContent = 'Đang tra cứu thông tin...';
          try {
            const r = await api('/public/tax-lookup/' + encodeURIComponent(mst));
            if (r.ok) {
              $('#invCompany').value = r.company || r.name || '';
              $('#invAddress').value = r.address || '';
              note.textContent = '✅ Đã tự điền theo MST. Vui lòng kiểm tra lại.';
            } else { note.textContent = r.message || 'Không tra cứu được, vui lòng nhập tay.'; }
          } catch (e) { note.textContent = e.message || 'Không tra cứu được, vui lòng nhập tay.'; }
          btn.disabled = false; validate();
        };
        $('#invSubmit').onclick = async () => {
          submitBtn.disabled = true;
          try {
            const res = await api('/orders/' + orderId + '/customer-invoice', {
              method: 'POST', body: {
                decision: 'issue', customer: {
                  tax_code: $('#invMst').value.trim(), company: $('#invCompany').value.trim(), name: $('#invCompany').value.trim(),
                  address: $('#invAddress').value.trim(), phone: $('#invPhone').value.trim(), email: $('#invEmail').value.trim(),
                }
              }
            });
            showInvoiceDone(res?.invoice?.invoice_no || '');
          } catch (e) { toast(e.message, true); submitBtn.disabled = false; }
        };
      }
      function showInvoiceDone(invNo) {
        ov.innerHTML = `<div class="modal pay-customer-modal">
          <div class="thanks-head"><div class="big">🧾</div><h2 style="margin-top:6px">Đã xuất hóa đơn đỏ</h2>
            <div class="sub">${invNo ? `Số hóa đơn <b>${esc(invNo)}</b>. ` : ''}Hóa đơn điện tử sẽ được gửi tới email quý khách. Cảm ơn quý khách đã dùng bữa! 💚</div></div>
          <div class="mfoot"><button class="btn primary" id="invFinish" style="grid-column:1/-1;width:100%">Hoàn tất</button></div>
        </div>`;
        ov.querySelector('#invFinish').onclick = finishFlow;
      }
      document.body.appendChild(ov);
      redraw();
    }

    (async () => { try { await Promise.all([loadMenu(), loadBookManifest(), loadOperations()]); await refreshOrder(); render(); preloadBookPages(); } catch (e) { showFatal(e.message); } })();
  </script>
</body>

</html>
