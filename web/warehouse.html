<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Warehouse</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/socket.io/socket.io.js"></script>
<style>
.whbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.whpill{padding:9px 13px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-weight:700;font-size:12px}
.whpill.active{background:var(--brand-dim);border-color:rgba(52,210,238,.4);color:var(--brand)}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.subtab{padding:8px 12px;border-radius:9px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:12.5px;font-weight:700}
.subtab.active{background:var(--surface3);color:var(--text);border-color:var(--border2)}
.tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.recv{width:92px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 9px;font-family:var(--mono);font-size:12.5px}
.recv:focus,.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--brand)}
.typetag{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px}
.lotwarn{color:var(--late)}.lotok{color:var(--done)}
.var-pos{color:var(--done)}.var-neg{color:var(--late)}
.mtag{display:inline-block;padding:1px 8px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase}
.mt-sale,.mt-recipe,.mt-issue,.mt-transfer_out{background:var(--late-bg);color:var(--late)}
.mt-receipt,.mt-return,.mt-transfer_in,.mt-opening{background:var(--done-bg);color:var(--done)}
.mt-stocktake{background:var(--doing-bg);color:var(--doing)}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.formgrid .full{grid-column:1/-1}
@media(max-width:720px){.formgrid{grid-template-columns:1fr}}
.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px;font-family:var(--font)}
.modal input[type="checkbox"]{width:auto;margin-right:7px}
.hint{font-size:11px;color:var(--faint);line-height:1.45}
.skucell{display:flex;align-items:center;gap:9px;min-width:220px}
.skuimg{width:42px;height:42px;border-radius:8px;object-fit:cover;background:var(--surface2);border:1px solid var(--border);flex:0 0 auto}
.skuico{width:42px;height:42px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto}
.whmanage{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.whrow{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:9px 0;border-bottom:1px dashed var(--border)}
.whrow:last-child{border-bottom:none}
</style></head>
<body>
<div id="top"></div>
<div class="view">
  <div class="viewhead">
    <h1>📦 Warehouse</h1>
    <div class="sub">Stock receiving · issuing · lot/expiry · stocktake · kitchen vs retail warehouse</div>
    <div class="right">
      <button class="btn sm" id="warehouseBtn">➕ Create warehouse</button>
      <span id="alertChip"></span>
    </div>
  </div>
  <div class="whbar" id="warehouses"></div>
  <div class="subtabs" id="subtabs"></div>
  <div id="panel"></div>
</div>

<script type="module">
import { api, connect, money, toast, esc, startClock, topbar, requireModuleAccess, renderUserChip } from '/shared/client.js';
document.getElementById('top').innerHTML = topbar('warehouse');
await requireModuleAccess('warehouse'); renderUserChip();

const TABS = [
  ['stock','Stock'],
  ['ops','Receive / Issue'],
  ['docs','Documents'],
  ['count','Stocktake'],
  ['lots','Lots & Expiry'],
  ['hist','History'],
];
let tab='stock', warehouses=[], activeWh='wh_kitchen', stock=[], lots=[], editingWarehouse=null;
let countSheet=[]; // KiotViet-style stocktake sheet: [{id,stock_type,name,unit,cost,lot_id,counted}]

connect('warehouse', { 'inventory:updated':()=>load(), 'inventory:alert':a=>toast(`Low stock: ${a.name} has ${a.stock}${a.unit} left`, true) });
document.getElementById('warehouseBtn').onclick=()=>openWarehouseManager();

async function load(){
  warehouses = await api('/warehouses');
  if(!warehouses.some(w=>w.id===activeWh)) activeWh = warehouses[0]?.id || 'wh_kitchen';
  const wh = curWh();
  const [items, lotRows] = await Promise.all([
    wh?.type === 'retail' ? api('/skus?warehouse_id='+encodeURIComponent(activeWh)) : api('/inventory?warehouse_id='+encodeURIComponent(activeWh)),
    api('/warehouse/lots?warehouse_id='+encodeURIComponent(activeWh)),
  ]);
  stock = items;
  lots = lotRows;
  const lows = stock.filter(s=>s.low);
  const exp = lots.filter(l=>l.expiry_date && daysLeft(l.expiry_date) <= 7);
  document.getElementById('alertChip').innerHTML =
    lows.length || exp.length
      ? `<span class="chip c-late">⚠ ${lows.length} low stock · ${exp.length} lots near expiry</span>`
      : `<span class="chip c-done">✓ Stock OK</span>`;
  render();
}

function curWh(){ return warehouses.find(w=>w.id===activeWh); }
function warehouseIcon(w){ return w?.type==='retail' ? '🏬' : '🍳'; }
function render(){
  renderWarehouses();
  renderTabs();
  ({stock:renderStock,ops:renderOps,docs:renderDocs,count:renderCount,lots:renderLots,hist:renderHist}[tab])();
}
function renderWarehouses(){
  document.getElementById('warehouses').innerHTML = warehouses.map(w =>
    `<button class="whpill ${w.id===activeWh?'active':''}" data-wh="${w.id}">${warehouseIcon(w)} ${esc(w.name)}</button>`).join('');
  document.querySelectorAll('.whpill').forEach(b=>b.onclick=()=>{activeWh=b.dataset.wh;load();});
}
function renderTabs(){
  document.getElementById('subtabs').innerHTML = TABS.map(([k,n])=>`<button class="subtab ${k===tab?'active':''}" data-t="${k}">${n}</button>`).join('');
  document.querySelectorAll('.subtab').forEach(b=>b.onclick=()=>{tab=b.dataset.t;render();});
}

async function openWarehouseManager(){
  editingWarehouse=null;
  const ov=document.createElement('div'); ov.className='overlay show'; document.body.appendChild(ov);
  await renderWarehouseManager(ov);
}

async function renderWarehouseManager(ov){
  const rows=await api('/warehouses?all=1');
  const w=editingWarehouse||{};
  ov.innerHTML=`<div class="modal" style="max-width:680px">
    <h2>${editingWarehouse?'Edit warehouse':'Create new warehouse'}</h2>
    <div class="sub">Admins or staff with warehouse management permissions can create retail / showroom / kitchen warehouses.</div>
    <div class="formgrid">
      <div><label>Warehouse name</label><input id="whName" value="${esc(w.name||'')}" placeholder="e.g. Showroom BCM"></div>
      <div><label>Warehouse code</label><input id="whCode" value="${esc(w.code||'')}" placeholder="Auto-generated if blank"></div>
      <div><label>Warehouse type</label><select id="whType"><option value="retail" ${w.type!=='kitchen'?'selected':''}>Retail warehouse</option><option value="kitchen" ${w.type==='kitchen'?'selected':''}>Kitchen / supplies warehouse</option></select></div>
      <div><label>Sort order</label><input id="whSort" type="number" value="${w.sort??''}" placeholder="0"></div>
      <div><label>Status</label><select id="whActive"><option value="1" ${w.active!==0?'selected':''}>Active</option><option value="0" ${w.active===0?'selected':''}>Inactive</option></select></div>
    </div>
    <div class="mfoot">
      <button class="btn" id="whReset">${editingWarehouse?'Cancel edit':'Reset'}</button>
      <button class="btn primary" id="whSave">${editingWarehouse?'Save warehouse':'➕ Create warehouse'}</button>
    </div>
    <div class="whmanage">
      <h3>Warehouse list</h3>
      ${rows.map(x=>`<div class="whrow">
        <div>${warehouseIcon(x)} <b>${esc(x.name)}</b><br><span class="hint">${esc(x.code)} · ${x.type==='retail'?'Retail / showroom':'Kitchen / supplies'} · ${x.active?'active':'inactive'}</span></div>
        <span class="chip ${x.active?'c-done':'c-muted'}">${x.active?'Active':'Inactive'}</span>
        <button class="btn sm" data-edit-wh="${x.id}">Edit</button>
      </div>`).join('') || '<div class="empty">No warehouses yet</div>'}
    </div>
    <div class="mfoot"><button class="btn primary" id="whClose">Close</button></div>
  </div>`;
  ov.querySelector('#whReset').onclick=()=>{editingWarehouse=null;renderWarehouseManager(ov);};
  ov.querySelector('#whClose').onclick=()=>ov.remove();
  ov.querySelector('#whSave').onclick=async()=>{
    const sortText=ov.querySelector('#whSort').value.trim();
    const body={
      name:ov.querySelector('#whName').value.trim(),
      code:ov.querySelector('#whCode').value.trim(),
      type:ov.querySelector('#whType').value,
      active:ov.querySelector('#whActive').value==='1',
    };
    if(sortText) body.sort=parseInt(sortText)||0;
    if(!body.name) return toast('Please enter a warehouse name', true);
    try{
      if(editingWarehouse) await api('/warehouses/'+editingWarehouse.id+'/update',{method:'POST',body});
      else await api('/warehouses',{method:'POST',body});
      editingWarehouse=null; await load(); await renderWarehouseManager(ov); toast('Warehouse saved');
    }catch(e){ toast(e.message,true); }
  };
  ov.querySelectorAll('[data-edit-wh]').forEach(b=>b.onclick=()=>{editingWarehouse=rows.find(x=>x.id===b.dataset.editWh);renderWarehouseManager(ov);});
}

function renderStock(){
  const wh=curWh();
  document.getElementById('panel').innerHTML = `<div class="panel">
    <div class="tools">
      <h3 style="margin-right:auto">Current stock · ${esc(wh?.name||'')}</h3>
      <button class="btn sm primary" id="newItem">${wh?.type==='retail'?'➕ Create retail SKU':'➕ Create kitchen item'}</button>
    </div>
    <table><thead><tr><th>Item</th><th>Type</th><th>Stock</th><th>Minimum</th><th>Lot/Expiry</th><th>Actions</th></tr></thead>
    <tbody>${stock.map(s=>`<tr>
      <td><div class="skucell">${stockVisual(s)}<div>${esc(s.name)} ${s.low?'<span class="chip c-late">Low</span>':''}<br><span class="hint">${esc(s.barcode||s.category||'')}</span></div></div></td>
      <td><span class="typetag">${kindLabel(s)}</span></td>
      <td style="font-family:var(--mono);color:${s.low?'var(--late)':'var(--text)'}">${fmtQty(s.stock)} ${esc(s.unit)}</td>
      <td style="font-family:var(--mono)">${fmtQty(s.min_stock)} ${esc(s.unit)}</td>
      <td>${s.track_lot?'<span class="chip c-doing">Lot tracked</span>':'<span class="chip c-muted">Not required</span>'} ${s.expiry_required?'<span class="chip c-late">Expiry</span>':''}</td>
      <td>
        <button class="btn sm" data-edit="${s.id}">Edit</button>
        <button class="btn sm" data-in="${s.id}">Receive</button>
        <button class="btn sm danger" data-out="${s.id}">Issue</button>
        <button class="btn sm danger" data-del="${s.id}">Delete</button>
      </td>
    </tr>`).join('') || '<tr><td colspan="6" class="empty">No items in this warehouse yet</td></tr>'}</tbody></table>
  </div>`;
  document.getElementById('newItem').onclick=()=>openItemEditor();
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openItemEditor(stock.find(s=>s.id===b.dataset.edit)));
  document.querySelectorAll('[data-in]').forEach(b=>b.onclick=()=>openMove(stock.find(s=>s.id===b.dataset.in),'receipt'));
  document.querySelectorAll('[data-out]').forEach(b=>b.onclick=()=>openMove(stock.find(s=>s.id===b.dataset.out),'issue'));
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>deleteItemUi(stock.find(s=>s.id===b.dataset.del)));
}

function renderOps(){
  document.getElementById('panel').innerHTML = `<div class="panel">
    <h3>Quick receive / issue</h3>
    <div class="hint" style="margin-bottom:12px">Stock receipts can include lot, expiry date, supplier and unit cost. Issues are used for write-offs, wastage, kitchen transfers, and internal use.</div>
    <table><thead><tr><th>Item</th><th>Stock</th><th>Receive</th><th>Issue</th></tr></thead>
    <tbody>${stock.map(s=>`<tr>
      <td>${s.emoji||''} ${esc(s.name)}<br><span class="typetag">${kindLabel(s)}</span></td>
      <td style="font-family:var(--mono)">${fmtQty(s.stock)} ${esc(s.unit)}</td>
      <td><button class="btn sm" data-in="${s.id}">Receive</button></td>
      <td><button class="btn sm danger" data-out="${s.id}">Issue</button></td>
    </tr>`).join('')}</tbody></table>
  </div>`;
  document.querySelectorAll('[data-in]').forEach(b=>b.onclick=()=>openMove(stock.find(s=>s.id===b.dataset.in),'receipt'));
  document.querySelectorAll('[data-out]').forEach(b=>b.onclick=()=>openMove(stock.find(s=>s.id===b.dataset.out),'issue'));
}

// KiotViet-style stocktake: build sheet → count (scan +1) → variance → finish & balance.
function renderCount(){
  const wh=curWh();
  document.getElementById('panel').innerHTML=`<div class="panel">
    <h3>Stocktake · ${esc(wh?.name||'')}</h3>
    <div class="hint" style="margin-bottom:11px">Process: <b>add / scan items</b> → <b>count actual quantities</b> → <b>review variance</b> → <b>Finish</b> to balance stock and create an adjustment document.</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <input id="ckScan" placeholder="Scan barcode (count +1) or type item name to add…" autocomplete="off" style="flex:1;min-width:240px;background:var(--bg);border:1px solid var(--border2);border-radius:9px;padding:11px 13px;font-size:13px;font-family:var(--mono)">
      <button class="btn" id="ckAddAll">Count all (${stock.length})</button>
      <button class="btn danger" id="ckClear">Clear sheet</button>
    </div>
    <div id="ckSuggest"></div>
    <table><thead><tr><th>Item</th><th>Lot / Expiry</th><th>Book qty</th><th>Counted qty</th><th>Variance</th><th>Value diff</th><th></th></tr></thead>
      <tbody id="countBody"></tbody></table>
    <div id="ckSummary" style="margin-top:12px"></div>
    <div style="margin-top:12px"><button class="btn primary" id="ckApply" style="padding:11px 22px">Finish stocktake</button></div>
    <h3 style="margin-top:24px">Recent stocktake sessions</h3>
    <div id="ckSessions"><div class="empty">Loading...</div></div>
  </div>`;
  const scan=document.getElementById('ckScan');
  scan.oninput=()=>renderCkSuggest(scan.value.trim());
  scan.onkeydown=(e)=>{ if(e.key==='Enter'){ e.preventDefault(); onCkEnter(scan.value.trim()); } };
  document.getElementById('ckAddAll').onclick=()=>{ stock.forEach(s=>pushSheet(s)); drawSheet(); };
  document.getElementById('ckClear').onclick=()=>{ if(countSheet.length&&!confirm('Clear the entire current stocktake sheet?'))return; countSheet=[]; drawSheet(); };
  document.getElementById('ckApply').onclick=applyCount;
  drawSheet(); loadCkSessions(); scan.focus();
}
function ckBook(e){ if(e.lot_id){ const l=lots.find(x=>x.id===e.lot_id); return l?l.qty_on_hand:0; } const s=stock.find(x=>x.id===e.id); return s?s.stock:0; }
function ckLots(id){ return lots.filter(l=>l.item_id===id); }
function pushSheet(s){ if(!countSheet.some(e=>e.id===s.id)) countSheet.push({id:s.id,stock_type:s.stock_type,name:s.name,unit:s.unit,cost:s.cost||0,lot_id:null,counted:''}); }
function onCkEnter(v){
  if(!v)return;
  const bc=stock.find(s=>s.barcode && s.barcode===v);
  if(bc) return scanCount(bc);
  const m=stock.filter(s=>(s.name||'').toLowerCase().includes(v.toLowerCase()));
  if(m.length===1){ pushSheet(m[0]); drawSheet(); resetCkScan(); }
  else toast(m.length?`${m.length} results — select below`:'Not found',true);
}
function scanCount(s){
  let e=countSheet.find(x=>x.id===s.id);
  if(!e){ pushSheet(s); e=countSheet.find(x=>x.id===s.id); }
  e.counted=String((parseFloat(e.counted)||0)+1);
  drawSheet(); resetCkScan(); toast(`${s.name}: counted ${e.counted}`);
}
function resetCkScan(){ const sc=document.getElementById('ckScan'); if(sc){sc.value='';sc.focus();} const sg=document.getElementById('ckSuggest'); if(sg)sg.innerHTML=''; }
function renderCkSuggest(q){
  const el=document.getElementById('ckSuggest'); if(!el)return;
  if(!q){ el.innerHTML=''; return; }
  const m=stock.filter(s=>(s.name||'').toLowerCase().includes(q.toLowerCase())||(s.barcode||'').includes(q)).slice(0,8);
  el.innerHTML=m.length?`<div style="border:1px solid var(--border);border-radius:9px;margin-bottom:11px;overflow:hidden">${m.map(s=>`<div data-add="${s.id}" style="padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12.5px">${esc(s.name)} · <span style="color:var(--muted)">stock ${fmtQty(s.stock)} ${esc(s.unit||'')}</span></div>`).join('')}</div>`:'';
  el.querySelectorAll('[data-add]').forEach(d=>d.onclick=()=>{ pushSheet(stock.find(x=>x.id===d.dataset.add)); drawSheet(); resetCkScan(); });
}
function drawSheet(){
  const body=document.getElementById('countBody'); if(!body)return;
  if(!countSheet.length){ body.innerHTML='<tr><td colspan="7" class="empty">No items yet. Scan a barcode / type a name to add, or use "Count all".</td></tr>'; renderCkSummary(); return; }
  body.innerHTML=countSheet.map((e,i)=>{
    const book=ckBook(e), c=e.counted===''?null:parseFloat(e.counted), d=c===null?null:c-book, val=d===null?null:d*(e.cost||0);
    const its=ckLots(e.id);
    const lotSel=its.length?`<select data-lot="${i}" style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:5px 7px;font-size:11.5px;max-width:160px"><option value="">All stock</option>${its.map(l=>`<option value="${l.id}" ${e.lot_id===l.id?'selected':''}>${esc(l.lot_no)}${l.expiry_date?' · '+esc(l.expiry_date):''}</option>`).join('')}</select>`:'<span class="typetag">—</span>';
    return `<tr>
      <td>${esc(e.name)}<br><span class="typetag">${esc(e.unit||'')}</span></td>
      <td>${lotSel}</td>
      <td style="font-family:var(--mono)">${fmtQty(book)} ${esc(e.unit||'')}</td>
      <td><input class="recv" type="number" step="0.01" data-cnt="${i}" value="${e.counted}" placeholder="count"></td>
      <td class="var ${d>0?'var-pos':d<0?'var-neg':''}" style="font-family:var(--mono)">${d===null?'-':(d>0?'+':'')+fmtQty(d)}</td>
      <td class="${val>0?'var-pos':val<0?'var-neg':''}" style="font-family:var(--mono)">${val===null?'-':(val>0?'+':'')+money(val)}</td>
      <td><button class="btn sm danger" data-rmc="${i}">×</button></td>
    </tr>`;
  }).join('');
  body.querySelectorAll('[data-cnt]').forEach(inp=>inp.oninput=()=>{
    const e=countSheet[+inp.dataset.cnt]; e.counted=inp.value;
    const tr=inp.closest('tr'), book=ckBook(e), c=inp.value===''?null:parseFloat(inp.value), d=c===null?null:c-book, v=d===null?null:d*(e.cost||0);
    const td=tr.querySelectorAll('td');
    td[4].textContent=d===null?'-':(d>0?'+':'')+fmtQty(d); td[4].className='var '+(d>0?'var-pos':d<0?'var-neg':'');
    td[5].textContent=v===null?'-':(v>0?'+':'')+money(v); td[5].className=(v>0?'var-pos':v<0?'var-neg':'');
    renderCkSummary();
  });
  body.querySelectorAll('[data-lot]').forEach(sel=>sel.onchange=()=>{ countSheet[+sel.dataset.lot].lot_id=sel.value||null; drawSheet(); });
  body.querySelectorAll('[data-rmc]').forEach(b=>b.onclick=()=>{ countSheet.splice(+b.dataset.rmc,1); drawSheet(); });
  renderCkSummary();
}
function renderCkSummary(){
  const el=document.getElementById('ckSummary'); if(!el)return;
  const counted=countSheet.filter(e=>e.counted!=='');
  let diffN=0, totalVal=0;
  for(const e of counted){ const d=parseFloat(e.counted)-ckBook(e); if(Math.abs(d)>1e-9){diffN++; totalVal+=d*(e.cost||0);} }
  el.innerHTML=`<div style="display:flex;gap:20px;flex-wrap:wrap;font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px">
    <span>Counted: <b>${counted.length}/${countSheet.length}</b></span>
    <span>Items with variance: <b class="${diffN?'var-neg':''}">${diffN}</b></span>
    <span>Total value variance: <b class="${totalVal>0?'var-pos':totalVal<0?'var-neg':''}" style="font-family:var(--mono)">${totalVal>0?'+':''}${money(totalVal)}</b></span>
  </div>`;
}
async function applyCount(){
  const lines=countSheet.filter(e=>e.counted!=='').map(e=>({stock_type:e.stock_type,item_id:e.id,counted_qty:parseFloat(e.counted),lot_id:e.lot_id||null}));
  if(!lines.length) return toast('No items counted yet',true);
  if(!confirm(`Finish stocktake for ${lines.length} items?\nActual quantities will overwrite book quantities and an adjustment document will be created (cannot be edited after finalising).`)) return;
  try{
    const r=await api('/warehouse/stocktake',{method:'POST',body:{warehouse_id:activeWh,name:'Stocktake '+new Date().toLocaleString('en-US'),mode:'partial',lines}});
    toast(`Stocktake finalised · ${r.changed} items adjusted`);
    countSheet=[]; load();
  }catch(e){ toast(e.message,true); }
}
async function loadCkSessions(){
  const el=document.getElementById('ckSessions'); if(!el)return;
  let rows=[]; try{ rows=await api('/warehouse/stocktakes'); }catch{ el.innerHTML='<div class="empty">Permission required to view stocktake sessions</div>'; return; }
  rows=rows.filter(s=>!s.warehouse_id||s.warehouse_id===activeWh);
  el.innerHTML=rows.length?`<table><thead><tr><th>Time</th><th>Session name</th><th>Warehouse</th><th>Lines</th><th>Status</th></tr></thead><tbody>${rows.map(s=>`<tr>
    <td style="font-family:var(--mono);font-size:11px">${new Date(s.created_at).toLocaleString('en-US')}</td>
    <td>${esc(s.name||'')}</td><td>${esc(s.warehouse_name||'')}</td>
    <td style="font-family:var(--mono)">${s.lines}</td>
    <td><span class="chip c-done">Finalised</span></td></tr>`).join('')}</tbody></table>`:'<div class="empty">No stocktake sessions yet</div>';
}

async function openDocSlip(id){

function slipHtml(d){
  const date=new Date(d.created_at);
  const total=(d.lines||[]).reduce((s,l)=>s+Math.abs(l.qty)*(l.unit_cost||0),0);
  const cell='border:1px solid #999;padding:6px 9px';
  return `<div class="slip" style="color:#111;font-family:'Be Vietnam Pro',Arial,sans-serif;line-height:1.45">
    <div style="text-align:center">
      <div style="font-weight:800;text-transform:uppercase;font-size:15px">${esc(d.branch_name||'Store')}</div>
      <div style="font-size:12px;color:#555">${esc(d.branch_address||'')}</div>
      <h2 style="margin:16px 0 3px;font-size:21px;letter-spacing:.5px">${DOC_TITLE[d.type]||'WAREHOUSE DOCUMENT'}</h2>
      <div style="font-size:12.5px;color:#555">No: <b>${docNo(d)}</b> &nbsp;·&nbsp; Date: ${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}</div>
    </div>
    <div style="display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;font-size:13px;margin:16px 0 9px">
      <div>Warehouse: <b>${esc(d.warehouse_name||'')}</b>${d.to_warehouse_name?` &nbsp;→&nbsp; Destination: <b>${esc(d.to_warehouse_name)}</b>`:''}</div>
      ${d.supplier?`<div>Supplier: <b>${esc(d.supplier)}</b></div>`:''}
      ${d.reason?`<div>Reason: <b>${esc(d.reason)}</b></div>`:''}
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:12.5px">
      <thead><tr>${['#','Item name','Unit','Lot / Expiry','Qty','Unit cost','Total'].map((h,i)=>`<th style="${cell};background:#eef2f6;text-align:${i>=4?'right':'left'}">${h}</th>`).join('')}</tr></thead>
      <tbody>${(d.lines||[]).map((l,i)=>{const q=Math.abs(l.qty);return `<tr>
        <td style="${cell};text-align:center">${i+1}</td>
        <td style="${cell}">${esc(l.item_name||'')}</td>
        <td style="${cell}">${esc(l.unit||'')}</td>
        <td style="${cell}">${esc(l.lot_no||'')}${l.expiry_date?' · '+esc(l.expiry_date):''}</td>
        <td style="${cell};text-align:right;font-family:monospace">${fmtQty(q)}</td>
        <td style="${cell};text-align:right;font-family:monospace">${money(l.unit_cost||0)}</td>
        <td style="${cell};text-align:right;font-family:monospace">${money(q*(l.unit_cost||0))}</td>
      </tr>`;}).join('')}
      <tr><td colspan="6" style="${cell};text-align:right;font-weight:700">Total</td><td style="${cell};text-align:right;font-weight:800;font-family:monospace">${money(total)}</td></tr>
      </tbody>
    </table>
    <div style="display:flex;justify-content:space-around;text-align:center;margin-top:28px;font-size:12.5px">
      <div><b>Prepared by</b><div style="color:#777;font-size:11px">(Signature &amp; full name)</div><div style="height:52px"></div></div>
      <div><b>Warehouse keeper</b><div style="color:#777;font-size:11px">(Signature &amp; full name)</div><div style="height:52px"></div></div>
      <div><b>Delivered / Received by</b><div style="color:#777;font-size:11px">(Signature &amp; full name)</div><div style="height:52px"></div></div>
    </div>
  </div>`;
}
function printSlip(html){
  const w=window.open('','_blank','width=840,height=940');
  if(!w) return toast('Browser blocked the print window — please allow popups to print',true);
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Warehouse document</title>
    <style>body{margin:26px;font-family:Arial,'Be Vietnam Pro',sans-serif}@media print{body{margin:8mm}}</style></head>
    <body>${html}</body></html>`);
  w.document.close(); w.focus(); setTimeout(()=>{ w.print(); }, 300);
}

function openMove(item, mode){
  const receipt = mode === 'receipt';
  const ov=document.createElement('div'); ov.className='overlay show';
  ov.innerHTML=`<div class="modal">
    <h2>${receipt?'Goods receipt':'Goods issue'} · ${esc(item.name)}</h2>
    <div class="sub">Current stock: ${fmtQty(item.stock)} ${esc(item.unit)}</div>
    ${(item.units&&item.units.length)?`<div class="formgrid"><div><label>Quantity</label><input id="qty" type="number" step="0.01" placeholder="0"></div>
      <div><label>Unit</label><select id="uom"><option value="${esc(item.unit)}">${esc(item.unit)} (base)</option>${item.units.map(u=>`<option value="${esc(u.name)}">${esc(u.name)} = ${u.factor} ${esc(item.unit)}</option>`).join('')}</select></div></div>
      <div class="hint" id="uomHint" style="margin-bottom:4px"></div>`
      :`<label>Quantity (${esc(item.unit)})</label><input id="qty" type="number" step="0.01" placeholder="0">`}
    ${receipt?`<div class="formgrid"><div><label>Lot / batch</label><input id="lot" placeholder="${item.track_lot?'LOT-...':'NOLOT'}"></div><div><label>Expiry date</label><input id="expiry" type="date"></div></div>
      <div class="formgrid"><div><label>Cost price</label><input id="cost" type="number" value="${item.cost||0}"></div><div><label>Supplier</label><input id="supplier"></div></div>`:
      `<label>Issue reason</label><select id="reason"><option value="manual_issue">Internal use</option><option value="waste">Wastage / write-off</option><option value="damaged">Damaged</option><option value="sample">Sample use</option></select>`}
    <div class="mfoot"><button class="btn" id="cancel">Cancel</button><button class="btn primary" id="save">${receipt?'Receive stock':'Issue stock'}</button></div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#cancel').onclick=()=>ov.remove();
  // unit conversion hint
  const uomSel=ov.querySelector('#uom'), uomHint=ov.querySelector('#uomHint');
  const factorOf=(name)=> name===item.unit ? 1 : ((item.units||[]).find(u=>u.name===name)?.factor||1);
  function updHint(){
    if(!uomSel||!uomHint) return;
    const q=parseFloat(ov.querySelector('#qty').value)||0; const f=factorOf(uomSel.value);
    uomHint.innerHTML = (f!==1 && q>0) ? `= <b>${fmtQty(q*f)} ${esc(item.unit)}</b> (base unit)` : '';
  }
  if(uomSel){ uomSel.onchange=updHint; ov.querySelector('#qty').oninput=updHint; }
  ov.querySelector('#save').onclick=async()=>{
    const qty=parseFloat(ov.querySelector('#qty').value);
    if(!qty || qty<=0) return toast('Invalid quantity', true);
    const body={warehouse_id:activeWh,stock_type:item.stock_type,item_id:item.id,qty};
    if(uomSel) body.uom=uomSel.value;
    if(receipt){
      body.lot_no=ov.querySelector('#lot').value.trim();
      body.expiry_date=ov.querySelector('#expiry').value||null;
      body.unit_cost=parseFloat(ov.querySelector('#cost').value)||0;
      body.supplier=ov.querySelector('#supplier').value.trim();
    } else {
      body.reason=ov.querySelector('#reason').value;
    }
    try{ await api(receipt?'/warehouse/receive':'/warehouse/issue',{method:'POST',body}); ov.remove(); toast(receipt?'Stock received':'Stock issued'); load(); }
    catch(e){toast(e.message,true);}
  };
}

  </div>`;
  document.body.appendChild(ov);

  // units-of-measure editor
  let units=(item?.units||[]).map(u=>({name:u.name,factor:u.factor}));
  const unitsBox=ov.querySelector('#unitsBox');
  const baseUnit=()=>ov.querySelector('#unit').value.trim()||'pcs';
  function drawUnits(){
    unitsBox.innerHTML = units.length ? units.map((u,i)=>`<div style="display:grid;grid-template-columns:1fr 92px 34px;gap:7px;margin-bottom:6px;align-items:center">
      <input data-un="${i}" value="${esc(u.name)}" placeholder="name (pack/case)">

    unitsBox.querySelectorAll('[data-un]').forEach(inp=>inp.oninput=()=>units[+inp.dataset.un].name=inp.value);
    unitsBox.querySelectorAll('[data-uf]').forEach(inp=>inp.oninput=()=>units[+inp.dataset.uf].factor=parseFloat(inp.value)||0);
    unitsBox.querySelectorAll('[data-ux]').forEach(b=>b.onclick=()=>{units.splice(+b.dataset.ux,1);drawUnits();});
  }
  ov.querySelector('#addUnit').onclick=()=>{units.push({name:'',factor:0});drawUnits();};
  ov.querySelector('#unit').oninput=()=>{ if(!units.length) drawUnits(); };
  drawUnits();
  ov.querySelector('#cancel').onclick=()=>ov.remove();
  ov.querySelector('#save').onclick=async()=>{
    const body={
      warehouse_id:activeWh,
      name:ov.querySelector('#name').value.trim(),
      barcode:ov.querySelector('#barcode').value.trim(),
      unit:ov.querySelector('#unit').value.trim()||'pcs',

      min_stock:parseFloat(ov.querySelector('#min').value)||0,
      category:ov.querySelector('#category').value.trim(),
      track_lot:ov.querySelector('#trackLot').checked,
      expiry_required:ov.querySelector('#expiryRequired').checked,
      units:units.filter(u=>u.name.trim()&&u.factor>0),
    };

    if(retail){
      body.price=parseInt(ov.querySelector('#price').value)||0;
      body.emoji=ov.querySelector('#emoji').value.trim()||'📦';
      body.supplier=ov.querySelector('#supplier').value.trim();
      body.image=ov.querySelector('#image').value.trim();
      body.source_url=ov.querySelector('#sourceUrl').value.trim();
    } else {
      body.item_type=ov.querySelector('#itemType').value;
      body.note=ov.querySelector('#note').value.trim();
    }
    if(!isEdit){
      body.opening_stock=parseFloat(ov.querySelector('#opening').value)||0;
      body.lot_no=ov.querySelector('#lot').value.trim()||'OPENING';
      body.expiry_date=ov.querySelector('#expiry').value||null;
    }
    const path = isEdit
      ? (retail?`/skus/${item.id}/update`:`/inventory/${item.id}/update`)
      : (retail?'/skus':'/inventory');
    try{ await api(path,{method:'POST',body}); ov.remove(); toast(isEdit?'Item saved':'Item created'); load(); }
    catch(e){toast(e.message,true);}
  };
}

function kindLabel(s){
  if(s.stock_type==='sku') return 'Retail SKU';
  return s.item_type==='supply' ? 'Kitchen supply' : 'FnB ingredient';
}
function fmtQty(n){ return Math.round((Number(n||0)+Number.EPSILON)*100)/100; }
function daysLeft(date){ const d=new Date(date+'T00:00:00'); return Math.ceil((d-Date.now())/86400000); }
function expiryClass(date){ if(!date)return ''; return daysLeft(date)<=7?'lotwarn':'lotok'; }

startClock(); load();
</script>
