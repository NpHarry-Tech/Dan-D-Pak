<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chi phí — POS/ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/runtime-config.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
.cards{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.catbars{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:16px}
.catbars h3{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);margin-bottom:10px}
.catbar{display:grid;grid-template-columns:140px 1fr 90px;gap:10px;align-items:center;margin-bottom:7px;font-size:12.5px}
.catbar .track{height:8px;background:var(--surface3);border-radius:99px;overflow:hidden}
.catbar .fill{height:100%;background:linear-gradient(90deg,#0891b2,#22c55e);border-radius:99px}
.catbar .amt{font-family:var(--mono);text-align:right;font-weight:700}
.etoolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.etoolbar input[type=date]{width:auto}
.seg{display:inline-flex;gap:4px;background:var(--surface2);border:1px solid var(--border2);border-radius:11px;padding:4px}
.seg button{padding:7px 13px;border-radius:8px;background:transparent;border:0;color:var(--muted);font-weight:700;font-size:12.5px}
.seg button.on{background:var(--surface);color:var(--brand);box-shadow:0 1px 3px rgba(15,23,42,.08)}
.etable{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.etable th{text-align:left;font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.etable td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px}
.etable tr:last-child td{border-bottom:0}
.etable tbody tr{cursor:pointer}.etable tbody tr:hover{background:var(--surface2)}
.etable .mono{font-family:var(--mono);font-size:12px}
.src{font-size:10px;font-weight:800;padding:3px 9px;border-radius:99px;letter-spacing:.3px}
.src-drawer{background:#f59e0b22;color:#b45309}
.src-direct{background:var(--brand-dim);color:var(--brand)}
.modal .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .seg{display:flex;width:100%;margin-top:7px}
.modal .seg button{flex:1;justify-content:center}
.modal .acts{display:flex;gap:9px;margin-top:20px}
.modal .acts .btn{flex:1;padding:11px}
.hint{font-size:11.5px;color:var(--muted);margin-top:7px;line-height:1.45;background:var(--surface2);border-radius:9px;padding:9px 11px}
@media(max-width:640px){.modal .row2{grid-template-columns:1fr}}
</style></head>
<body>
<div id="top"></div>
<div class="view">
  <div class="viewhead">
    <h1>💸 Chi phí</h1>
    <div class="sub">Sổ chi phí theo danh mục · chi từ tiền két (trừ ca) hoặc kế toán chi trực tiếp</div>
    <div class="right"><button class="btn" id="reportBtn">📊 Báo cáo</button><button class="btn primary" id="addBtn">+ Ghi chi phí</button></div>
  </div>
  <div class="cards" id="cards"></div>
  <div class="catbars" id="catbars" style="display:none"></div>
  <div class="etoolbar">
    <input type="date" id="from"><span style="color:var(--faint)">→</span><input type="date" id="to">
    <select id="catFilter" style="width:auto"><option value="">Tất cả danh mục</option></select>
    <div class="seg" id="srcSeg">
      <button data-s="" class="on">Tất cả</button>
      <button data-s="drawer">Tiền két</button>
      <button data-s="direct">Chi trực tiếp</button>
    </div>
  </div>
  <div id="list"></div>
</div>

<div class="overlay" id="ov">
  <div class="modal">
    <h2 id="mTitle">Ghi chi phí</h2>
    <div class="sub">Chọn nguồn tiền để đối chiếu quỹ chính xác.</div>

    <label>Nguồn tiền</label>
    <div class="seg" id="srcPick">
      <button data-s="drawer" class="on">💵 Tiền két (trừ ca)</button>
      <button data-s="direct">🏦 Kế toán chi trực tiếp</button>
    </div>
    <div class="hint" id="srcHint"></div>

    <div id="methodWrap" style="display:none">
      <label>Hình thức chi</label>
      <select id="f_method"><option value="cash">Tiền mặt (ngoài két)</option><option value="transfer">Chuyển khoản</option><option value="bank">Ngân hàng</option><option value="other">Khác</option></select>
    </div>

    <div class="row2">
      <div><label>Danh mục</label><select id="f_category"></select></div>
      <div><label>Số tiền <span style="color:var(--late)">*</span></label><input type="number" id="f_amount" min="0" step="1000" placeholder="0"></div>
    </div>

    <div class="row2">
      <div><label>Ngày chi</label><input type="date" id="f_date"></div>
      <div><label>Người nhận / NCC</label><select id="f_payee"><option value="">— Không —</option></select></div>
    </div>

    <label>Lý do / ghi chú</label>
    <textarea id="f_note" rows="2" placeholder="VD: tiền điện tháng 6"></textarea>

    <label>Ảnh hóa đơn (tuỳ chọn)</label>
    <input type="file" id="f_image" accept="image/*">

    <div class="acts">
      <button class="btn" id="cancelBtn">Hủy</button>
      <button class="btn primary" id="saveBtn">Lưu chi phí</button>
    </div>
  </div>
</div>

<!-- Report -->
<div class="overlay" id="repOv">
  <div class="modal">
    <h2>📊 Báo cáo chi phí</h2>
    <div class="sub">Chi phí theo danh mục và nguồn tiền (két / trực tiếp) theo kỳ. Có thể đổ ra file.</div>
    <label>Kỳ báo cáo</label>
    <div class="seg" id="repPeriod" style="display:flex">
      <button data-p="day" style="flex:1">Ngày</button>
      <button data-p="week" style="flex:1">Tuần</button>
      <button data-p="month" class="on" style="flex:1">Tháng</button>
      <button data-p="quarter" style="flex:1">Quý</button>
      <button data-p="year" style="flex:1">Năm</button>
    </div>
    <div class="acts" style="margin-top:18px">
      <button class="btn primary" id="repView" style="flex:1;padding:11px">👁 Xem</button>
      <button class="btn" id="repPdf">PDF</button>
      <button class="btn" id="repXls">Excel</button>
      <button class="btn" id="repDoc">Word</button>
      <button class="btn" id="repClose">Đóng</button>
    </div>
  </div>
</div>

<script type="module">
import { api, connect, money, toast, esc, startClock, topbar, requireModuleAccess, renderUserChip, apiUrl, getToken, getBranchId } from '/shared/client.js';
document.getElementById('top').innerHTML = topbar('expenses');
await requireModuleAccess('expenses'); renderUserChip();

const $ = id => document.getElementById(id);
let source = '', catFilter = '', categories = [], payees = [], rows = [], summary = {}, imageData = '';
const monthStart = () => { const d = new Date(); return new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0, 10); };
const today = () => new Date().toISOString().slice(0, 10);

connect('expenses', { 'expenses:updated': () => load() });

async function loadRefs(){
  const [cats, parts] = await Promise.all([
    api('/expenses/categories').catch(() => []),
    api('/partners?type=all').catch(() => ({ partners: [] })),
  ]);
  categories = Array.isArray(cats) ? cats : [];
  payees = parts.partners || [];
  $('catFilter').innerHTML = '<option value="">Tất cả danh mục</option>' + categories.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
  $('f_category').innerHTML = categories.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
  $('f_payee').innerHTML = '<option value="">— Không —</option>' + payees.map(p => `<option value="${esc(p.id)}">${esc((p.company ? p.company + ' · ' : '') + p.name)}${p.is_supplier ? ' (NCC)' : ''}</option>`).join('');
}

async function load(){
  try {
    const r = await api(`/expenses?from=${$('from').value}&to=${$('to').value}&source=${source}&category_id=${catFilter}`);
    rows = r.expenses || []; summary = r.summary || {};
    renderCards(); renderCats(); renderList();
  } catch(e){ $('list').innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

function renderCards(){
  $('cards').innerHTML = `
    <div class="card"><div class="lb">Tổng chi (kỳ lọc)</div><div class="vl rd">${money(summary.total || 0)}</div></div>
    <div class="card"><div class="lb">Chi từ két</div><div class="vl yl">${money(summary.drawer || 0)}</div></div>
    <div class="card"><div class="lb">Chi trực tiếp</div><div class="vl cy">${money(summary.direct || 0)}</div></div>
    <div class="card"><div class="lb">Số phiếu</div><div class="vl">${summary.count || 0}</div></div>`;
}
function renderCats(){
  const cats = summary.categories || [];
  if (!cats.length){ $('catbars').style.display = 'none'; return; }
  const max = Math.max(...cats.map(c => c.amount), 1);
  $('catbars').style.display = 'block';
  $('catbars').innerHTML = `<h3>Chi phí theo danh mục</h3>` + cats.map(c => `
    <div class="catbar"><span>${esc(c.name)}</span><div class="track"><div class="fill" style="width:${Math.round(c.amount / max * 100)}%"></div></div><span class="amt">${money(c.amount)}</span></div>`).join('');
}
function renderList(){
  if (!rows.length){ $('list').innerHTML = `<div class="empty">Chưa có khoản chi nào trong kỳ.<br>Bấm “+ Ghi chi phí”.</div>`; return; }
  $('list').innerHTML = `<table class="etable">
    <thead><tr><th>Mã</th><th>Ngày</th><th>Danh mục</th><th>Người nhận</th><th>Nguồn</th><th style="text-align:right">Số tiền</th></tr></thead>
    <tbody>${rows.map(rowHtml).join('')}</tbody></table>`;
  $('list').querySelectorAll('tr[data-id]').forEach(tr => tr.onclick = () => openEdit(tr.dataset.id));
}
function rowHtml(e){
  return `<tr data-id="${esc(e.id)}">
    <td class="mono">${esc(e.code || '')}</td>
    <td class="mono">${(e.expense_date || '').slice(0, 10)}</td>
    <td>${esc(e.category_name || '—')}</td>
    <td>${esc(e.payee_name || '—')}</td>
    <td><span class="src src-${e.source}">${e.source === 'drawer' ? 'Tiền két' : 'Trực tiếp'}</span></td>
    <td style="text-align:right;font-family:var(--mono);font-weight:700;color:var(--late)">${money(e.amount)}</td>
  </tr>`;
}

// ---------- form ----------
function setSource(s){
  $('srcPick').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.s === s));
  $('methodWrap').style.display = s === 'direct' ? 'block' : 'none';
  $('srcHint').textContent = s === 'drawer'
    ? '💵 Sẽ trừ trực tiếp vào két của ca đang mở (cần có ca mở). Số quỹ luôn khớp.'
    : '🏦 Kế toán chi từ nguồn khác (chuyển khoản/ngân hàng/tiền riêng) — KHÔNG trừ vào két.';
}
function currentSource(){ return $('srcPick').querySelector('button.on')?.dataset.s || 'drawer'; }
let editing = null;
function openForm(e){
  editing = e;
  $('mTitle').textContent = e ? 'Sửa chi phí' : 'Ghi chi phí';
  imageData = '';
  $('f_image').value = '';
  setSource(e?.source || 'drawer');
  // drawer-linked expenses are locked (managed in drawer)
  const locked = !!(e && e.drawer_entry_id);
  $('srcPick').querySelectorAll('button').forEach(b => b.disabled = !!e);
  $('f_method').value = e?.method || 'transfer';
  $('f_category').value = e?.category_id || (categories[0]?.id || '');
  $('f_amount').value = e?.amount || '';
  $('f_date').value = (e?.expense_date || '').slice(0, 10) || today();
  $('f_payee').value = e?.payee_id || '';
  $('f_note').value = e?.note || '';
  [$('f_method'), $('f_category'), $('f_amount'), $('f_date'), $('f_payee'), $('f_note'), $('f_image')].forEach(el => el.disabled = locked);
  $('saveBtn').style.display = locked ? 'none' : '';
  $('srcHint').textContent = locked ? '🔒 Khoản chi này đã trừ vào két — chỉ xem. Sửa/xóa trong sổ quỹ của ca để không lệch tiền mặt.' : $('srcHint').textContent;
  $('ov').classList.add('show');
}
function openEdit(id){ const e = rows.find(r => r.id === id); if (e) openForm(e); }

$('f_image').onchange = () => {
  const f = $('f_image').files[0];
  if (!f) { imageData = ''; return; }
  const r = new FileReader(); r.onload = () => { imageData = r.result; }; r.readAsDataURL(f);
};

async function save(){
  const amount = Number($('f_amount').value) || 0;
  if (amount <= 0) return toast('Nhập số tiền', true);
  const source = currentSource();
  const body = {
    source, method: source === 'direct' ? $('f_method').value : 'cash',
    category_id: $('f_category').value,
    amount, expense_date: $('f_date').value,
    payee_id: $('f_payee').value, note: $('f_note').value.trim(),
    invoice_image: imageData || undefined,
  };
  try {
    if (editing) await api(`/expenses/${editing.id}`, { method: 'POST', body });
    else await api('/expenses', { method: 'POST', body });
    toast(editing ? 'Đã cập nhật' : 'Đã ghi chi phí');
    $('ov').classList.remove('show'); load();
  } catch(e){ toast(e.message, true); }
}

// ---------- bind ----------
$('srcPick').querySelectorAll('button').forEach(b => b.onclick = () => { if (!b.disabled) setSource(b.dataset.s); });
$('srcSeg').querySelectorAll('button').forEach(b => b.onclick = () => { source = b.dataset.s; $('srcSeg').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b)); load(); });
$('catFilter').onchange = () => { catFilter = $('catFilter').value; load(); };
$('from').onchange = load; $('to').onchange = load;
$('addBtn').onclick = () => { if (!categories.length) return toast('Đang tải danh mục…', true); openForm(null); };
$('saveBtn').onclick = save;
$('cancelBtn').onclick = () => $('ov').classList.remove('show');
$('ov').onclick = e => { if (e.target === $('ov')) $('ov').classList.remove('show'); };
$('repOv').onclick = e => { if (e.target === $('repOv')) $('repOv').classList.remove('show'); };
document.addEventListener('keydown', e => { if (e.key === 'Escape'){ $('ov').classList.remove('show'); $('repOv').classList.remove('show'); } });

// ---------- report ----------
let repPeriod = 'month';
$('reportBtn').onclick = () => $('repOv').classList.add('show');
$('repClose').onclick = () => $('repOv').classList.remove('show');
$('repPeriod').querySelectorAll('button').forEach(b => b.onclick = () => { repPeriod = b.dataset.p; $('repPeriod').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b)); });
async function exportReport(format){
  try {
    const url = apiUrl(`/reports/export?type=expenses&period=${repPeriod}&format=${format}`);
    const res = await fetch(url, { headers: { 'x-auth-token': getToken() || '', 'x-branch-id': getBranchId() } });
    if (!res.ok) return toast('Không tạo được báo cáo (cần quyền xem báo cáo)', true);
    if (format === 'html'){ const html = await res.text(); const w = window.open('', '_blank'); w.document.write(html); w.document.close(); }
    else { const blob = await res.blob(); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `bao-cao-chi-phi.${format}`; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 4000); }
  } catch(e){ toast(e.message, true); }
}
$('repView').onclick = () => exportReport('html');
$('repPdf').onclick = () => exportReport('pdf');
$('repXls').onclick = () => exportReport('xls');
$('repDoc').onclick = () => exportReport('doc');

$('from').value = monthStart(); $('to').value = today();
startClock(); await loadRefs(); load();
</script>
</body></html>
