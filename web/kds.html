<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KDS — Kitchen Display</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/runtime-config.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
.stationbar{display:flex;gap:6px;flex-wrap:wrap}
.stbtn{padding:8px 15px;border-radius:9px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:12.5px;font-weight:700;position:relative}
.stbtn:hover{color:var(--text);border-color:var(--border2)}
.stbtn.active{background:var(--brand-dim);border-color:rgba(52,210,238,.4);color:var(--brand)}
.stbtn .n{margin-left:6px;background:var(--surface3);border-radius:99px;padding:1px 7px;font-size:10.5px}
.stbtn.active .n{background:var(--brand);color:#fff}
.stbtn .nlate{margin-left:6px;background:var(--late);color:#fff;border-radius:99px;padding:1px 8px;font-size:10px;font-weight:800}
.stbtn.has-late{border-color:var(--late)}
.kdsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.ticket{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;display:flex;flex-direction:column}
.ticket.late{border-color:var(--late);box-shadow:0 0 0 1px var(--late),0 0 18px rgba(255,107,107,.25)}
.ticket.ready{border-color:var(--done)}
.ticket.cancelled{border-color:var(--late);box-shadow:0 0 0 1px var(--late),0 0 18px rgba(255,107,107,.15);background:#fff5f5}
.ticket.cancelled .th{background:#ffebee}
.ticket .th{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--surface2);border-bottom:1px solid var(--border)}
.ticket .th .ord{font-family:var(--mono);font-weight:700;font-size:12px;color:var(--brand)}
.ticket .th .tb{font-family:var(--mono);font-size:11px;color:var(--muted)}
.ticket .th .tm{margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:700}
.ticket.late .th .tm{color:var(--late)}
.ticket .tbody{padding:11px 13px;flex:1}
.ticket .nm{font-weight:700;font-size:15px}
.ticket .qy{font-family:var(--mono);color:var(--brand)}
.ticket .md{font-size:12px;color:var(--doing);margin-top:3px}
.ticket .nt{font-size:12px;color:var(--text);background:var(--doing-bg);border-left:3px solid var(--doing);padding:6px 9px;border-radius:0 7px 7px 0;margin-top:7px}
.ticket .sla{font-size:10.5px;color:var(--faint);margin-top:8px;display:flex;align-items:center;gap:6px}
.ticket .tact{padding:9px 11px;border-top:1px solid var(--border);display:flex;gap:7px}
.ticket .tact .btn{flex:1}
.kdsempty{grid-column:1/-1;text-align:center;color:var(--faint);padding:70px 20px;font-size:15px}
.kdsempty .big{font-size:46px;margin-bottom:12px}
.bar{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden;flex:1}
.bar i{display:block;height:100%;border-radius:99px;background:var(--done)}
</style></head>
<body>
<div id="top"></div>
<div class="view">
  <div class="kdsgrid" id="grid"></div>
</div>

<script type="module">
import { api, connect, toast, esc, startClock, topbar, requireModuleAccess, renderUserChip } from '/shared/client.js';
import { playNotificationSound, applyConfig } from '/js/core/notificationSound.js';
document.getElementById('top').innerHTML = topbar('kds', {
  title: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2v7a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V2"/><path d="M8 11v11"/><path d="M16 2c-1.5 0-3 1.6-3 4v6h3"/><path d="M16 12v10"/></svg>Kitchen Display System',
  actions: `<div id="stations" style="display:inline-flex;gap:8px;flex-wrap:wrap;align-items:center"></div>`,
});
await requireModuleAccess('kds'); renderUserChip();

const STATIONS=[['all','🍽️ Tất cả'],['kitchen','🔥 Bếp'],['bar','🍹 Bar'],['salad','🥗 Salad/Lạnh'],['beverage','🥤 Beverage']];
let station = localStorage.getItem('kds_station') || 'all';
let allTickets = [];  // every active ticket across stations (for live badge counts)

connect('kds', {
  'order:new': ()=>{ playNotificationSound('kds_new_order'); load(); },
  'kds:refresh': load, 'order:item': load,
});

// Đồng bộ cấu hình âm thanh từ trang Cài đặt (bật/tắt, âm lượng, chọn âm KDS).
// Dùng endpoint công khai vì tài khoản bếp thường không có quyền Cài đặt.
api('/notification-sound').then(cfg => { if(cfg && cfg.events) applyConfig(cfg); }).catch(()=>{});

async function load(){ allTickets = await api('/kds/all'); render(); }

const isActive = t => t.status!=='served' && t.status!=='cancelled';
function stationCount(k){
  const a = allTickets.filter(isActive);
  if(k==='all') return a.length;
  return a.filter(t=>t.station===k).length;
}
function lateCount(k){
  return allTickets.filter(isActive).filter(t=>t.status!=='ready')
    .filter(t=> (k==='all'||t.station===k))
    .filter(t=> (Date.now()-new Date(t.created_at))/60000 > t.sla_minutes).length;
}

function render(){
  // Station tabs with live count + overdue badge
  document.getElementById('stations').innerHTML = STATIONS.map(([k,n])=>{
    const c=stationCount(k), late=lateCount(k);
    return `<button class="stbtn ${k===station?'active':''} ${late?'has-late':''}" data-s="${k}">${n}${c?`<span class="n">${c}</span>`:''}${late?`<span class="nlate">${late} trễ</span>`:''}</button>`;
  }).join('');
  document.querySelectorAll('.stbtn').forEach(b=>b.onclick=()=>{station=b.dataset.s;localStorage.setItem('kds_station',station);render();});

  const grid=document.getElementById('grid');
  let active = allTickets.filter(isActive);
  if(station!=='all') active = active.filter(t=>t.station===station);
  if(!active.length){ grid.innerHTML=`<div class="kdsempty"><div class="big">✨</div>Không có món nào đang chờ${station!=='all'?' ở station này':''}<br><span style="font-size:13px">Order mới sẽ hiện ở đây realtime</span></div>`; return; }
  // newest-pending first within sort by elapsed (late ones bubble up)
  active.sort((a,b)=> new Date(a.created_at)-new Date(b.created_at));
  grid.innerHTML = active.map(card).join('');
  bind();
}

function card(t){
  const elapsedMin=(Date.now()-new Date(t.created_at))/60000;
  const isCancelled = t.status === 'cancelled';
  const late = elapsedMin > t.sla_minutes && t.status!=='ready' && !isCancelled;
  const pct=Math.min(100,Math.round(elapsedMin/t.sla_minutes*100));
  const mm=Math.floor(elapsedMin), ss=Math.floor((elapsedMin-mm)*60);
  const modTxt=(t.mods||[]).map(m=>m.name).join(', ');
  return `<div class="ticket ${isCancelled?'cancelled':late?'late':''} ${t.status==='ready'?'ready':''}" data-id="${t.id}">
    <div class="th">
      <span class="ord">#${t.order_id.slice(-5).toUpperCase()}</span>
      <span class="tb">🪑 ${esc(t.table_path || t.table_code || '—')}</span>
      <span class="tm">${late?'⚠ ':''}${mm}:${String(ss).padStart(2,'0')}</span>
    </div>
    <div class="tbody">
      <div class="nm">
        <span class="qy">${t.qty}×</span> ${esc(t.name)}
        ${isCancelled?`<span style="margin-left:8px;background:#ffebee;color:var(--late);border:1px solid rgba(255,107,107,0.4);font-size:11px;padding:2px 6px;border-radius:4px;font-weight:700">MÓN ĐÃ HỦY</span>`:''}
      </div>
      ${modTxt?`<div class="md">+ ${esc(modTxt)}</div>`:''}
      ${t.note?`<div class="nt">📝 ${esc(t.note)}</div>`:''}
      <div class="sla">⏱ SLA ${t.sla_minutes}′ <div class="bar"><i style="width:${pct}%;background:${isCancelled?'var(--faint)':late?'var(--late)':pct>70?'var(--doing)':'var(--done)'}"></i></div></div>
    </div>
    <div class="tact">${actions(t)}</div>
  </div>`;
}
function actions(t){
  if(t.status==='cancelled') return `<button class="btn danger" data-act="dismiss" style="background:var(--late);color:#fff;border-color:var(--late);flex:1">Xác nhận đã hủy</button>`;
  if(t.status==='new') return `<button class="btn primary" data-act="accepted">Nhận món</button>`;
  if(t.status==='accepted') return `<button class="btn warn" data-act="preparing">Bắt đầu làm</button>`;
  if(t.status==='preparing') return `<button class="btn green" data-act="ready">Xong ✓</button>`;
  if(t.status==='ready') return `<button class="btn" data-act="served">Đã giao</button>`;
  return '';
}
function bind(){
  document.querySelectorAll('.ticket').forEach(c=>{
    c.querySelectorAll('[data-act]').forEach(b=>b.onclick=async(e)=>{
      e.stopPropagation();
      try{
        if (b.dataset.act === 'dismiss') {
          await api('/orders/items/'+c.dataset.id+'/kds-dismiss',{method:'POST'});
        } else {
          await api('/orders/items/'+c.dataset.id+'/status',{method:'POST',body:{status:b.dataset.act}});
        }
      }
      catch(err){toast(err.message,true);}
    });
  });
}

startClock(); load();
setInterval(render, 1000); // live timers
</script>
</body></html>
