<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>POS — Cashier</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/socket.io/socket.io.js"></script>
<style>
.poswrap{display:grid;grid-template-columns:1fr 400px;gap:16px;height:calc(100vh - 120px)}
@media(max-width:980px){.poswrap{grid-template-columns:1fr;height:auto}}
.posleft{overflow-y:auto}
.zone{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin:14px 0 9px}
.tablegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:10px}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px 10px;cursor:pointer;text-align:center;transition:.12s;position:relative}
.tcard:hover{border-color:var(--brand)}
.tcard b{font-family:var(--mono);font-size:15px}
.tcard .st{font-size:10px;margin-top:5px;color:var(--faint)}
.tcard .amt{font-family:var(--mono);font-size:11px;color:var(--brand);margin-top:2px}
.tcard.busy{border-color:rgba(255,194,77,.45);background:linear-gradient(180deg,var(--surface),rgba(255,194,77,.05))}
.tcard.paying{border-color:rgba(181,140,255,.55);background:linear-gradient(180deg,var(--surface),rgba(181,140,255,.07))}
.tcard.calling{border-color:var(--late);animation:ringing 1s infinite}
@keyframes ringing{50%{box-shadow:0 0 14px rgba(255,107,107,.5)}}
.tcard.sel{outline:2px solid var(--brand)}
.tcard .flag{position:absolute;top:7px;right:8px;font-size:13px}
.billpane{background:var(--surface);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.billpane .bh{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.billpane .bh b{font-size:15px}
.billitems{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px;min-height:120px}
.bitem{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.bitem .r1{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600}
.bitem .r1 .p{margin-left:auto;font-family:var(--mono);color:var(--muted);font-weight:500}
.bitem .meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.billfoot{border-top:1px solid var(--border);padding:13px 16px}
.brow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);padding:2px 0}
.brow.tt{font-size:17px;font-weight:800;color:var(--text);padding-top:7px}
.brow.tt span:last-child{font-family:var(--mono);color:var(--brand)}
.billbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.billops{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:0 12px 10px}
.billops .wide{grid-column:1/-1}
.picklist{display:flex;flex-direction:column;gap:7px;max-height:420px;overflow-y:auto;margin-top:10px}
.pickrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.pickrow b{font-size:12.5px}.pickrow small{display:block;color:var(--muted);font-size:10.5px;margin-top:2px}
.callbar{background:var(--late-bg);border:1px solid rgba(255,107,107,.4);border-radius:10px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600;color:var(--late)}
.payline{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin-bottom:7px;font-size:12.5px}
.payline b{font-family:var(--mono);margin-left:auto}
.payline .x{color:var(--faint);background:none;font-size:14px}.payline .x:hover{color:var(--late)}
.remain{display:flex;justify-content:space-between;font-weight:800;font-size:14px;padding:10px 2px}
.remain span:last-child{font-family:var(--mono)}
.remain.ok span:last-child{color:var(--done)}.remain.no span:last-child{color:var(--doing)}
.receipt{background:#fdfdf8;color:#1a1a1a;font-family:var(--mono);font-size:12px;border-radius:6px;padding:18px 16px;max-width:340px;margin:0 auto;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.receipt .c{text-align:center}.receipt h4{font-size:14px}
.receipt hr{border:none;border-top:1px dashed #999;margin:8px 0}
.receipt .li{display:flex;justify-content:space-between;gap:8px;padding:1.5px 0}
.receipt .tt{font-weight:700;font-size:13.5px}
.receipt .qr{width:74px;height:74px;margin:8px auto 2px;background:repeating-conic-gradient(#111 0 25%,#fdfdf8 0 50%) 0 0/14px 14px;border:4px solid #111}
.receipt.template{padding:0;overflow:hidden}
.receipt-canvas-live{position:relative;width:100%;background:#fdfdf8;color:#111;aspect-ratio:var(--receipt-ratio,72/180);min-height:360px}
.receipt-canvas-live .tpl-el{position:absolute;white-space:pre-wrap;overflow:hidden;line-height:1.14;box-sizing:border-box}
.receipt-canvas-live .tpl-img img{width:100%;height:100%;object-fit:contain}
.receipt-canvas-live .tpl-line{border-top:1px dashed #777;height:0!important}
.receipt-canvas-live .tpl-qr{display:flex;align-items:center;justify-content:center}
.receipt-canvas-live .tpl-qr .qr{width:min(100%,84px);height:auto;aspect-ratio:1;margin:0}
.pendingbell{position:relative;min-width:42px}
.pendingbell.hot{border-color:rgba(255,107,107,.55);color:var(--late);background:var(--late-bg);animation:bellPulse 1.4s infinite}
.pendingbell .n{position:absolute;top:-7px;right:-7px;min-width:19px;height:19px;border-radius:99px;background:var(--late);color:#fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px}
@keyframes bellPulse{50%{box-shadow:0 0 0 5px rgba(255,107,107,.12)}}
.confirm-shell{display:grid;grid-template-columns:172px minmax(0,1fr);gap:12px;height:min(70vh,640px);min-height:430px;margin-top:12px}
.confirm-tabs{border:1px solid var(--border);border-radius:13px;background:var(--surface2);padding:8px;overflow:auto;display:flex;flex-direction:column;gap:8px}
.confirm-tab{border:1px solid var(--border);background:var(--surface);border-radius:11px;padding:10px 9px;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:.12s}
.confirm-tab:hover{border-color:var(--brand)}
.confirm-tab.on{border-color:var(--brand);background:var(--brand-bg);box-shadow:0 0 0 2px rgba(0,167,204,.08)}
.confirm-tab b{font-size:13px}
.confirm-tab small{font-size:11px;color:var(--muted);line-height:1.35}
.confirm-tab .pill{align-self:flex-start;font-size:10px;font-weight:800;border-radius:99px;background:#e8eef7;color:var(--muted);padding:3px 8px;text-transform:uppercase}
.confirm-detail{border:1px solid var(--border);border-radius:13px;background:var(--surface);display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
.confirm-detail-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.confirm-detail-head b{font-size:15px}.confirm-detail-head small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.confirm-detail-head .money{margin-left:auto;font-family:var(--mono);font-weight:900;color:var(--brand)}
.confirm-body{flex:1;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.modal label.confirm-line,.confirm-line{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:start;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;margin:0;color:inherit;letter-spacing:0;text-transform:none;font-weight:inherit;font-size:inherit}
.confirm-line input{margin-top:4px}.confirm-line b{font-size:12.5px}.confirm-line small{display:block;color:var(--muted);font-size:11px;line-height:1.4;margin-top:2px}
.confirm-line .lineamt{font-family:var(--mono);font-size:11.5px;color:var(--brand);font-weight:800;white-space:nowrap}
.confirm-footer{border-top:1px solid var(--border);padding:10px 12px;background:var(--surface);display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:end}
.confirm-footer textarea{min-height:54px;max-height:92px;resize:vertical}
.confirm-empty{border:1px dashed var(--border);border-radius:12px;padding:24px;text-align:center;color:var(--muted);background:var(--surface2);margin-top:12px}
.pending-note{margin:12px;border:1px solid rgba(255,194,77,.45);background:var(--doing-bg);color:#7a5200;border-radius:10px;padding:9px 11px;font-size:12px;font-weight:700}
.shiftbtn{min-width:118px}.shiftbtn.open{border-color:rgba(63,224,143,.45);color:var(--done);background:var(--done-bg)}.shiftbtn.closed{border-color:rgba(255,107,107,.4);color:var(--late);background:var(--late-bg)}
.shift-box{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}.shift-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px}.denom-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;max-height:300px;overflow:auto}.denom-row{display:grid;grid-template-columns:1fr 80px;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 9px;font-size:12px}.denom-row b{font-family:var(--mono)}.denom-row input{padding:7px 8px;text-align:right}
.pay-helper{margin-top:0;border:1px dashed var(--border2);background:var(--surface2);border-radius:12px;padding:10px}.pay-qr{display:grid;grid-template-columns:112px 1fr;gap:11px;align-items:center}.pay-qr img{width:112px;height:112px;object-fit:contain;background:#fff;border:1px solid var(--border);border-radius:8px}.pay-ref{font-family:var(--mono);font-size:11px;color:var(--muted);word-break:break-all}.shift-report{max-height:260px;overflow:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface2);padding:8px}
.pay-modal{max-width:640px}
.pay-summary{display:flex;justify-content:space-between;gap:12px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin:12px 0;color:var(--muted)}
.pay-summary b{font-family:var(--mono);font-size:18px;color:var(--brand)}
.pay-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px;align-items:start}
.pay-methods{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.pay-methods .opt{min-height:46px;display:flex;align-items:center;justify-content:flex-start;gap:7px;white-space:normal;text-align:left;line-height:1.25;padding:9px 10px}
.pay-fields{display:grid;gap:8px}
.pay-actions{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.pay-lines{min-height:74px;max-height:158px;overflow:auto;border:1px solid var(--border);border-radius:11px;padding:8px;background:var(--surface2)}
.pay-modal .mfoot{position:sticky;bottom:-20px;background:var(--surface);padding-top:12px}
@media(max-width:980px){.poswrap{gap:12px}.billpane{min-height:56vh}.viewhead .right{width:100%;justify-content:flex-start}.pendingbell{min-width:48px}.tablegrid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr))}.confirm-shell{grid-template-columns:150px minmax(0,1fr);height:min(72vh,620px)}}
@media(max-width:720px){.confirm-shell{grid-template-columns:1fr;height:min(76vh,660px)}.confirm-tabs{flex-direction:row;overflow-x:auto;min-height:86px}.confirm-tab{min-width:136px}.confirm-footer{grid-template-columns:1fr}.confirm-footer .btn{width:100%}.shift-box{grid-template-columns:1fr}.pay-grid{grid-template-columns:1fr}.pay-qr{grid-template-columns:1fr}.pay-qr img{margin:auto}.pay-methods{grid-template-columns:1fr}}
</style></head>
<body>
<div id="top"></div>
<div class="view" style="overflow:hidden">
  <div class="viewhead">
    <h1>💳 POS Cashier</h1>
    <div class="sub" id="callsHint"></div>
    <div class="right">
      <button class="btn sm pendingbell" id="pendingBell" title="Món khách vừa gọi">🔔<span class="n" id="pendingBadge" style="display:none">0</span></button>
      <button class="btn sm shiftbtn closed" id="shiftBtn" title="Mở / kết ca">Ca: chưa mở</button>
      <span id="histMount"></span>
      <span class="chip c-muted" id="openCount">0 bàn mở</span>
    </div>
  </div>
  <div class="poswrap">
    <div class="posleft" id="floor"></div>
    <div class="billpane" id="bill"><div class="empty" style="margin:auto">Chọn một bàn để xem bill</div></div>
  </div>
</div>

<script type="module">
import { api, connect, money, toast, esc, startClock, topbar, requireModuleAccess, renderUserChip, getUser } from '/shared/client.js';
import { mountOrderHistory } from '/shared/orderHistory.js';
document.getElementById('top').innerHTML = topbar('pos');
await requireModuleAccess('pos'); renderUserChip();
mountOrderHistory('#histMount');  // xem lại đơn cũ + in lại hóa đơn

let tables=[], sel=null, order=null, calls=[], pendingConfirms=[], printConfig={}, operationsConfig=null, shiftState=null;

connect('pos', {
  'order:new':(p)=>{ refreshPending(); refreshFloor(); if(sel&&p.order?.table_id===sel) loadBill(sel); },
  'order:pending':()=>{ refreshPending(); refreshFloor(); if(sel) loadBill(sel); },
  'order:updated':(p)=>{ refreshPending(); refreshFloor(); if(sel&&p?.table_id===sel) loadBill(sel); },
  'order:item':(p)=>{ refreshPending(); if(sel&&p.order_id===order?.id) loadBill(sel); },
  'table:updated':()=>{ refreshFloor(); },
  'staff:call':()=>{ refreshCalls(); },
  'payment:done':()=>{ refreshFloor(); refreshShift(); },
  'shift:updated':()=>{ refreshShift(); },
});

async function refreshFloor(){ tables=await api('/tables'); renderFloor(); }
async function refreshCalls(){ calls=await api('/calls'); renderCalls(); refreshFloor(); }
async function refreshPending(){ pendingConfirms=await api('/orders/pending-confirmation').catch(()=>[]); renderPendingBell(); if(tables.length) renderFloor(); }
const cfgKey=k=>`pos_erp_${k}_settings`;
function readLocalCfg(k){ try{return JSON.parse(localStorage.getItem(cfgKey(k))||'null');}catch{return null;} }
function hasLocalPrintCfg(){ return ['einvoice','labels','bill','printers','label_template','cup_label_template','bill_template'].some(k=>localStorage.getItem(cfgKey(k))); }
function isLegacyBillTemplate(tpl){
  return tpl?.standard==='bcm_fiscal_receipt' && (Number(tpl.version||0)<3 || Number(tpl.heightMm||0)>260);
}
function mergePrintConfig(remote={}){
  const r=remote||{};
  if(r.updated_at||!hasLocalPrintCfg()) return r;
  const localBillTemplate=readLocalCfg('bill_template');
  const local={
    einvoice:readLocalCfg('einvoice')||{},
    labels:readLocalCfg('labels')||{},
    bill:readLocalCfg('bill')||{},
    printers:readLocalCfg('printers')||r.printers,
    templates:{label:readLocalCfg('cup_label_template')||readLocalCfg('label_template')||r.templates?.label,bill:isLegacyBillTemplate(localBillTemplate)?r.templates?.bill:(localBillTemplate||r.templates?.bill)},
  };
  return {...r,einvoice:{...(r.einvoice||{}),...local.einvoice},labels:{...(r.labels||{}),...local.labels},bill:{...(r.bill||{}),...local.bill},printers:local.printers||r.printers,templates:{...(r.templates||{}),...local.templates}};
}
async function refreshPrintConfig(){ printConfig=mergePrintConfig(await api('/print/config').catch(()=>printConfig||{})); }

function fallbackOperations(){
  return {
    payment:{bankName:'Vietcombank',bankCode:'VCB',bankAccount:'0123456789',accountName:'DAN D PAK',transferPrefix:'DANBILL',posTerminalName:'POS May 1',methods:[
      {key:'cash',label:'Tiền mặt',enabled:true,kind:'cash'},
      {key:'internet_banking',label:'Internet Banking',enabled:true,kind:'qr'},
      {key:'qrcode',label:'QR Code',enabled:true,kind:'qr'},
      {key:'card',label:'Máy POS',enabled:true,kind:'pos'},
      {key:'visa',label:'Visa',enabled:true,kind:'pos'},
      {key:'momo',label:'MoMo Pay',enabled:false,kind:'wallet'},
      {key:'zalopay',label:'ZaloPay',enabled:false,kind:'wallet'},
      {key:'voucher',label:'Voucher',enabled:true,kind:'voucher'},
    ]},
    shifts:{labels:[{key:'morning',label:'Ca sáng',enabled:true},{key:'evening',label:'Ca tối',enabled:true}],denominations:[500000,200000,100000,50000,20000,10000,5000,2000,1000],requireOpenShift:true},
  };
}
function mergeOperations(remote){
  const f=fallbackOperations(), r=remote||{};
  return {
    payment:{...f.payment,...(r.payment||{}),methods:Array.isArray(r.payment?.methods)&&r.payment.methods.length?r.payment.methods:f.payment.methods},
    shifts:{...f.shifts,...(r.shifts||{}),labels:Array.isArray(r.shifts?.labels)&&r.shifts.labels.length?r.shifts.labels:f.shifts.labels,denominations:Array.isArray(r.shifts?.denominations)&&r.shifts.denominations.length?r.shifts.denominations:f.shifts.denominations},
  };
}
async function refreshOperations(){ operationsConfig=mergeOperations(await api('/operations/config').catch(()=>operationsConfig||fallbackOperations())); }
async function refreshShift(){ shiftState=await api('/shifts/current').catch(()=>({shift:null,config:operationsConfig||fallbackOperations(),report:null})); operationsConfig=mergeOperations(shiftState.config||operationsConfig); renderShiftButton(); return shiftState; }
function renderShiftButton(){
  const b=document.getElementById('shiftBtn'); if(!b) return;
  const sh=shiftState?.shift;
  b.classList.toggle('open',!!sh); b.classList.toggle('closed',!sh);
  b.textContent=sh?`Ca: ${sh.shift_label||'đang mở'}`:'Ca: chưa mở';
}
function shiftRequired(){ return operationsConfig?.shifts?.requireOpenShift !== false; }
function salesLocked(){ return shiftRequired() && !shiftState?.shift; }
async function ensureShiftOpen(afterOpen){
  await refreshOperations(); await refreshShift();
  if(!salesLocked()) return true;
  toast('Cần mở ca làm việc trước khi bán hàng.', true);
  openShiftPanel({afterOpen});
  return false;
}
function enabledMethods(){
  const ms=(operationsConfig?.payment?.methods||fallbackOperations().payment.methods).filter(m=>m.enabled!==false);
  return ms.length?ms:fallbackOperations().payment.methods.filter(m=>m.key==='cash');
}
function payMethod(key){ return (operationsConfig?.payment?.methods||fallbackOperations().payment.methods).find(m=>m.key===key) || {key,label:key,kind:'other'}; }
function methodIcon(m){ return ({cash:'💵',internet_banking:'🏦',qrcode:'📱',qr:'📱',card:'💳',visa:'💳',momo:'🟣',zalopay:'🔵',voucher:'🎟️',pos_card:'💳'}[m.key||m]||'•'); }
function makePaymentRef(method,o){
  const prefix=(operationsConfig?.payment?.transferPrefix||'DANBILL').replace(/\s+/g,'').toUpperCase();
  const n=o?.bill_no||(o?.id||'ORDER').slice(-6).toUpperCase();
  if(['card','visa','pos_card'].includes(method)) return `POS-${n}`;
  if(['internet_banking','qrcode','qr','momo','zalopay'].includes(method)) return `${prefix}-${n}`;
  return '';
}
function dynamicQrUrl(amount, ref){
  const p=operationsConfig?.payment||fallbackOperations().payment;
  if(!p.bankCode||!p.bankAccount) return '';
  const qs=new URLSearchParams({amount:String(Math.max(0,parseInt(amount)||0)),addInfo:ref||'',accountName:p.accountName||''});
  return `https://img.vietqr.io/image/${encodeURIComponent(p.bankCode)}-${encodeURIComponent(p.bankAccount)}-compact2.png?${qs.toString()}`;
}
function denominationsHtml(counts={}){
  const denoms=operationsConfig?.shifts?.denominations||fallbackOperations().shifts.denominations;
  return `<div class="denom-grid">${denoms.map(d=>`<label class="denom-row"><b>${money(d)}</b><input type="number" min="0" step="1" value="${counts[d]||0}" data-denom="${d}"></label>`).join('')}</div>`;
}
function countCash(ov){ return [...ov.querySelectorAll('[data-denom]')].reduce((s,i)=>s+(parseInt(i.dataset.denom)||0)*(parseInt(i.value)||0),0); }
function reportHtml(r, day=null){
  if(!r) return '<div class="empty">Chưa có dữ liệu ca.</div>';
  const lines=Object.entries(r.method_totals||{}).map(([k,v])=>`<div class="brow"><span>${esc(methodLabel(k))}</span><span>${money(v)}</span></div>`).join('');
  const dayBox=day?`<div class="shift-report" style="margin-top:12px">
    <div class="brow tt"><span>Tổng ngày vận hành</span><span>${money(day.total_revenue||0)}</span></div>
    <div class="brow"><span>Số bill trong ngày</span><span>${day.bill_count||0}</span></div>
    <div class="brow"><span>Tiền mặt trong ngày</span><span>${money(day.cash_sales||0)}</span></div>
    <div class="brow"><span>Chuyển khoản / ví trong ngày</span><span>${money(day.transfer_sales||0)}</span></div>
    <div class="brow"><span>Máy POS / thẻ trong ngày</span><span>${money(day.pos_sales||0)}</span></div>
  </div>`:'';
  return `<div class="shift-report">
    <div class="brow"><span>Số bill</span><span>${r.bill_count||0}</span></div>
    <div class="brow"><span>Tiền mặt bán hàng</span><span>${money(r.cash_sales||0)}</span></div>
    <div class="brow"><span>Chuyển khoản / ví</span><span>${money(r.transfer_sales||0)}</span></div>
    <div class="brow"><span>Máy POS / thẻ</span><span>${money(r.pos_sales||0)}</span></div>
    <div class="brow tt"><span>Tiền mặt dự kiến</span><span>${money(r.expected_cash||0)}</span></div>
    ${lines?`<hr style="border:none;border-top:1px dashed var(--border);margin:8px 0">${lines}`:''}
  </div>${dayBox}`;
}

function renderFloor(){
  const zones=[...new Set(tables.map(t=>t.zone))];
  document.getElementById('floor').innerHTML = zones.map(z=>`
    <div class="zone">${esc(z)}</div>
    <div class="tablegrid">${tables.filter(t=>t.zone===z).map(tcard).join('')}</div>`).join('');

function tcard(t){
  const pc=pendingConfirms.find(g=>g.table_id===t.id);
  const cls=t.status==='calling'?'calling':t.status==='paying'?'paying':t.status==='busy'?'busy':'';
  const flag=pc?'🔔':t.call?'🔔':t.status==='paying'?'💳':'';
  return `<div class="tcard ${cls} ${sel===t.id?'sel':''}" data-t="${t.id}">
    ${flag?`<span class="flag">${flag}</span>`:''}
    <b>${t.code}</b>
    <div class="st">${pc?`${pc.item_count} món chờ xác nhận`:t.status==='free'?'Trống':t.status==='paying'?'Chờ thu ngân':t.status==='calling'?'Đang gọi':'Đang dùng'}</div>
    ${t.amount?`<div class="amt">${money(t.amount)}</div>`:''}
  </div>`;
}
function renderPendingBell(){
  const total=pendingConfirms.reduce((s,g)=>s+(Number(g.item_count)||0),0);

  btn.title=total?`${total} món chờ xác nhận`:'Không có món chờ xác nhận';
}
function renderCalls(){

function bindBillButtons(table,o){
  const rc=document.getElementById('resolveCall'); if(rc) rc.onclick=async()=>{await api('/calls/'+table.id+'/resolve',{method:'POST'});refreshCalls();loadBill(table.id);};
  const am=document.getElementById('addMenuBtn'); if(am) am.onclick=async()=>{ if(await ensureShiftOpen(()=>openAddMenu(table))) openAddMenu(table); };
  const ar=document.getElementById('addRetailBtn'); if(ar) ar.onclick=async()=>{ if(await ensureShiftOpen(()=>openAddRetail(table))) openAddRetail(table); };
  if(!o) return;
  const mv=document.getElementById('moveTableBtn'); if(mv) mv.onclick=()=>openMoveTable(table,o);
  const mg=document.getElementById('mergeTableBtn'); if(mg) mg.onclick=()=>openMergeTable(table,o);
  const sp=document.getElementById('splitBillBtn'); if(sp) sp.onclick=()=>openSplitBill(table,o);
  const pay=document.getElementById('payBtn'); if(pay) pay.onclick=async()=>{ if(await ensureShiftOpen(()=>openPay(o))) openPay(o); };
  document.getElementById('discBtn').onclick=()=>{
    const v=prompt('Nhập số tiền giảm (VND):','0'); if(v===null)return;
    o.discount=Math.max(0,parseInt(v)||0); o.total=Math.max(0,o.subtotal-o.discount); renderBill(table,o);
  };
  document.getElementById('printBtn').onclick=()=>showReceipt(buildPreview(table,o));
}

function stationName(s){return {kitchen:'Bếp',bar:'Bar',salad:'Salad/Lạnh',beverage:'Quầy nước',retail:'Retail'}[s]||s||'Không rõ';}
function pendingLineMeta(i){
  const mods=(i.mods||[]).map(m=>`${m.group?m.group+': ':''}${m.name}${m.price?` (+${money(m.price)})`:''}`).join(', ');
  const bits=[];
  if(mods) bits.push('Ăn kèm / topping: '+mods);
  if(i.note) bits.push('Ghi chú: '+i.note);
  bits.push('Chuyển tới: '+stationName(i.station));
  return bits.join(' · ');
}
function selectedConfirmIds(ov,orderId){
  return [...ov.querySelectorAll(`[data-confirm-item][data-order="${orderId}"]:checked`)].map(x=>x.dataset.confirmItem);
}
async function openPendingConfirmModal(){
  await refreshPending();
  const ov=document.createElement('div'); ov.className='overlay show';
  document.body.appendChild(ov);
  let activeOrderId=pendingConfirms[0]?.order_id || null;
  const draw=()=>{
    if(!pendingConfirms.some(g=>g.order_id===activeOrderId)) activeOrderId=pendingConfirms[0]?.order_id || null;
    const active=pendingConfirms.find(g=>g.order_id===activeOrderId);
    const tab=g=>`
      <button class="confirm-tab ${g.order_id===activeOrderId?'on':''}" data-pending-pick="${g.order_id}">
        <b>🔔 ${g.table_code&&g.table_code!=='—'?'Bàn '+esc(g.table_code):'Đơn khách'}</b>
        <small>${g.line_count} dòng<br>${g.item_count} món cần xác nhận</small>
        <span class="pill">${money(g.total)}</span>
      </button>`;
    const detail=active?`
      <div class="confirm-detail">
        <div class="confirm-detail-head">
          <div>
            <b>${active.table_code&&active.table_code!=='—'?'Bàn '+esc(active.table_code):'Đơn khách'}</b>
            <small>${active.line_count} dòng · ${active.item_count} món · kiểm tra với khách trước khi xử lý</small>
          </div>
          <span class="money">${money(active.total)}</span>
        </div>
        <div class="confirm-body">${active.items.map(i=>`
          <label class="confirm-line">
            <input type="checkbox" checked data-order="${active.order_id}" data-confirm-item="${i.id}">
            <span><b>${i.qty}× ${esc(i.name)}</b><small>${esc(pendingLineMeta(i))}</small></span>
            <span class="lineamt">${money(i.qty*i.unit_price)}</span>
          </label>`).join('')}</div>
        <div class="confirm-footer">
          <textarea data-reject-reason="${active.order_id}" placeholder="Lý do nếu từ chối, ví dụ: hết món / khách đổi ý / ghi chú không rõ..."></textarea>
          <button class="btn danger" id="rejectPending">Reject</button>
          <button class="btn primary" id="acceptPending">Accept</button>
        </div>
      </div>`:'<div class="confirm-empty">Không có bàn nào đang chờ xác nhận.</div>';
    ov.innerHTML=`<div class="modal" style="max-width:900px;width:min(900px,92vw)">
      <h2>🔔 Món khách vừa gọi</h2>
      <div class="sub">Nhân viên cần đọc lại với khách, kiểm tra topping/ghi chú rồi mới confirm để chuyển xuống bếp/bar.</div>
      ${pendingConfirms.length?`<div class="confirm-shell"><div class="confirm-tabs">${pendingConfirms.map(tab).join('')}</div>${detail}</div>`:'<div class="confirm-empty">Không có món nào chờ xác nhận.</div>'}
      <div class="mfoot"><button class="btn primary" id="closePending">Đóng</button></div>
    </div>`;
    ov.querySelector('#closePending').onclick=()=>ov.remove();
    ov.querySelectorAll('[data-pending-pick]').forEach(b=>b.onclick=()=>{activeOrderId=b.dataset.pendingPick; draw();});
    const accept=ov.querySelector('#acceptPending');
    if(accept) accept.onclick=async()=>{
      const orderId=activeOrderId;
      const item_ids=selectedConfirmIds(ov,orderId);
      if(!item_ids.length) return toast('Chọn ít nhất một món để confirm',true);
      try{
        await api('/orders/'+orderId+'/confirm',{method:'POST',body:{item_ids}});
        toast('Đã confirm món và chuyển xuống bếp/bar');
        await refreshPending(); await refreshFloor(); if(sel) await loadBill(sel);
        if(!pendingConfirms.length) ov.remove(); else draw();
      }catch(e){toast(e.message,true);}
    };
    const reject=ov.querySelector('#rejectPending');
    if(reject) reject.onclick=async()=>{
      const orderId=activeOrderId;
      const item_ids=selectedConfirmIds(ov,orderId);
      const reason=ov.querySelector(`[data-reject-reason="${orderId}"]`)?.value.trim();
      if(!item_ids.length) return toast('Chọn ít nhất một món để reject',true);
      if(!reason) return toast('Nhập lý do từ chối để nhân viên/khách dễ đối soát',true);
      try{
        await api('/orders/'+orderId+'/reject',{method:'POST',body:{item_ids,reason}});
        toast('Đã reject món đã chọn');
        await refreshPending(); await refreshFloor(); if(sel) await loadBill(sel);
        if(!pendingConfirms.length) ov.remove(); else draw();
      }catch(e){toast(e.message,true);}
    };
  };
  draw();
}

function activePrintConfig(r){ return r?.print_config || printConfig || {}; }
function activeBillCfg(r){ return activePrintConfig(r).bill || {}; }
function activeBillTemplate(r){ return activePrintConfig(r).templates?.bill || null; }
function replaceVars(text, vars){ return String(text||'').replace(/\{(\w+)\}/g,(_,k)=>vars[k]??`{${k}}`); }
function vndPlain(n){ return Math.round(Number(n)||0).toLocaleString('en-US'); }
function pad2(n){ return String(n).padStart(2,'0'); }
function receiptDate(d){ return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`; }
function receiptTime(d){ return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }
function internalBillNo(r,d){
  if(r.bill_no && /^Dan\d{10}$/i.test(r.bill_no)) return r.bill_no;
  const seed=String(r.order_id||r.number||'1');
  let n=0; for(const ch of seed) n=(n*31+ch.charCodeAt(0))%10000;
  return `Dan${pad2(d.getDate())}${pad2(d.getMonth()+1)}${String(d.getFullYear()).slice(-2)}${String(n||1).padStart(4,'0')}`;
}
function numberToVietnamese(n){
  n=Math.round(Number(n)||0);
  if(n===0) return 'Không đồng';
  const digit=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'], unit=['','nghìn','triệu','tỷ'];
  function triad(num, full=false){
    const tr=Math.floor(num/100), ch=Math.floor((num%100)/10), dv=num%10, out=[];
    if(tr>0||full) out.push(digit[tr]+' trăm');
    if(ch>1){ out.push(digit[ch]+' mươi'); if(dv===1) out.push('mốt'); else if(dv===5) out.push('lăm'); else if(dv) out.push(digit[dv]); }
    else if(ch===1){ out.push('mười'); if(dv===5) out.push('lăm'); else if(dv) out.push(digit[dv]); }
    else if(dv){ if(tr>0||full) out.push('lẻ'); out.push(digit[dv]); }
    return out.join(' ');
  }
  const parts=[]; let x=n, idx=0;
  while(x>0){ const g=x%1000; if(g) parts.unshift(`${triad(g, parts.length>0)} ${unit[idx]}`.trim()); x=Math.floor(x/1000); idx++; }
  const s=parts.join(' ').replace(/\s+/g,' ').trim();
  return s.charAt(0).toUpperCase()+s.slice(1)+' đồng chẵn';
}
function lineCategory(i){ return i.station==='retail'||i.sku_id ? 'retail' : 'fnb'; }
function itemLineAmount(i,rate,priceIncludesVat){
  const gross=(Number(i.unit_price)||0)*(Number(i.qty)||1);
  return priceIncludesVat ? Math.round(gross/(1+rate/100)) : gross;
}
function formatReceiptItemRow(idx,i,rate,priceIncludesVat){
  const name=String(i.name||'').replace(/\s+/g,' ').slice(0,24).padEnd(24,' ');
  const qty=String(i.qty||1).padStart(2,' ');
  const unit=Math.round(itemLineAmount({...i,qty:1},rate,priceIncludesVat));
  const amount=itemLineAmount(i,rate,priceIncludesVat);
  return `${String(idx).padStart(2,'0')}   ${name} ${qty} ${vndPlain(unit).padStart(9,' ')} ${vndPlain(amount).padStart(12,' ')}`;
}
function receiptItemsText(r){
  const tax=r.tax||{}, rate=Number(tax.vat_rate||8)||0, inc=tax.price_includes_vat!==false;
  const groups={fnb:[],retail:[]};
  (r.items||[]).forEach(i=>groups[lineCategory(i)].push(i));
  const rows=[]; let idx=1;
  if(groups.fnb.length){ rows.push('[DANH MỤC F&B - NHÀ HÀNG / ĐỒ UỐNG]'); groups.fnb.forEach(i=>rows.push(formatReceiptItemRow(idx++,i,rate,inc))); }
  if(groups.retail.length){ if(rows.length) rows.push(''); rows.push('[DANH MỤC RETAIL - SẢN PHẨM TIÊU DÙNG]'); groups.retail.forEach(i=>rows.push(formatReceiptItemRow(idx++,i,rate,inc))); }
  return rows.join('\n');
}
function receiptVars(r){
  const cfg=activeBillCfg(r);

    subtotal:money(r.subtotal||0),

    total:money(r.total||0),

}
function receiptVarsBcm(r){
  const cfg=activeBillCfg(r), ein=activePrintConfig(r).einvoice || {};
  const lines=r.lines||[], tax=r.tax||{};
  const rate=Number(tax.vat_rate||ein.defaultVatRate||8)||0;
  const priceIncludesVat=tax.price_includes_vat!==false;
  const gross=Number(r.total||0);
  const taxable=priceIncludesVat ? Math.round(gross/(1+rate/100)) : Number(r.subtotal||gross);
  const vat=priceIncludesVat ? gross-taxable : Math.round(taxable*rate/100);
  const grand=priceIncludesVat ? gross : taxable+vat-(Number(r.discount)||0);
  const d=new Date(r.paid_at||Date.now());
  const billNo=internalBillNo(r,d);
  const taxNote=cfg.taxIncludedText || (priceIncludesVat ? `Giá đã bao gồm thuế GTGT ${rate}% theo quy định` : `Chưa bao gồm thuế GTGT ${rate}%`);
  return {
    storeName:cfg.storeName||r.branch||'POS/ERP',
    storeSubtitle:cfg.storeSubtitle||'(Hệ thống Phân phối F&B & Retail BCM)',
    address:cfg.address||'',
    sellerTaxCode:tax.seller_tax_code||ein.taxCode||cfg.taxCode||'',
    phone:cfg.phone||'',
    email:cfg.email||ein.email||'',
    invoiceSeries:tax.invoice_series||ein.series||'C26TMB',
    taxInvoiceNo:r.tax_invoice_no||r.invoice?.invoice_no||'00000001',
    billNo,
    orderNo:billNo,
    table:r.table_code||'Tại quầy',
    cashier:r.cashier||getUser()?.name||'',
    date:receiptDate(d),
    time:receiptDate(d)+' '+receiptTime(d),
    timeOnly:receiptTime(d),
    customerName:r.customer?.name||'Khách lẻ',
    customerTaxCode:r.customer?.tax_code||'',
    items:receiptItemsText(r),
    subtotal:vndPlain(r.subtotal||0),
    taxableAmount:vndPlain(taxable),
    vatRate:String(rate),
    vatAmount:vndPlain(vat),
    discount:vndPlain(r.discount||0),
    total:vndPlain(r.total||0),
    grandTotal:vndPlain(grand),
    totalWords:numberToVietnamese(grand),
    taxNote,
    method:lines.length?lines.map(l=>methodLabel(l.method)).join(' / '):(r.preview?'Chưa thanh toán':'-'),
    paymentStatus:r.preview?'Chưa thanh toán':'Đã thanh toán',
    taxAuthorityCode:r.tax_authority_code||r.invoice?.lookup_code||'00F83A7B-2C9D-4E1A-8B6C-5D4E3F2A1B0C',
    footer:cfg.footer||'Cam on quy khach',
  };
}
function renderTemplateReceipt(r){
  const tpl=activeBillTemplate(r);
  if(!tpl?.elements?.length) return '';
  const vars=receiptVarsBcm(r);
  const w=Number(tpl.widthMm)||72, h=Number(tpl.heightMm)||180;
  const els=tpl.elements.map((el,i)=>{
    const pos=`left:${Number(el.x)||0}%;top:${Number(el.y)||0}%;width:${Number(el.w)||20}%;height:${el.type==='line'?0:(Number(el.h)||8)}%;z-index:${i+1}`;
    if(el.type==='image') return `<div class="tpl-el tpl-img" style="${pos}">${el.src?`<img src="${esc(el.src)}">`:''}</div>`;
    if(el.type==='line') return `<div class="tpl-el tpl-line" style="${pos}"></div>`;
    if(el.type==='qr') return `<div class="tpl-el tpl-qr" style="${pos}"><div class="qr"></div></div>`;
    const align=el.align==='center'?'center':el.align==='right'?'right':el.align==='justify'?'justify':'left';
    const justify=align==='center'?'center':align==='right'?'flex-end':'flex-start';
    const decoration=[el.underline?'underline':'',el.strike?'line-through':''].filter(Boolean).join(' ')||'none';
    const block=el.id==='bill_body';
    return `<div class="tpl-el" style="${pos};font-size:${Math.max(8,(Number(el.fontSize)||5)*1.95)}px;font-weight:${el.bold?800:500};font-style:${el.italic?'italic':'normal'};text-decoration:${decoration};text-align:${align};display:${block?'block':'flex'};align-items:${block?'flex-start':'center'};justify-content:${justify};padding:${block?'8px 10px':'0'}">${esc(replaceVars(el.text,vars))}</div>`;
  }).join('');
  const cfg=activeBillCfg(r);
  const hasTaxNote=tpl.elements.some(el=>String(el.text||'').includes('{taxNote}'));
  const taxFallback=cfg.showTax!=='0' && !hasTaxNote ? `<div class="c" style="padding:0 16px 8px;font-size:10px;color:#666">${esc(vars.taxNote||'')}</div>` : '';
  return `<div class="receipt template" style="max-width:${w<=58?270:340}px"><div class="receipt-canvas-live" style="--receipt-ratio:${w}/${h}">${els}</div>${taxFallback}${cfg.showQr!=='0'&&!r.preview?`<div style="padding:0 16px 14px"><div class="qr"></div><div class="c" style="font-size:10px">Quet QR tra cuu hoa don</div></div>`:''}</div>`;
}

    <div style="display:none">
    <div class="receipt">
      <div class="c"><h4>${esc(r.branch||'POS/ERP')}</h4><div>${r.preview?'PHIẾU TẠM TÍNH':'HÓA ĐƠN'} #${r.number}</div>
      ${r.table_code?`<div>Bàn: ${esc(r.table_code)}</div>`:''}</div>
      <hr>
      ${r.items.map(i=>`<div class="li"><span>${i.qty}× ${esc(i.name)}</span><span>${money(i.unit_price*i.qty)}</span></div>${(i.mods||[]).length?`<div class="li" style="font-size:10px;color:#666"><span>  + ${esc(i.mods.map(m=>m.name).join(', '))}</span><span></span></div>`:''}`).join('')}
      <hr>
      <div class="li"><span>Tạm tính</span><span>${money(r.subtotal)}</span></div>
      ${r.discount?`<div class="li"><span>Giảm giá</span><span>-${money(r.discount)}</span></div>`:''}
      <div class="li tt"><span>TỔNG</span><span>${money(r.total)}</span></div>
      ${r.lines&&r.lines.length?'<hr>'+r.lines.map(l=>`<div class="li"><span>${methodLabel(l.method)}</span><span>${money(l.amount)}</span></div>`).join(''):''}
      ${!r.preview&&r.change?`<div class="li"><span>Tiền thối</span><span>${money(r.change)}</span></div>`:''}
      ${!r.preview?`<div class="qr"></div><div class="c" style="font-size:10px">Quét QR tra cứu hóa đơn</div>`:''}
      <hr><div class="c" style="font-size:10px">Cảm ơn quý khách!</div>
    </div>
    </div>
    <div class="mfoot">
      ${(!r.preview&&r.order_id)?`<button class="btn" id="invBtn">🧾 Xuất hóa đơn VAT</button>`:''}
      <button class="btn primary" onclick="this.closest('.overlay').remove()">Đóng</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const ib=ov.querySelector('#invBtn'); if(ib) ib.onclick=()=>{ ov.remove(); openInvoiceForm(r.order_id); };
}
function methodLabel(m){
  const cfg=(operationsConfig?.payment?.methods||[]).find(x=>x.key===m);
  return cfg?.label || {cash:'Tiền mặt',card:'Máy POS',qr:'QR',qrcode:'QR Code',voucher:'Voucher',bank_transfer:'Chuyển khoản',internet_banking:'Internet Banking',momo:'MoMo Pay',zalopay:'ZaloPay',visa:'Visa',pos_card:'Máy POS'}[m] || m;
}

// MISA e-invoice form
async function openInvoiceForm(order_id){
  const existing=await api('/invoices/order/'+order_id).catch(()=>null);
  if(existing) return showInvoice(existing);
  const invCfg=activePrintConfig().einvoice||{};
  const ov=document.createElement('div'); ov.className='overlay show';
  ov.innerHTML=`<div class="modal">
    <h2>Xuất hóa đơn điện tử (${esc(invCfg.provider||'MISA')})</h2><div class="sub">Nhập thông tin người mua</div>
    <label>Tên công ty / khách</label><input type="text" id="iname" placeholder="Công ty TNHH ABC">
    <label>Mã số thuế</label><input type="text" id="itax" placeholder="0312345678">
    <label>Địa chỉ</label><input type="text" id="iaddr" placeholder="12 Nguyễn Huệ, Q1">
    <label>Email nhận hóa đơn</label><input type="text" id="iemail" placeholder="ketoan@abc.vn">
    <div class="mfoot"><button class="btn" id="ican">Hủy</button><button class="btn primary" id="iok">Phát hành</button></div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#ican').onclick=()=>ov.remove();
  ov.querySelector('#iok').onclick=async()=>{
    try{
      const inv=await api('/invoices/issue',{method:'POST',body:{order_id,customer:{
        name:ov.querySelector('#iname').value.trim(),tax_code:ov.querySelector('#itax').value.trim(),
        address:ov.querySelector('#iaddr').value.trim(),email:ov.querySelector('#iemail').value.trim()}}});
      ov.remove(); toast('✅ Đã phát hành hóa đơn '+inv.invoice_no); showInvoice(inv);
    }catch(e){toast(e.message,true);}
  };
}
function showInvoice(inv){
  const ov=document.createElement('div'); ov.className='overlay show';
  ov.innerHTML=`<div class="modal" style="max-width:400px">
    <h2>🧾 Hóa đơn điện tử</h2>
    <div class="receipt" style="font-size:12.5px">
      <div class="c"><h4>HÓA ĐƠN GTGT</h4><div>Số: ${esc(inv.invoice_no)}</div></div><hr>
      ${inv.customer?.name?`<div class="li"><span>Người mua</span><span>${esc(inv.customer.name)}</span></div>`:''}
      ${inv.customer?.tax_code?`<div class="li"><span>MST</span><span>${esc(inv.customer.tax_code)}</span></div>`:''}
      <div class="li tt"><span>Tổng tiền</span><span>${money(inv.total)}</span></div><hr>
      <div class="qr"></div>
      <div class="c" style="font-size:10px">Mã tra cứu: <b>${esc(inv.lookup_code)}</b><br>${esc(inv.lookup_url||'')}</div>
    </div>
    <div class="mfoot"><button class="btn primary" onclick="this.closest('.overlay').remove()">Đóng</button></div>
  </div>`;
  document.body.appendChild(ov);
}

document.getElementById('pendingBell').onclick=()=>openPendingConfirmModal();
document.getElementById('shiftBtn').onclick=()=>openShiftPanel();
startClock(); await refreshOperations(); await refreshShift(); refreshPrintConfig(); refreshPending(); refreshFloor(); refreshCalls();
</script>
