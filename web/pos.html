<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>POS — Cashier</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/runtime-config.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
.poswrap{display:grid;grid-template-columns:minmax(0,1fr) minmax(340px,380px);gap:12px;height:calc(100vh - 120px)}
@media(max-width:980px){.poswrap{grid-template-columns:1fr;height:auto}}
.posleft{overflow-y:auto;min-height:0;padding:0 4px 4px 0}
.floorbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 12px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.floorbar b{display:block;font-size:13px;color:var(--text)}
.floorbar small{display:block;margin-top:2px;font-size:10.5px;color:var(--muted)}
.floorstats{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}
.floorstats .chip{font-size:10.5px;padding:4px 8px}
.zoneblock{margin-bottom:14px}
.zonehead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 8px}
.zonehead b{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
.zonehead small{font-size:10.5px;color:var(--faint);font-weight:700}
.zone{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--faint);margin:14px 0 9px}
.tablegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:9px}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 9px;cursor:pointer;text-align:center;transition:.12s;position:relative;min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tcard:hover{border-color:var(--brand);box-shadow:0 4px 14px rgba(8,145,178,.10)}
.tcard b{font-family:var(--mono);font-size:15px}
.tcard .st{font-size:10px;margin-top:5px;color:var(--faint)}
.tcard .amt{font-family:var(--mono);font-size:11px;color:var(--brand);margin-top:2px}
.tcard.free{background:linear-gradient(180deg,#fff,var(--surface));}
.tcard.busy{border-color:rgba(255,194,77,.45);background:linear-gradient(180deg,var(--surface),rgba(255,194,77,.05))}
.tcard.paying{border-color:rgba(181,140,255,.55);background:linear-gradient(180deg,var(--surface),rgba(181,140,255,.07))}
.tcard.calling{border-color:var(--late);animation:ringing 1s infinite}
@keyframes ringing{50%{box-shadow:0 0 14px rgba(255,107,107,.5)}}
.tcard.sel{outline:2px solid var(--brand)}
.tcard .flag{position:absolute;top:7px;right:8px;font-size:13px}
.billpane{background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.billpane .bh{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.billpane .bh b{font-size:15px}
.billitems{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:7px;min-height:120px}
.bill-empty{margin:auto;min-height:260px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--faint);gap:12px;padding:26px 16px}
.bill-empty img{width:min(210px,68%);max-height:86px;object-fit:contain;opacity:.9}
.bill-empty .hint-pill{border:1px dashed var(--border2);background:var(--surface2);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:750;color:var(--muted)}
.bill-empty small{font-size:11px;line-height:1.45;color:var(--faint)}
.bitem{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.bitem .r1{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600}
.bitem .r1 .p{margin-left:auto;font-family:var(--mono);color:var(--muted);font-weight:500}
.bitem .meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.billfoot{border-top:1px solid var(--border);padding:13px 16px}
.brow{display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);padding:2px 0}
.brow.tt{font-size:17px;font-weight:800;color:var(--text);padding-top:7px}
.brow.tt span:last-child{font-family:var(--mono);color:var(--brand)}
.billbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.custline{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 12px;margin:8px 0;font-size:13px}
.custlist{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-top:4px}
.custrow{display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--border);border-radius:10px;padding:9px 11px;cursor:pointer;background:var(--surface)}
.custrow:hover{border-color:var(--brand)}.custrow.on{border-color:var(--brand);background:var(--brand-dim)}
.custrow .mini{color:var(--muted);font-size:11px;margin-top:2px}
.discbar{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 10px}
.billops{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:0 12px 10px}
.billops .wide{grid-column:1/-1}
.picklist{display:flex;flex-direction:column;gap:7px;max-height:420px;overflow-y:auto;margin-top:10px}
.pickrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 11px}
.pickrow b{font-size:12.5px}.pickrow small{display:block;color:var(--muted);font-size:10.5px;margin-top:2px}
.callbar{background:var(--late-bg);border:1px solid rgba(255,107,107,.4);border-radius:10px;padding:9px 12px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:600;color:var(--late)}
.payline{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:8px 11px;margin-bottom:7px;font-size:12.5px}
.payline b{font-family:var(--mono);margin-left:auto}
.payline .x{color:var(--faint);background:none;font-size:14px}.payline .x:hover{color:var(--late)}
.remain{display:flex;justify-content:space-between;font-weight:800;font-size:14px;padding:10px 2px}
.remain span:last-child{font-family:var(--mono)}
.remain.ok span:last-child{color:var(--done)}.remain.no span:last-child{color:var(--doing)}
.receipt{background:#fdfdf8;color:#1a1a1a;font-family:var(--mono);font-size:12px;border-radius:6px;padding:18px 16px;max-width:340px;margin:0 auto;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.receipt .c{text-align:center}.receipt h4{font-size:14px}
.receipt hr{border:none;border-top:1px dashed #999;margin:8px 0}
.receipt .li{display:flex;justify-content:space-between;gap:8px;padding:1.5px 0}
.receipt .tt{font-weight:700;font-size:13.5px}
.receipt .qr{width:74px;height:74px;margin:8px auto 2px;background:repeating-conic-gradient(#111 0 25%,#fdfdf8 0 50%) 0 0/14px 14px;border:4px solid #111}
.receipt.template{padding:0;overflow:hidden}
.receipt-canvas-live{position:relative;width:100%;background:#fdfdf8;color:#111;aspect-ratio:var(--receipt-ratio,72/180);min-height:360px}
.receipt-canvas-live .tpl-el{position:absolute;white-space:pre-wrap;overflow:hidden;line-height:1.14;box-sizing:border-box}
.receipt-canvas-live .tpl-img img{width:100%;height:100%;object-fit:contain}
.receipt-canvas-live .tpl-line{border-top:1px dashed #777;height:0!important}
.receipt-canvas-live .tpl-qr{display:flex;align-items:center;justify-content:center}
.receipt-canvas-live .tpl-qr .qr{width:min(100%,84px);height:auto;aspect-ratio:1;margin:0}
.receipt-printbar{display:grid;grid-template-columns:auto 78px 1fr;gap:8px;align-items:center;width:100%;margin-right:auto;font-size:12px;color:var(--muted)}
.receipt-printbar input{height:32px;text-align:center;font-weight:800}
.receipt-printbar .btn{height:32px}
.pendingbell{position:relative;min-width:42px}
.pendingbell.hot{border-color:rgba(255,107,107,.55);color:var(--late);background:var(--late-bg);animation:bellPulse 1.4s infinite}
.pendingbell .n{position:absolute;top:-7px;right:-7px;min-width:19px;height:19px;border-radius:99px;background:var(--late);color:#fff;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 5px}
@keyframes bellPulse{50%{box-shadow:0 0 0 5px rgba(255,107,107,.12)}}
.confirm-shell{display:grid;grid-template-columns:172px minmax(0,1fr);gap:12px;height:min(70vh,640px);min-height:430px;margin-top:12px}
.confirm-tabs{border:1px solid var(--border);border-radius:13px;background:var(--surface2);padding:8px;overflow:auto;display:flex;flex-direction:column;gap:8px}
.confirm-tab{border:1px solid var(--border);background:var(--surface);border-radius:11px;padding:10px 9px;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:6px;transition:.12s}
.confirm-tab:hover{border-color:var(--brand)}
.confirm-tab.on{border-color:var(--brand);background:var(--brand-bg);box-shadow:0 0 0 2px rgba(0,167,204,.08)}
.confirm-tab b{font-size:13px}
.confirm-tab small{font-size:11px;color:var(--muted);line-height:1.35}
.confirm-tab .pill{align-self:flex-start;font-size:10px;font-weight:800;border-radius:99px;background:#e8eef7;color:var(--muted);padding:3px 8px;text-transform:uppercase}
.confirm-detail{border:1px solid var(--border);border-radius:13px;background:var(--surface);display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}
.confirm-detail-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);border-bottom:1px solid var(--border)}
.confirm-detail-head b{font-size:15px}.confirm-detail-head small{display:block;color:var(--muted);font-size:11px;margin-top:2px}.confirm-detail-head .money{margin-left:auto;font-family:var(--mono);font-weight:900;color:var(--brand)}
.confirm-body{flex:1;min-height:0;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:9px}
.modal label.confirm-line,.confirm-line{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:start;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;margin:0;color:inherit;letter-spacing:0;text-transform:none;font-weight:inherit;font-size:inherit}
.confirm-line input{margin-top:4px}.confirm-line b{font-size:12.5px}.confirm-line small{display:block;color:var(--muted);font-size:11px;line-height:1.4;margin-top:2px}
.confirm-line .lineamt{font-family:var(--mono);font-size:11.5px;color:var(--brand);font-weight:800;white-space:nowrap}
.confirm-footer{border-top:1px solid var(--border);padding:10px 12px;background:var(--surface);display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:end}
.confirm-footer textarea{min-height:54px;max-height:92px;resize:vertical}
.confirm-empty{border:1px dashed var(--border);border-radius:12px;padding:24px;text-align:center;color:var(--muted);background:var(--surface2);margin-top:12px}
.pending-note{margin:12px;border:1px solid rgba(255,194,77,.45);background:var(--doing-bg);color:#7a5200;border-radius:10px;padding:9px 11px;font-size:12px;font-weight:700}
.shiftbtn{min-width:118px}.shiftbtn.open{border-color:rgba(63,224,143,.45);color:var(--done);background:var(--done-bg)}.shiftbtn.closed{border-color:rgba(255,107,107,.4);color:var(--late);background:var(--late-bg)}
.shift-box{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}.shift-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px}.denom-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;max-height:300px;overflow:auto}.denom-row{display:grid;grid-template-columns:1fr 80px;gap:8px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:7px 9px;font-size:12px}.denom-row b{font-family:var(--mono)}.denom-row input{padding:7px 8px;text-align:right}
.pay-helper{margin-top:12px;border:1px dashed var(--border2);background:var(--surface2);border-radius:12px;padding:12px}.pay-qr{display:grid;grid-template-columns:220px 1fr;gap:18px;align-items:start}.pay-qr img{width:220px;height:220px;object-fit:contain;background:#fff;border:1px solid var(--border);border-radius:10px;padding:6px}.pay-ref{font-family:var(--mono);font-size:11px;color:var(--muted);word-break:break-all}.pay-qr-info{display:flex;flex-direction:column;gap:6px;min-width:0}.pay-qr-prov{font-weight:800;font-size:13px;color:var(--brand);display:flex;align-items:center;gap:6px}.pay-bankrow{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;border-bottom:1px dashed var(--border);padding-bottom:5px}.pay-bankrow span{color:var(--muted);white-space:nowrap}.pay-bankrow b{text-align:right;word-break:break-all}.pay-bankrow b.amt{color:var(--brand);font-size:15px}.shift-report{max-height:260px;overflow:auto;border:1px solid var(--border);border-radius:10px;background:var(--surface2);padding:8px}
.pay-modal{max-width:640px}
.pay-summary{display:flex;justify-content:space-between;gap:12px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin:12px 0;color:var(--muted)}
.pay-summary b{font-family:var(--mono);font-size:18px;color:var(--brand)}
.pay-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:12px;align-items:start}
.pay-methods{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.pay-methods .opt{min-height:46px;display:flex;align-items:center;justify-content:flex-start;gap:7px;white-space:normal;text-align:left;line-height:1.25;padding:9px 10px}
.pay-fields{display:grid;gap:8px}
.pay-actions{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.pay-lines{min-height:74px;max-height:158px;overflow:auto;border:1px solid var(--border);border-radius:11px;padding:8px;background:var(--surface2)}
.pay-modal .mfoot{position:sticky;bottom:-20px;background:var(--surface);padding-top:12px}
@media(max-width:980px){.poswrap{gap:12px}.billpane{min-height:56vh}.viewhead .right{width:100%;justify-content:flex-start}.pendingbell{min-width:48px}.tablegrid{grid-template-columns:repeat(auto-fill,minmax(104px,1fr))}.confirm-shell{grid-template-columns:150px minmax(0,1fr);height:min(72vh,620px)}}
@media(max-width:720px){.confirm-shell{grid-template-columns:1fr;height:min(76vh,660px)}.confirm-tabs{flex-direction:row;overflow-x:auto;min-height:86px}.confirm-tab{min-width:136px}.confirm-footer{grid-template-columns:1fr}.confirm-footer .btn{width:100%}.shift-box{grid-template-columns:1fr}.pay-grid{grid-template-columns:1fr}.pay-qr{grid-template-columns:1fr}.pay-qr img{margin:auto}.pay-methods{grid-template-columns:1fr}}
/* Promo picker — đồng bộ với retail */
.promo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin:14px 0}
.promo-card{border:2px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:.15s;background:var(--surface2);position:relative;display:flex;flex-direction:column;gap:6px}
.promo-card:hover{border-color:var(--brand);box-shadow:0 4px 16px rgba(8,145,178,.14)}
.promo-card.active{border-color:var(--done);background:var(--done-bg)}
.promo-card.active::after{content:"✓";position:absolute;top:10px;right:12px;color:var(--done);font-weight:900;font-size:16px}
.promo-card .pc-icon{font-size:24px;line-height:1}
.promo-card .pc-name{font-weight:800;font-size:13.5px;color:var(--text)}
.promo-card .pc-desc{font-size:11.5px;color:var(--muted);line-height:1.45}
.promo-card .pc-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(52,210,238,.12);color:var(--brand);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;margin-top:2px;width:fit-content}
.promo-card.active .pc-tag{background:var(--done-bg);color:var(--done)}
.promo-none{border:2px dashed var(--border);border-radius:14px;padding:12px 16px;cursor:pointer;transition:.15s;background:transparent;display:flex;align-items:center;gap:12px;color:var(--muted);font-size:13px;font-weight:600}
.promo-none:hover{border-color:var(--late);color:var(--late)}
.promo-none.active{border-color:var(--border2);color:var(--faint);cursor:default}
/* Layout optimizations to prevent vertical cut off */
.view {
  display: flex !important;
  flex-direction: column !important;
  overflow: hidden !important;
}
.poswrap {
  flex: 1;
  min-height: 0;
  height: auto !important;
}
@media(max-width:1180px), (max-height:820px){
  .view{padding:9px 10px!important}
  .viewhead{margin-bottom:8px}
  .viewhead h1{font-size:16px}
  .viewhead .right{gap:6px}
  .poswrap{grid-template-columns:minmax(0,1fr) minmax(312px,33vw);gap:10px}
  .posleft{min-height:0;padding-right:2px}
  .floorbar{padding:8px 9px;margin-bottom:9px;border-radius:10px}
  .floorbar b{font-size:12px}
  .floorbar small{font-size:9.5px}
  .floorstats{gap:4px}
  .floorstats .chip{font-size:9.5px;padding:3px 7px}
  .zoneblock{margin-bottom:10px}
  .zonehead{margin-bottom:6px}
  .zonehead b{font-size:10px;letter-spacing:.6px}
  .zonehead small{font-size:9.5px}
  .zone{font-size:10px;margin:9px 0 6px;letter-spacing:.6px}
  .tablegrid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:7px}
  .tcard{border-radius:10px;padding:9px 7px;min-height:70px}
  .tcard b{font-size:13px}
  .tcard .st{font-size:9px;margin-top:4px;line-height:1.25}
  .tcard .amt{font-size:10px}
  .tcard .flag{top:5px;right:6px;font-size:11px}
  .billpane{border-radius:10px}
  .billpane .bh{padding:9px 11px;gap:7px}
  .billpane .bh b{font-size:13px}
  .billops{grid-template-columns:1fr 1fr;gap:6px;margin:8px 9px}
  .billops .btn{min-height:34px;font-size:11.5px;padding:7px 8px}
  .billitems{padding:7px 8px;gap:6px;min-height:70px}
  .bill-empty{min-height:220px;padding:20px 12px;gap:10px}
  .bill-empty img{width:min(170px,66%);max-height:70px}
  .bill-empty .hint-pill{font-size:11px;padding:7px 10px}
  .bitem{padding:7px 8px;border-radius:8px}
  .bitem .r1{font-size:11.5px;gap:6px}
  .bitem .meta{font-size:10px;gap:5px}
  .billfoot{padding:9px 11px}
  .brow{font-size:11.5px}
  .brow.tt{font-size:15px}
  .custline{padding:7px 9px;margin:5px 0;font-size:11.5px}
  .billbtns{gap:6px;margin-top:8px}
  .billbtns .btn{min-height:36px;padding:8px 9px;font-size:11.5px}
  .callbar,.pending-note{margin:8px 9px;padding:7px 9px;font-size:11.5px}
  .confirm-shell{height:min(70dvh,560px);min-height:360px;grid-template-columns:138px minmax(0,1fr);gap:8px}
  .confirm-tab{padding:8px 7px}
  .confirm-detail-head{padding:9px 10px}
  .confirm-body{padding:8px;gap:7px}
  .confirm-footer{padding:8px;gap:6px}
  .pay-modal{max-width:min(640px,calc(100vw - 18px))}
}
@media(max-width:900px){
  .poswrap{grid-template-columns:1fr;height:auto;overflow:auto}
  .billpane{min-height:420px}
}
.x-btn{background:none;border:none;color:var(--faint);font-size:16px;cursor:pointer;padding:4px 8px;transition:color 0.12s}
.x-btn.warn:hover{color:var(--doing)}
.x-btn.danger:hover{color:var(--late)}
</style></head>
<body>
<div id="top"></div>
<div class="view" style="overflow:hidden">
  <div class="poswrap">
    <div class="posleft" id="floor"></div>
    <div class="billpane" id="bill">
      <div class="bill-empty">
        <img src="/assets/DanOnLogo.png" alt="Dan D Pak">
        <div class="hint-pill">Chọn một bàn để xem bill</div>
        <small>Bàn đang trống sẽ hiện thao tác thêm món sau khi chọn</small>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { api, connect, money, toast, esc, startClock, topbar, requireModuleAccess, renderUserChip, getUser, requestPinCode, pollPayosPaid } from '/shared/client.js';
import { playNotificationSound, applyConfig } from '/js/core/notificationSound.js';
import { mountOrderHistory } from '/shared/orderHistory.js';
import { perkTag, perkAmount, openCustomerPicker } from '/shared/customer.js';
import { createCompanyInvoiceDraft, companyInvoiceHtml, bindCompanyInvoiceBox, companyInvoicePayload, invoiceReceiptCustomerName, invoiceReceiptTaxCode } from '/shared/invoiceRequest.js';
document.getElementById('top').innerHTML = topbar('pos', {
  title: '💳 POS Cashier',

// Xây danh sách CTKM cho 1 order cụ thể
function buildOrderPromoList(o, customer){
  const subtotal = o.subtotal || 0;
  const list = [];
  // 1. Mua 5 tặng 1
  const buy5 = buy5get1AmountForOrder(o);
  if(buy5 > 0) list.push({
    key:'buy5get1', icon:'🎁', name:'Mua 5 Tặng 1',
    desc:`Mua đủ ${BUY_X} sản phẩm retail cùng loại, sản phẩm thứ ${BUY_X+1} được tặng miễn phí.`,
    tag:`-${money(buy5)}`, amount: buy5,
  });
  // 2. Ưu đãi khách hàng
  if(customer && customer.perk_type && customer.perk_type !== 'none'){
    const pa = perkAmount(customer, subtotal);
    if(pa > 0) list.push({
      key:'customer_perk', icon:'👤', name:`Ưu đãi khách — ${customer.name}`,
      desc: customer.perk_type==='free'?'Miễn phí 100%'
        : customer.perk_type==='pct'?`Giảm ${customer.perk_value}% toàn bill`
        : `Giảm ${money(customer.perk_value)}`,
      tag: customer.perk_type==='free'?'FREE 100%'
        : customer.perk_type==='pct'?`-${customer.perk_value}%`
        : `-${money(customer.perk_value)}`,
      amount: pa,
    });
  }
  // 3. Giảm % nhanh
  [5,10].forEach(pct=>{
    const amt = Math.round(subtotal * pct / 100);
    if(amt > 0) list.push({ key:`p${pct}`, icon:'💰', name:`Giảm ${pct}%`, desc:`Giảm ${pct}% tạm tính`, tag:`-${pct}%`, amount: amt });
  });
  return list;
}

function openOrderPromoPicker(o, customer, currentDisc, onPicked){
  const promos = buildOrderPromoList(o, customer);
  const activeKey = orderPromo[o.id]?.key || null;
  const ov2 = document.createElement('div'); ov2.className='overlay show'; document.body.appendChild(ov2);
  function draw(){
    const curKey = orderPromo[o.id]?.key || null;
    ov2.innerHTML=`<div class="modal" style="max-width:560px">
      <h2>🎁 Chọn chương trình khuyến mãi</h2>
      <div class="sub">Mỗi hóa đơn chỉ áp 1 CTKM. Chạm để chọn hoặc bỏ chọn.</div>
      <div class="promo-grid">
        ${promos.map(p=>{
          const isActive = curKey === p.key;
          return `<div class="promo-card ${isActive?'active':''}" data-pk="${esc(p.key)}">
            <div class="pc-icon">${p.icon}</div>
            <div class="pc-name">${esc(p.name)}</div>
            <div class="pc-desc">${esc(p.desc)}</div>
            <div class="pc-tag">${esc(p.tag)}</div>

          </div>`;
        }).join('')}
        <div class="promo-card" data-pk="__manual">
          <div class="pc-icon">✏️</div>
          <div class="pc-name">Giảm giá thủ công</div>
          <div class="pc-desc">Nhập số tiền giảm tùy ý</div>
          <div class="pc-tag">${curKey==='__manual'&&currentDisc>0?`-${money(currentDisc)}`:'nhập số'}</div>
        </div>
      </div>
      <div class="promo-none ${!curKey?'active':''}" id="promoNone">
        <span style="font-size:20px">🚫</span>
        <span>${curKey?'Bỏ tất cả khuyến mãi':'Không áp khuyến mãi (đang chọn)'}</span>
      </div>
      <div class="mfoot"><button class="btn primary" id="pmClose">Xong</button></div>
    </div>`;
    ov2.querySelectorAll('[data-pk]').forEach(el=>el.onclick=()=>{
      const key = el.dataset.pk;
      if(key==='__manual'){
        const v=prompt('Nhập số tiền giảm (VND):',String(currentDisc||0)); if(v===null) return;
        const amt=Math.max(0,parseInt(v)||0);
        orderPromo[o.id] = {key:'__manual',icon:'✏️',name:'Giảm tay',amount:amt};
        onPicked(amt); ov2.remove(); return;
      }
      const p = promos.find(x=>x.key===key);
      if(!p) return;
      if(orderPromo[o.id]?.key===p.key){ delete orderPromo[o.id]; onPicked(0); }
      else { orderPromo[o.id]=p; onPicked(p.amount); }
      ov2.remove();
    });
    ov2.querySelector('#promoNone').onclick=()=>{ delete orderPromo[o.id]; onPicked(0); ov2.remove(); };
    ov2.querySelector('#pmClose').onclick=()=>ov2.remove();
  }
  draw();
  ov2.onclick=e=>{ if(e.target===ov2) ov2.remove(); };
}

function renderFloor(){
  const zones=[...new Set(tables.map(t=>t.zone))];
  const total=tables.length;
  const open=tables.filter(t=>t.status!=='free').length;
  const paying=tables.filter(t=>t.status==='paying').length;
  const calling=tables.filter(t=>t.status==='calling'||t.call).length;
  const pending=pendingConfirms.length;
  const head=`<div class="floorbar">
    <div><b>Sơ đồ bàn</b><small>${total} bàn · ${Math.max(0,total-open)} trống</small></div>
    <div class="floorstats">
      <span class="chip c-doing">${open} đang dùng</span>
      <span class="chip c-muted">${paying} chờ thu</span>
      ${calling?`<span class="chip c-late">${calling} đang gọi</span>`:''}
      ${pending?`<span class="chip c-doing">${pending} bill chờ xác nhận</span>`:''}
    </div>
  </div>`;
  document.getElementById('floor').innerHTML = head + (zones.map(z=>{
    const rows=tables.filter(t=>t.zone===z);
    const zoneOpen=rows.filter(t=>t.status!=='free').length;
    return `<section class="zoneblock">

  }).join('') || billEmptyHtml('Chưa có bàn', 'Vào Settings để cấu hình sơ đồ bàn'));

function tcard(t){
  const pc=pendingConfirms.find(g=>g.table_id===t.id);

  return `<div class="tcard ${cls} ${sel===t.id?'sel':''}" data-t="${t.id}">

function renderBill(table,o){
  const bp=document.getElementById('bill');
  if(!o){ bp.innerHTML=`<div class="bh"><b>🪑 Bàn ${esc(table.code)}</b><span class="chip c-muted">Trống</span></div>
    <div class="billops">
      <button class="btn" id="addMenuBtn">➕ Thêm món FnB</button>

    </div>
    ${billEmptyHtml('Bàn chưa có order', 'Thêm món FnB/retail hoặc chờ khách gọi món từ iPad')}`;
    if(table.call) bp.querySelector('.bill-empty').insertAdjacentHTML('beforebegin',callBar(table));
    bindBillButtons(table,o); return; }

  // Recalculate client-side discount and total before rendering
  const customer = orderCust[o.id] || null;
  if (customer && customer.perk_type && customer.perk_type !== 'none' && !orderPromo[o.id]) {
    const pa = perkAmount(customer, o.subtotal || 0);
    if (pa > 0) {
      orderPromo[o.id] = {
        key: 'customer_perk',
        icon: '👤',
        name: `Ưu đãi khách — ${customer.name}`,
        amount: pa
      };
    }
  }
  const activePromo = orderPromo[o.id];
  if (activePromo) {
    if (activePromo.key === 'customer_perk' && customer) {
      activePromo.amount = perkAmount(customer, o.subtotal || 0);
    } else if (activePromo.key === 'buy5get1') {
      activePromo.amount = buy5get1AmountForOrder(o);
    } else if (activePromo.key.startsWith('p') && activePromo.key !== 'pos_card') {
      const pct = parseInt(activePromo.key.slice(1));
      if (!isNaN(pct)) activePromo.amount = Math.round((o.subtotal || 0) * pct / 100);
    }
    if (activePromo.key === '__manual') {
      activePromo.amount = Math.min(o.subtotal || 0, activePromo.amount || 0);
    }
    o.discount = activePromo.amount;
  } else {
    o.discount = 0;
  }
  o.total = Math.max(0, (o.subtotal || 0) - (o.discount || 0));

  const items=o.items.filter(i=>i.status!=='cancelled');
  const hasPending=items.some(i=>i.status==='pending_confirm');
  bp.innerHTML=`
    <div class="bh"><b>🪑 Bàn ${esc(table.code)}</b><span class="chip c-muted">#${esc(o.bill_no||o.id.slice(-6).toUpperCase())}</span>
      <span style="margin-left:auto" class="chip ${o.status==='open'?'c-doing':'c-done'}">${o.status==='open'?'Đang mở':'Đã thanh toán'}</span></div>
    ${table.call?callBar(table):''}
    ${hasPending?`<div class="pending-note">🔔 Bill này có món khách vừa gọi đang chờ nhân viên xác nhận trước khi chuyển xuống bếp/bar.</div>`:''}
    <div class="billops">
      <button class="btn" id="addMenuBtn">➕ Thêm món FnB</button>
      <button class="btn" id="addRetailBtn">🛒 Thêm retail</button>
      <button class="btn" id="moveTableBtn">↪ Chuyển bàn</button>
      <button class="btn" id="mergeTableBtn">⇄ Gộp bàn</button>
      <button class="btn wide" id="splitBillBtn">✂ Tách bill / thanh toán riêng</button>
    </div>
    <div class="billitems">${items.map(bitem).join('')}</div>
    <div class="billfoot">
      ${customerLineHtml(orderCust[o.id]||null,'custBtn')}
      <div class="brow"><span>Tạm tính</span><span>${money(o.subtotal)}</span></div>
      ${buy5get1AmountForOrder(o)?`<div class="brow"><span>🎁 Retail mua 5 tặng 1 (gợi ý)</span><span style="color:var(--doing)">-${money(buy5get1AmountForOrder(o))}</span></div>`:''}
      ${o.discount?`<div class="brow"><span>Giảm giá</span><span style="color:var(--late)">-${money(o.discount)}</span></div>`:''}
      <div class="brow tt"><span>Tổng cộng</span><span>${money(o.total)}</span></div>
      <div class="billbtns">
        ${hasPending?`<button class="btn primary" id="sendBtn" style="grid-column:1/-1;padding:12px;background:var(--brand);margin-bottom:8px">🔥 Gửi món vô bếp</button>`:''}
        <button class="btn" id="discBtn">% Giảm giá</button>
        <button class="btn" id="printBtn">🧾 In tạm tính</button>
        <button class="btn primary" id="payBtn" style="grid-column:1/-1;padding:12px" ${hasPending?'disabled':''}>Thanh toán · ${money(o.total)}</button>
      </div>
    </div>`;
  bindBillButtons(table,o);
}

function bindBillButtons(table,o){
  const rc=document.getElementById('resolveCall'); if(rc) rc.onclick=async()=>{await api('/calls/'+table.id+'/resolve',{method:'POST'});refreshCalls();loadBill(table.id);};
  const am=document.getElementById('addMenuBtn'); if(am) am.onclick=async()=>{ if(await ensureShiftOpen(()=>openAddMenu(table))) openAddMenu(table); };
  const ar=document.getElementById('addRetailBtn'); if(ar) ar.onclick=async()=>{ if(await ensureShiftOpen(()=>openAddRetail(table))) openAddRetail(table); };
  if(!o) return;
  const mv=document.getElementById('moveTableBtn'); if(mv) mv.onclick=()=>openMoveTable(table,o);
  const mg=document.getElementById('mergeTableBtn'); if(mg) mg.onclick=()=>openMergeTable(table,o);
  const sp=document.getElementById('splitBillBtn'); if(sp) sp.onclick=()=>openSplitBill(table,o);
  const pay=document.getElementById('payBtn'); if(pay) pay.onclick=async()=>{ if(await ensureShiftOpen(()=>openPay(o))) openPay(o); };
  document.getElementById('discBtn').onclick=()=>{
    const v=prompt('Nhập số tiền giảm (VND):','0'); if(v===null)return;
    const amt=Math.max(0,parseInt(v)||0);
    orderPromo[o.id]={key:'__manual',icon:'✏️',name:'Giảm tay',amount:amt};
    renderBill(table,o);
  };
  const cb=document.getElementById('custBtn'); if(cb) cb.onclick=()=>openCustomerPicker(orderCust[o.id], c=>{
    if(c) {
      orderCust[o.id]=c;
      if (c.perk_type && c.perk_type !== 'none') {
        const pa = perkAmount(c, o.subtotal || 0);
        if (pa > 0) {
          orderPromo[o.id] = {
            key: 'customer_perk',
            icon: '👤',
            name: `Ưu đãi khách — ${c.name}`,
            amount: pa
          };
        } else {
          delete orderPromo[o.id];
        }
      } else {
        if (orderPromo[o.id]?.key === 'customer_perk') delete orderPromo[o.id];
      }
    } else {
      delete orderCust[o.id];
      if (orderPromo[o.id]?.key === 'customer_perk') delete orderPromo[o.id];
    }
    renderBill(table,o);
  });
  document.getElementById('printBtn').onclick=()=>showReceipt(buildPreview(table,o),{autoPrint:true});

  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) {
    sendBtn.onclick = async () => {
      try {
        await api('/orders/' + o.id + '/confirm', { method: 'POST', body: { item_ids: [] } });
        toast('Đã gửi món vào bếp!');
        loadBill(table.id);
      } catch (e) {
        toast(e.message, true);
      }
    };
  }

  document.querySelectorAll('[data-cancel-item-id]').forEach(btn => {
    btn.onclick = async () => {
      const itemId = btn.dataset.cancelItemId;
      const isPending = btn.classList.contains('warn');
      
      if (isPending) {
        if (!confirm('Xóa món này khỏi danh sách nháp?')) return;
        try {
          await api('/orders/items/' + itemId + '/cancel', { method: 'POST', body: { reason: 'Nhân viên xóa nháp' } });
          toast('Đã xóa món nháp');
          loadBill(table.id);
        } catch (e) {
          toast(e.message, true);
        }
      } else {
        const pin = await requestPinCode({
          title:'Xác nhận hủy món',
          subtitle:'Món đã được gửi. Nhập PIN 4 số của Quản lý hoặc Chủ quán để hủy.',
          roleLabel:'Quản lý / Chủ quán',
          cancelText:'Hủy',
        });
        if (!pin) return;
        const reason = prompt('Nhập lý do hủy món:');
        if (reason === null) return;
        try {
          await api('/orders/items/' + itemId + '/cancel', {
            method: 'POST',
            body: { pin, reason: reason.trim() || 'Nhân viên hủy' }
          });
          toast('Đã hủy món');
          loadBill(table.id);
        } catch (e) {
          toast(e.message, true);
        }
      }
    };
  });
}

function stationName(s){return {kitchen:'Bếp',bar:'Bar',salad:'Salad/Lạnh',beverage:'Quầy nước',retail:'Retail'}[s]||s||'Không rõ';}
function pendingLineMeta(i){
  const mods=(i.mods||[]).map(m=>`${m.group?m.group+': ':''}${m.name}${m.price?` (+${money(m.price)})`:''}`).join(', ');
  const bits=[];
  if(mods) bits.push('Ăn kèm / topping: '+mods);
  if(i.note) bits.push('Ghi chú: '+i.note);
  bits.push('Chuyển tới: '+stationName(i.station));
  return bits.join(' · ');
}

    remainEl.innerHTML=`<span>${r>0?'Còn thiếu':'Tiền thối'}</span><span>${money(Math.abs(r))}</span>`;
  }
  function methodName(m){return methods.find(x=>x[0]===m)?.[1]||m;}
  ov.querySelector('#addLine').onclick=()=>{

    lines.push({method:curMethod,amount:amt,reference:ov.querySelector('#ref').value.trim()});
    ov.querySelector('#amt').value='';ov.querySelector('#ref').value='';draw();
  };
  // quick-fill full amount
  ov.querySelector('#amt').value=o.total;
  ov.querySelector('#cancel').onclick=()=>ov.remove();
  ov.querySelector('#confirm').onclick=async()=>{
    if(!lines.length){const amt=parseInt(ov.querySelector('#amt').value)||0; if(amt>0)lines.push({method:curMethod,amount:amt,reference:ov.querySelector('#ref').value.trim()});}
    if(paid()<o.total) return toast('Chưa đủ tiền',true);
    try{
      const receipt=await api('/orders/'+o.id+'/pay',{method:'POST',body:{lines,discount:o.discount}});
      ov.remove(); toast('✅ Thanh toán thành công'); showReceipt(receipt,{autoPrint:true});
      if(opts.afterPaid) opts.afterPaid();
      else{
        sel=null; order=null;
        document.getElementById('bill').innerHTML=billEmptyHtml();
        refreshFloor();
      }
    }catch(e){toast(e.message,true);}
  };
  draw();
}

      ov.querySelectorAll('.payline .x').forEach(b=>b.onclick=()=>{lines.splice(+b.dataset.i,1);amtEl.value=remaining();draw();drawHelper();});
      const r=total()-paid();

    ov.querySelectorAll('#pm .opt').forEach(o2=>o2.onclick=()=>{ ov.querySelectorAll('#pm .opt').forEach(x=>x.classList.remove('sel'));o2.classList.add('sel');curMethod=o2.dataset.m;refEl.value='';setDefaultRef();drawHelper(); });
    amtEl.value=total(); setDefaultRef(); drawHelper(); draw();

    ov.querySelector('#addLine').onclick=()=>{ const amt=parseInt(amtEl.value)||0; if(amt<=0)return toast('Nhập số tiền',true); lines.push({method:curMethod,amount:amt,reference:refEl.value.trim()||makePaymentRef(curMethod,o)}); amtEl.value=remaining();refEl.value='';setDefaultRef();draw();drawHelper(); };
    ov.querySelector('#cancel').onclick=()=>{ stopPayosPoll(); ov.remove(); };
    ov.querySelector('#confirm').onclick=async()=>{
      stopPayosPoll();
      if(!lines.length){const amt=parseInt(amtEl.value)||0; if(amt>0)lines.push({method:curMethod,amount:amt,reference:refEl.value.trim()||makePaymentRef(curMethod,o)});}

      let invoice_customer=null;
      try{ invoice_customer=companyInvoicePayload(invoiceDraft); }
      catch(e){ return toast(e.message,true); }
      try{
        const receipt=await api('/orders/'+o.id+'/pay',{method:'POST',body:{lines,discount:disc,customer:customer||null,invoice_customer}});
        delete orderCust[o.id]; delete orderPromo[o.id]; ov.remove(); toast('✅ Thanh toán thành công'); showReceipt(receipt,{autoPrint:true}); refreshShift();
        if(opts.afterPaid) opts.afterPaid();
        else{ sel=null; order=null; document.getElementById('bill').innerHTML=billEmptyHtml(); refreshFloor(); }
      }catch(e){toast(e.message,true);}
    };
  }
  renderModal();
}

function activePrintConfig(r){ return r?.print_config || printConfig || {}; }
function activeBillCfg(r){ return activePrintConfig(r).bill || {}; }
function activeBillTemplate(r){ return activePrintConfig(r).templates?.bill || null; }
function replaceVars(text, vars){ return String(text||'').replace(/\{(\w+)\}/g,(_,k)=>vars[k]??`{${k}}`); }
function vndPlain(n){ return Math.round(Number(n)||0).toLocaleString('en-US'); }
function pad2(n){ return String(n).padStart(2,'0'); }
function receiptDate(d){ return `${pad2(d.getDate())}/${pad2(d.getMonth()+1)}/${d.getFullYear()}`; }
function receiptTime(d){ return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`; }
function internalBillNo(r,d){
  if(r.bill_no && /^Dan\d{10}$/i.test(r.bill_no)) return r.bill_no;
  const seed=String(r.order_id||r.number||'1');
  let n=0; for(const ch of seed) n=(n*31+ch.charCodeAt(0))%10000;
  return `Dan${pad2(d.getDate())}${pad2(d.getMonth()+1)}${String(d.getFullYear()).slice(-2)}${String(n||1).padStart(4,'0')}`;
}
function numberToVietnamese(n){
  n=Math.round(Number(n)||0);
  if(n===0) return 'Không đồng';
  const digit=['không','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'], unit=['','nghìn','triệu','tỷ'];
  function triad(num, full=false){
    const tr=Math.floor(num/100), ch=Math.floor((num%100)/10), dv=num%10, out=[];
    if(tr>0||full) out.push(digit[tr]+' trăm');
    if(ch>1){ out.push(digit[ch]+' mươi'); if(dv===1) out.push('mốt'); else if(dv===5) out.push('lăm'); else if(dv) out.push(digit[dv]); }
    else if(ch===1){ out.push('mười'); if(dv===5) out.push('lăm'); else if(dv) out.push(digit[dv]); }
    else if(dv){ if(tr>0||full) out.push('lẻ'); out.push(digit[dv]); }
    return out.join(' ');
  }
  const parts=[]; let x=n, idx=0;
  while(x>0){ const g=x%1000; if(g) parts.unshift(`${triad(g, parts.length>0)} ${unit[idx]}`.trim()); x=Math.floor(x/1000); idx++; }
  const s=parts.join(' ').replace(/\s+/g,' ').trim();
  return s.charAt(0).toUpperCase()+s.slice(1)+' đồng chẵn';
}
function lineCategory(i){ return isRetailLine(i) ? 'retail' : 'fnb'; }
function itemLineAmount(i,rate,priceIncludesVat){
  const gross=(Number(i.unit_price)||0)*(Number(i.qty)||1);
  return priceIncludesVat ? Math.round(gross/(1+rate/100)) : gross;
}
function formatReceiptItemRow(idx,i,rate,priceIncludesVat){
  const name=String(i.name||'').replace(/\s+/g,' ').slice(0,24).padEnd(24,' ');
  const qty=String(i.qty||1).padStart(2,' ');
  const unit=Math.round(itemLineAmount({...i,qty:1},rate,priceIncludesVat));
  const amount=itemLineAmount(i,rate,priceIncludesVat);
  return `${String(idx).padStart(2,'0')}   ${name} ${qty} ${vndPlain(unit).padStart(9,' ')} ${vndPlain(amount).padStart(12,' ')}`;
}
function receiptItemsText(r){
  const tax=r.tax||{}, rate=Number(tax.vat_rate||8)||0, inc=tax.price_includes_vat!==false;
  const groups={fnb:[],retail:[]};
  (r.items||[]).forEach(i=>groups[lineCategory(i)].push(i));
  const rows=[]; let idx=1;
  if(groups.fnb.length){ rows.push('[DANH MỤC F&B - NHÀ HÀNG / ĐỒ UỐNG]'); groups.fnb.forEach(i=>rows.push(formatReceiptItemRow(idx++,i,rate,inc))); }
  if(groups.retail.length){ if(rows.length) rows.push(''); rows.push('[DANH MỤC RETAIL - SẢN PHẨM TIÊU DÙNG]'); groups.retail.forEach(i=>rows.push(formatReceiptItemRow(idx++,i,rate,inc))); }
  return rows.join('\n');
}
function receiptVars(r){

function receiptVarsBcm(r){

    discount:vndPlain(r.discount||0),
    total:vndPlain(r.total||0),
    grandTotal:vndPlain(grand),
    totalWords:numberToVietnamese(grand),

    method:lines.length?lines.map(l=>methodLabel(l.method)).join(' / '):(r.preview?'Chưa thanh toán':'-'),
    paymentStatus:r.preview?'Chưa thanh toán':'Đã thanh toán',
    taxAuthorityCode:r.tax_authority_code||r.invoice?.lookup_code||'00F83A7B-2C9D-4E1A-8B6C-5D4E3F2A1B0C',

function renderTemplateReceipt(r){
  const tpl=activeBillTemplate(r);
  if(!tpl?.elements?.length) return '';
  const vars=receiptVarsBcm(r);
  const w=Number(tpl.widthMm)||72, h=Number(tpl.heightMm)||180;
  const els=tpl.elements.map((el,i)=>{
    const pos=`left:${Number(el.x)||0}%;top:${Number(el.y)||0}%;width:${Number(el.w)||20}%;height:${el.type==='line'?0:(Number(el.h)||8)}%;z-index:${i+1}`;
    if(el.type==='image') return `<div class="tpl-el tpl-img" style="${pos}">${el.src?`<img src="${esc(el.src)}">`:''}</div>`;
    if(el.type==='line') return `<div class="tpl-el tpl-line" style="${pos}"></div>`;
    if(el.type==='qr') return `<div class="tpl-el tpl-qr" style="${pos}"><div class="qr"></div></div>`;
    const align=el.align==='center'?'center':el.align==='right'?'right':el.align==='justify'?'justify':'left';
    const justify=align==='center'?'center':align==='right'?'flex-end':'flex-start';
    const decoration=[el.underline?'underline':'',el.strike?'line-through':''].filter(Boolean).join(' ')||'none';
    const block=el.id==='bill_body';
    return `<div class="tpl-el" style="${pos};font-size:${Math.max(8,(Number(el.fontSize)||5)*1.95)}px;font-weight:${el.bold?800:500};font-style:${el.italic?'italic':'normal'};text-decoration:${decoration};text-align:${align};display:${block?'block':'flex'};align-items:${block?'flex-start':'center'};justify-content:${justify};padding:${block?'8px 10px':'0'}">${esc(replaceVars(el.text,vars))}</div>`;
  }).join('');
  const cfg=activeBillCfg(r);
  const hasTaxNote=tpl.elements.some(el=>String(el.text||'').includes('{taxNote}'));
  const taxFallback=cfg.showTax!=='0' && !hasTaxNote ? `<div class="c" style="padding:0 16px 8px;font-size:10px;color:#666">${esc(vars.taxNote||'')}</div>` : '';
  return `<div class="receipt template" style="max-width:${w<=58?270:340}px"><div class="receipt-canvas-live" style="--receipt-ratio:${w}/${h}">${els}</div>${taxFallback}${cfg.showQr!=='0'&&!r.preview?`<div style="padding:0 16px 14px"><div class="qr"></div><div class="c" style="font-size:10px">Quet QR tra cuu hoa don</div></div>`:''}</div>`;
}

const RECEIPT_COPIES_KEY=cfgKey('receipt_copies');

function saveReceiptCopies(v){

    .receipt .c{text-align:center}.receipt h4{font-size:14px}.receipt hr{border:none;border-top:1px dashed #999;margin:8px 0}.receipt .li{display:flex;justify-content:space-between;gap:8px;padding:1.5px 0}.receipt .tt{font-weight:700;font-size:13.5px}.receipt .qr{width:74px;height:74px;margin:8px auto 2px;background:repeating-conic-gradient(#111 0 25%,#fdfdf8 0 50%) 0 0/14px 14px;border:4px solid #111}
    .receipt.template{padding:0;overflow:hidden}.receipt-canvas-live{position:relative;width:100%;background:#fdfdf8;color:#111;aspect-ratio:var(--receipt-ratio,72/180);min-height:360px}.receipt-canvas-live .tpl-el{position:absolute;white-space:pre-wrap;overflow:hidden;line-height:1.14;box-sizing:border-box}.receipt-canvas-live .tpl-img img{width:100%;height:100%;object-fit:contain}.receipt-canvas-live .tpl-line{border-top:1px dashed #777;height:0!important}.receipt-canvas-live .tpl-qr{display:flex;align-items:center;justify-content:center}.receipt-canvas-live .tpl-qr .qr{width:min(100%,84px);height:auto;aspect-ratio:1;margin:0}
  </style></head><body>${body}</body></html>`;

function printReceiptNow(r,copies=readReceiptCopies()){
  const n=saveReceiptCopies(copies);
  const frame=document.createElement('iframe');
  frame.style.position='fixed'; frame.style.right='0'; frame.style.bottom='0'; frame.style.width='1px'; frame.style.height='1px'; frame.style.border='0'; frame.style.opacity='0';
  document.body.appendChild(frame);
  const doc=frame.contentDocument||frame.contentWindow.document;
  doc.open(); doc.write(receiptPrintDoc(r,n)); doc.close();

}

    <div style="display:none">
    <div class="receipt">
      <div class="c"><h4>${esc(r.branch||'POS/ERP')}</h4><div>${r.preview?'PHIẾU TẠM TÍNH':'HÓA ĐƠN'} #${r.number}</div>
      ${r.table_code?`<div>Bàn: ${esc(r.table_code)}</div>`:''}</div>
      <hr>
      ${r.items.map(i=>`<div class="li"><span>${i.qty}× ${esc(i.name)}</span><span>${money(i.unit_price*i.qty)}</span></div>${(i.mods||[]).length?`<div class="li" style="font-size:10px;color:#666"><span>  + ${esc(i.mods.map(m=>m.name).join(', '))}</span><span></span></div>`:''}`).join('')}
      <hr>
      <div class="li"><span>Tạm tính</span><span>${money(r.subtotal)}</span></div>
      ${r.discount?`<div class="li"><span>Giảm giá</span><span>-${money(r.discount)}</span></div>`:''}
      <div class="li tt"><span>TỔNG</span><span>${money(r.total)}</span></div>
      ${r.lines&&r.lines.length?'<hr>'+r.lines.map(l=>`<div class="li"><span>${methodLabel(l.method)}</span><span>${money(l.amount)}</span></div>`).join(''):''}
      ${!r.preview&&r.change?`<div class="li"><span>Tiền thối</span><span>${money(r.change)}</span></div>`:''}
      ${!r.preview?`<div class="qr"></div><div class="c" style="font-size:10px">Quét QR tra cứu hóa đơn</div>`:''}
      <hr><div class="c" style="font-size:10px">Cảm ơn quý khách!</div>
    </div>
    </div>
    <div class="mfoot">
      <div class="receipt-printbar"><span>Số bản</span><input id="receiptCopies" type="number" inputmode="numeric" min="1" max="9" value="${readReceiptCopies()}"><button class="btn" id="receiptPrintBtn">In</button></div>
      ${(!r.preview&&r.order_id)?`<button class="btn" id="invBtn">🧾 Xuất hóa đơn VAT</button>`:''}
      <button class="btn primary" onclick="this.closest('.overlay').remove()">Đóng</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  const copiesEl=ov.querySelector('#receiptCopies');
  const doPrint=()=>printReceiptNow(r,copiesEl?.value||readReceiptCopies());
  copiesEl.oninput=()=>saveReceiptCopies(copiesEl.value);
  copiesEl.onchange=()=>saveReceiptCopies(copiesEl.value);
  ov.querySelector('#receiptPrintBtn').onclick=doPrint;
  if(opts.autoPrint) setTimeout(doPrint,220);
  const ib=ov.querySelector('#invBtn'); if(ib) ib.onclick=()=>{ ov.remove(); openInvoiceForm(r.order_id); };
}
function methodLabel(m){
  const cfg=(operationsConfig?.payment?.methods||[]).find(x=>x.key===m);
  return cfg?.label || {cash:'Tiền mặt',card:'Máy POS',qr:'QR',qrcode:'QR Code',voucher:'Voucher',bank_transfer:'Chuyển khoản',internet_banking:'Internet Banking',momo:'MoMo Pay',zalopay:'ZaloPay',visa:'Visa',pos_card:'Máy POS'}[m] || m;
}

// MISA e-invoice form
async function openInvoiceForm(order_id){
  const existing=await api('/invoices/order/'+order_id).catch(()=>null);
  if(existing) return showInvoice(existing);
  const invCfg=activePrintConfig().einvoice||{};
  const ov=document.createElement('div'); ov.className='overlay show';
  ov.innerHTML=`<div class="modal">
    <h2>Xuất hóa đơn điện tử (${esc(invCfg.provider||'MISA')})</h2><div class="sub">Nhập thông tin người mua</div>
    <label>Tên công ty / khách</label><input type="text" id="iname" placeholder="Công ty TNHH ABC">
    <label>Mã số thuế</label><input type="text" id="itax" placeholder="0312345678">
    <label>Địa chỉ</label><input type="text" id="iaddr" placeholder="12 Nguyễn Huệ, Q1">
    <label>Email nhận hóa đơn</label><input type="text" id="iemail" placeholder="ketoan@abc.vn">
    <div class="mfoot"><button class="btn" id="ican">Hủy</button><button class="btn primary" id="iok">Phát hành</button></div>
  </div>`;
  document.body.appendChild(ov);
  ov.querySelector('#ican').onclick=()=>ov.remove();
  ov.querySelector('#iok').onclick=async()=>{
    try{
      const inv=await api('/invoices/issue',{method:'POST',body:{order_id,customer:{
        name:ov.querySelector('#iname').value.trim(),tax_code:ov.querySelector('#itax').value.trim(),
        address:ov.querySelector('#iaddr').value.trim(),email:ov.querySelector('#iemail').value.trim()}}});
      ov.remove(); toast('✅ Đã phát hành hóa đơn '+inv.invoice_no); showInvoice(inv);
    }catch(e){toast(e.message,true);}
  };
}
function showInvoice(inv){
  const ov=document.createElement('div'); ov.className='overlay show';
  ov.innerHTML=`<div class="modal" style="max-width:400px">
    <h2>🧾 Hóa đơn điện tử</h2>
    <div class="receipt" style="font-size:12.5px">
      <div class="c"><h4>HÓA ĐƠN GTGT</h4><div>Số: ${esc(inv.invoice_no)}</div></div><hr>
      ${inv.customer?.name?`<div class="li"><span>Người mua</span><span>${esc(inv.customer.name)}</span></div>`:''}
      ${inv.customer?.tax_code?`<div class="li"><span>MST</span><span>${esc(inv.customer.tax_code)}</span></div>`:''}
      <div class="li tt"><span>Tổng tiền</span><span>${money(inv.total)}</span></div><hr>
      <div class="qr"></div>
      <div class="c" style="font-size:10px">Mã tra cứu: <b>${esc(inv.lookup_code)}</b><br>${esc(inv.lookup_url||'')}</div>
    </div>
    <div class="mfoot"><button class="btn primary" onclick="this.closest('.overlay').remove()">Đóng</button></div>
  </div>`;
  document.body.appendChild(ov);
}

document.getElementById('pendingBell').onclick=()=>openPendingConfirmModal();
document.getElementById('shiftBtn').onclick=()=>openShiftPanel();
startClock(); await refreshOperations(); await refreshShift(); refreshPrintConfig(); refreshPending(); refreshFloor(); refreshCalls();
</script>
