<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Liên hệ — POS/ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/runtime-config.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
.ctoolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.seg{display:inline-flex;gap:4px;background:var(--surface2);border:1px solid var(--border2);border-radius:11px;padding:4px}
.seg button{padding:7px 14px;border-radius:8px;background:transparent;border:0;color:var(--muted);font-weight:700;font-size:12.5px;display:inline-flex;align-items:center;gap:7px}
.seg button.on{background:var(--surface);color:var(--brand);box-shadow:0 1px 3px rgba(15,23,42,.08)}
.seg .n{font-family:var(--mono);font-size:11px;background:var(--surface3);color:var(--muted);border-radius:99px;padding:1px 7px;font-weight:700}
.seg button.on .n{background:var(--brand-dim);color:var(--brand)}
.csearch{flex:1;min-width:200px;max-width:340px;position:relative}
.csearch input{width:100%;padding-left:34px}
.csearch::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.6}
.ctable{width:100%;border-collapse:separate;border-spacing:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.ctable th{text-align:left;font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--faint);padding:11px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.ctable td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.ctable tr:last-child td{border-bottom:0}
.ctable tbody tr{cursor:pointer;transition:background .1s}
.ctable tbody tr:hover{background:var(--surface2)}
.ctable .nm{font-weight:700}
.ctable .co{color:var(--muted);font-size:12px;margin-top:2px}
.ctable .mono{font-family:var(--mono);font-size:12px;color:var(--muted)}
.tbadge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:99px;letter-spacing:.3px;text-transform:uppercase}
.tb-customer{background:var(--brand-dim);color:var(--brand)}
.tb-supplier{background:#f59e0b22;color:#b45309}
.tb-both{background:#8b5cf622;color:#7c3aed}
.tb-staff{background:#10b98122;color:#047857}
.tb-off{background:var(--surface3);color:var(--faint)}
.modal .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal .row2 > div{min-width:0}
.modal .mst-row{display:flex;gap:8px;align-items:flex-end}
.modal .mst-row input{flex:1}
.modal .seg{display:flex;width:100%;margin-top:7px}
.modal .seg button{flex:1;justify-content:center}
.modal .acts{display:flex;gap:9px;margin-top:20px}
.modal .acts .btn{flex:1;padding:11px}
.hint{font-size:11.5px;color:var(--muted);margin-top:6px;line-height:1.45}
@media(max-width:640px){.modal .row2{grid-template-columns:1fr}}
</style></head>
<body>
<div id="top"></div>
<div class="view">
  <div class="ctoolbar">
    <div class="seg" id="seg">
      <button data-t="all" class="on">Tất cả <span class="n" id="n-all">0</span></button>
      <button data-t="customer">Khách hàng <span class="n" id="n-customer">0</span></button>
      <button data-t="supplier">Nhà cung cấp <span class="n" id="n-supplier">0</span></button>
      <button data-t="staff">Nhân viên <span class="n" id="n-staff">0</span></button>
    </div>
    <div class="csearch"><input type="search" id="q" placeholder="Tìm theo tên, SĐT, MST, công ty…"></div>
  </div>
  <div id="list"></div>
</div>

<div class="overlay" id="ov">
  <div class="modal">
    <h2 id="mTitle">Thêm liên hệ</h2>
    <div class="sub" id="mSub">Khách hàng hoặc nhà cung cấp</div>

    <label>Loại liên hệ</label>
    <div class="seg" id="ptSeg">
      <button data-pt="customer" class="on">🛍️ Khách hàng</button>
      <button data-pt="supplier">🏭 Nhà cung cấp</button>
      <button data-pt="both">🔁 Cả hai</button>
      <button data-pt="staff">🧑‍💼 Nhân viên</button>
    </div>

    <label>Tên <span style="color:var(--late)">*</span></label>
    <input type="text" id="f_name" placeholder="Tên khách / tên nhà cung cấp">

    <label>Công ty</label>
    <input type="text" id="f_company" placeholder="Tên công ty (nếu có)">

    <div class="row2">
      <div><label>Số điện thoại</label><input type="tel" id="f_phone" placeholder="09xx xxx xxx"></div>
      <div><label>Email</label><input type="email" id="f_email" placeholder="email@vd.com"></div>
    </div>

    <label>Mã số thuế</label>
    <div class="mst-row">
      <input type="text" id="f_tax" placeholder="10 hoặc 13 chữ số">
      <button class="btn" id="taxBtn" type="button">Tra cứu</button>
    </div>
    <div class="hint" id="taxHint" style="display:none"></div>

    <div id="contactPersonWrap" style="display:none">
      <label>Người liên hệ</label>
      <input type="text" id="f_contact" placeholder="Tên người phụ trách bên NCC">
    </div>

    <label>Địa chỉ</label>
    <input type="text" id="f_address" placeholder="Địa chỉ giao / nhận hàng">

    <div id="perkWrap">
      <label id="perkLabel">Ưu đãi mặc định cho khách</label>
      <div class="row2">
        <div>
          <select id="f_perk_type">
            <option value="none">Không ưu đãi</option>
            <option value="pct">Giảm theo %</option>
            <option value="amount">Giảm số tiền</option>
            <option value="free">Miễn phí</option>
          </select>
        </div>
        <div><input type="number" id="f_perk_value" placeholder="Giá trị" min="0"></div>
      </div>
    </div>

    <label>Ghi chú</label>
    <textarea id="f_note" rows="2" placeholder="Ghi chú nội bộ"></textarea>

    <label style="display:flex;align-items:center;gap:9px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text);margin-top:14px;cursor:pointer">
      <input type="checkbox" id="f_active" checked style="width:auto"> Active — đang hoạt động (bỏ chọn = Inactive, lưu trữ — không xóa)
    </label>

    <label id="autoInvoiceLabel" style="display:flex;align-items:center;gap:9px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--text);margin-top:10px;cursor:pointer">
      <input type="checkbox" id="f_auto_invoice" style="width:auto"> Tự động chọn xuất hóa đơn VAT khi thanh toán
    </label>

    <div class="acts">
      <button class="btn danger" id="delBtn" style="display:none">Xóa</button>
      <button class="btn" id="cancelBtn">Hủy</button>
      <button class="btn primary" id="saveBtn">Lưu</button>
    </div>
  </div>
</div>

<script type="module">
import { api, connect, toast, esc, money, startClock, topbar, requireModuleAccess, renderUserChip } from '/shared/client.js';
document.getElementById('top').innerHTML = topbar('contacts', {
  title: '👥 Liên hệ',
  sub: 'Khách hàng &amp; nhà cung cấp dùng chung một danh bạ — dùng lại cho POS, mua hàng, kho và công nợ',
  actions: `<button class="btn primary" id="addBtn">+ Thêm liên hệ</button>`,
});
await requireModuleAccess('contacts'); renderUserChip();

let type = 'all', q = '', rows = [], editing = null;
const $ = id => document.getElementById(id);
const TYPE_LABEL = { customer: 'Khách hàng', supplier: 'Nhà cung cấp', both: 'Cả hai', staff: 'Nhân viên' };

connect('contacts', { 'customers:updated': () => load() });

async function load(){
  try {
    const { partners, counts } = await api(`/partners?type=${type}&q=${encodeURIComponent(q)}`);
    rows = partners;
    $('n-all').textContent = counts.all;
    $('n-customer').textContent = counts.customer;
    $('n-supplier').textContent = counts.supplier;
    $('n-staff').textContent = counts.staff ?? 0;
    render();
  } catch(e){ $('list').innerHTML = `<div class="empty">${esc(e.message)}</div>`; }
}

function typeBadge(c){
  if (!c.active) return `<span class="tbadge tb-off">Inactive</span>`;
  return `<span class="tbadge tb-${c.partner_type}">${TYPE_LABEL[c.partner_type]||c.partner_type}</span>`;
}

function render(){
  if (!rows.length){
    $('list').innerHTML = `<div class="empty">Chưa có liên hệ nào.<br>Bấm “+ Thêm liên hệ” để tạo mới.</div>`;
    return;
  }
  $('list').innerHTML = `<table class="ctable">
    <thead><tr><th>Tên</th><th>Loại</th><th>Điện thoại</th><th>MST / Người liên hệ</th><th style="text-align:right">Lịch sử</th></tr></thead>
    <tbody>${rows.map(rowHtml).join('')}</tbody></table>`;
  $('list').querySelectorAll('tr[data-id]').forEach(tr => tr.onclick = () => openEdit(tr.dataset.id));
}

function rowHtml(c){
  const sub = c.tax_code ? `<span class="mono">MST ${esc(c.tax_code)}</span>` : (c.contact_person ? esc(c.contact_person) : '<span style="color:var(--faint)">—</span>');
  const hist = c.is_customer && c.total_orders ? `${c.total_orders} đơn · ${money(c.total_spent)}` : '<span style="color:var(--faint)">—</span>';
  return `<tr data-id="${esc(c.id)}">
    <td><div class="nm">${esc(c.name)}</div>${c.company?`<div class="co">${esc(c.company)}</div>`:''}</td>
    <td>${typeBadge(c)}</td>
    <td class="mono">${c.phone?esc(c.phone):'<span style="color:var(--faint)">—</span>'}</td>
    <td>${sub}</td>
    <td style="text-align:right;font-size:12px;color:var(--muted)">${hist}</td>
  </tr>`;
}

// ---- form ----
function setPartnerType(pt){
  $('ptSeg').querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.pt === pt));
  const isSupplier = pt === 'supplier' || pt === 'both';
  const isCustomer = pt === 'customer' || pt === 'both';
  const isStaff = pt === 'staff';
  $('contactPersonWrap').style.display = isSupplier ? 'block' : 'none';
  $('perkWrap').style.display = (isCustomer || isStaff) ? 'block' : 'none';
  $('perkLabel').textContent = isStaff ? 'Ưu đãi mặc định cho nhân viên' : 'Ưu đãi mặc định cho khách';
  $('autoInvoiceLabel').style.display = isCustomer ? 'flex' : 'none';
}
function currentPartnerType(){ return $('ptSeg').querySelector('button.on')?.dataset.pt || 'customer'; }

function openForm(c){
  editing = c;
  $('mTitle').textContent = c ? 'Sửa liên hệ' : 'Thêm liên hệ';
  $('mSub').textContent = c ? esc(c.name) : 'Khách hàng, nhà cung cấp hoặc nhân viên';
  setPartnerType(c?.partner_type || 'customer');
  $('f_name').value = c?.name || '';
  $('f_company').value = c?.company || '';
  $('f_phone').value = c?.phone || '';
  $('f_email').value = c?.email || '';
  $('f_tax').value = c?.tax_code || '';
  $('f_contact').value = c?.contact_person || '';
  $('f_address').value = c?.address || '';
  $('f_perk_type').value = c?.perk_type || 'none';
  $('f_perk_value').value = c?.perk_value || '';
  $('f_note').value = c?.note || '';
  $('f_active').checked = c ? !!c.active : true;
  $('f_auto_invoice').checked = c ? !!c.auto_invoice : false;
  $('taxHint').style.display = 'none';
  $('delBtn').style.display = c ? 'block' : 'none';
  $('ov').classList.add('show');
  setTimeout(() => $('f_name').focus(), 60);
}
function openEdit(id){ const c = rows.find(r => r.id === id); if (c) openForm(c); }
function closeForm(){ $('ov').classList.remove('show'); editing = null; }

async function save(){
  const name = $('f_name').value.trim();
  if (!name) return toast('Cần nhập tên liên hệ', true);
  const body = {
    id: editing?.id,
    partner_type: currentPartnerType(),
    name,
    company: $('f_company').value.trim(),
    phone: $('f_phone').value.trim(),
    email: $('f_email').value.trim(),
    tax_code: $('f_tax').value.trim(),
    contact_person: $('f_contact').value.trim(),
    address: $('f_address').value.trim(),
    perk_type: $('f_perk_type').value,
    perk_value: parseInt($('f_perk_value').value) || 0,
    note: $('f_note').value.trim(),
    active: $('f_active').checked ? 1 : 0,
    auto_invoice: $('f_auto_invoice').checked ? 1 : 0,
  };
  try {
    await api('/partners', { method: 'POST', body });
    toast(editing ? 'Đã cập nhật liên hệ' : 'Đã thêm liên hệ');
    closeForm(); load();
  } catch(e){ toast(e.message, true); }
}

async function del(){
  if (!editing) return;
  if (!confirm(`Xóa liên hệ “${editing.name}”?`)) return;
  try { await api(`/partners/${editing.id}/delete`, { method: 'POST' }); toast('Đã xóa'); closeForm(); load(); }
  catch(e){ toast(e.message, true); }
}

async function lookupTax(){
  const mst = $('f_tax').value.trim();
  if (!mst) return toast('Nhập MST trước', true);
  $('taxBtn').disabled = true; $('taxBtn').textContent = '…';
  try {
    const r = await api(`/customers/lookup/tax/${encodeURIComponent(mst)}`);
    if (r.ok){
      if (r.company && !$('f_company').value) $('f_company').value = r.company;
      if (r.name && !$('f_name').value) $('f_name').value = r.name;
      if (r.address && !$('f_address').value) $('f_address').value = r.address;
      $('taxHint').style.display = 'block';
      $('taxHint').textContent = `✓ ${r.company || r.name || ''}${r.address ? ' · ' + r.address : ''}`;
    } else { $('taxHint').style.display = 'block'; $('taxHint').textContent = r.message || 'Không tra cứu được.'; }
  } catch(e){ toast(e.message, true); }
  finally { $('taxBtn').disabled = false; $('taxBtn').textContent = 'Tra cứu'; }
}

// ---- bind ----
$('seg').querySelectorAll('button').forEach(b => b.onclick = () => {
  type = b.dataset.t;
  $('seg').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
  load();
});
$('ptSeg').querySelectorAll('button').forEach(b => b.onclick = () => setPartnerType(b.dataset.pt));
let qTimer;
$('q').oninput = e => { clearTimeout(qTimer); qTimer = setTimeout(() => { q = e.target.value.trim(); load(); }, 250); };
$('addBtn').onclick = () => openForm(null);
$('saveBtn').onclick = save;
$('delBtn').onclick = del;
$('cancelBtn').onclick = closeForm;
$('taxBtn').onclick = lookupTax;
$('ov').onclick = e => { if (e.target === $('ov')) closeForm(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape' && $('ov').classList.contains('show')) closeForm(); });

startClock(); load();
</script>
</body></html>
