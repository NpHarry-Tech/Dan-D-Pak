<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>iPad Simulator — POS/ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<style>
html,body{width:100%;height:100%}
body{overflow:hidden}
.simbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.simbar .logo{display:flex;align-items:center;gap:9px;font-weight:800;margin-right:8px}
.simbar .logo .dot{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#34d2ee,#3fe08f);display:flex;align-items:center;justify-content:center;color:#06222b;font-size:15px}
.seg{display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:3px}
.seg button{padding:6px 11px;border-radius:6px;background:transparent;color:var(--muted);font-size:12px;font-weight:600}
.seg button.on{background:var(--brand-dim);color:var(--brand)}
.simbar .lbl{font-size:11px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(180deg,#f8fbff,#eaf1f8);position:relative;padding:24px;min-height:0}
.scaler{transform-origin:center center;transition:transform .18s ease;will-change:transform}
/* iPad bezel */
.device{background:#e7edf5;border-radius:42px;padding:16px;box-shadow:0 0 0 2px #c7d2de,0 24px 70px rgba(15,23,42,.18),inset 0 0 0 1px #f8fafc;position:relative}
.device::before{content:"";position:absolute;top:50%;left:7px;width:6px;height:54px;transform:translateY(-50%);background:#cbd5e1;border-radius:4px;box-shadow:0 70px 0 #cbd5e1,0 -70px 0 #cbd5e1}
.device .cam{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:#94a3b8;box-shadow:inset 0 0 0 2px #64748b}
.screen{background:var(--bg);border-radius:26px;overflow:hidden;position:relative}
.screen iframe{display:block;border:0;background:var(--bg)}
.hint{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--faint);text-align:center;pointer-events:none}
.dimtag{font-family:var(--mono);font-size:11px;color:var(--muted)}
.simbar .spacer{margin-left:auto}
.simbar .fsbtn{font-size:12px;color:var(--muted);font-weight:700;background:transparent;border:1px solid var(--border2);border-radius:8px;padding:6px 10px}
.simbar .fsbtn:hover{color:var(--brand);border-color:var(--brand)}
.simbar a.exit{font-size:12px;color:var(--muted);font-weight:600}
.simbar a.exit:hover{color:var(--brand)}
body.is-fullscreen .stage{padding:14px}
body.is-fullscreen .hint{display:none}
</style></head>
<body>
<div class="simbar">
  <div class="logo"><div class="dot">⬢</div>iPad Simulator</div>
  <span class="lbl">Thiết bị</span>
  <div class="seg" id="devSeg">
    <button data-d="ipad" class="on">📱 iPad</button>
    <button data-d="retail">🛒 Retail</button>
    <button data-d="pos">💳 POS</button>
    <button data-d="kds">👨‍🍳 KDS</button>
    <button data-d="admin">📊 Quản lý</button>
  </div>
  <span class="lbl">Hướng</span>
  <div class="seg" id="oriSeg">
    <button data-o="portrait" class="on">▯ Dọc</button>
    <button data-o="landscape">▭ Ngang</button>
  </div>
  <span class="lbl">Model</span>
  <div class="seg" id="modelSeg">
    <button data-m="air" class="on">iPad Air 11″</button>
    <button data-m="pro">iPad Pro 13″</button>
    <button data-m="mini">iPad mini</button>
  </div>
  <span class="dimtag" id="dim"></span>
  <span class="spacer"></span>
  <button class="fsbtn" id="fsBtn">⛶ Full màn</button>
  <a class="exit" href="/">✕ Thoát ra Launcher</a>
</div>
<div class="stage">
  <div class="scaler" id="scaler">
    <div class="device" id="device">
      <span class="cam"></span>
      <div class="screen" id="screen">
        <iframe id="frame" src="/ipad" allowfullscreen></iframe>
      </div>
    </div>
  </div>
  <div class="hint">Đây là khung iPad mô phỏng. Order ở đây vẫn chạy thật → hiện realtime ở các tab POS / KDS / Quản lý.</div>
</div>

<script>
const MODELS = { air:[820,1180], pro:[1032,1376], mini:[744,1133] };
const UI_VIEWPORT = { portrait:[820,1180], landscape:[1180,820] };
const DEVICES = ['ipad','retail','pos','kds','admin'];
const ORIS = ['portrait','landscape'];
const STATE_KEY = 'pos_erp_sim_state';
const savedState = readState();
let device = DEVICES.includes(savedState.device) ? savedState.device : 'ipad';
let ori = ORIS.includes(savedState.ori) ? savedState.ori : 'portrait';
let model = MODELS[savedState.model] ? savedState.model : 'air';

function apply(){
  syncControls();
  saveState();
  const [mw0,mh0] = MODELS[model];
  const [mw,mh] = ori==='landscape' ? [mh0,mw0] : [mw0,mh0];
  let [w,h] = UI_VIEWPORT[ori];
  const screen=document.getElementById('screen');
  const frame=document.getElementById('frame');
  screen.style.width=w+'px'; screen.style.height=h+'px';
  frame.style.width=w+'px'; frame.style.height=h+'px';
  document.getElementById('dim').textContent=`UI ${w}×${h} · ${mw}×${mh}`;
  // load device if changed
  const url='/'+device;
  if(!frame.src.endsWith(url)) frame.src=url;
  requestAnimationFrame(scaleToFit);
}
function scaleToFit(){
  const stage=document.querySelector('.stage');
  const dev=document.getElementById('device');
  const availW=stage.clientWidth-28, availH=stage.clientHeight-28;
  const dw=dev.offsetWidth, dh=dev.offsetHeight;
  const scale=Math.max(.1, Math.min(availW/dw, availH/dh));
  document.getElementById('scaler').style.transform='scale('+scale+')';
}
function seg(id,attr,cb){
  document.querySelectorAll('#'+id+' button').forEach(b=>b.onclick=()=>{
    cb(b.dataset[attr]);
  });
}
seg('devSeg','d',v=>{device=v; // non-iPad devices look best landscape
  if(v==='pos'||v==='kds'||v==='admin'||v==='retail'){ori='landscape';setOri();} apply();});
seg('oriSeg','o',v=>{ori=v;apply();});
seg('modelSeg','m',v=>{model=v;apply();});
function setOri(){document.querySelectorAll('#oriSeg button').forEach(b=>b.classList.toggle('on',b.dataset.o===ori));}
function syncControls(){
  document.querySelectorAll('#devSeg button').forEach(b=>b.classList.toggle('on',b.dataset.d===device));
  document.querySelectorAll('#oriSeg button').forEach(b=>b.classList.toggle('on',b.dataset.o===ori));
  document.querySelectorAll('#modelSeg button').forEach(b=>b.classList.toggle('on',b.dataset.m===model));
}
function readState(){
  try { return JSON.parse(localStorage.getItem(STATE_KEY) || '{}') || {}; }
  catch { return {}; }
}
function saveState(){
  localStorage.setItem(STATE_KEY, JSON.stringify({ device, ori, model }));
}

document.getElementById('fsBtn').onclick=async()=>{
  try{
    if(!document.fullscreenElement) await document.documentElement.requestFullscreen();
    else await document.exitFullscreen();
  }catch(e){ console.warn(e); }
};
document.addEventListener('fullscreenchange',()=>{
  const on=!!document.fullscreenElement;
  document.body.classList.toggle('is-fullscreen',on);
  document.getElementById('fsBtn').textContent=on?'⤢ Thoát full':'⛶ Full màn';
  setTimeout(scaleToFit,80);
});

window.addEventListener('resize', scaleToFit);
apply();
// re-fit after iframe content loads
document.getElementById('frame').addEventListener('load', scaleToFit);
</script>
</body></html>
