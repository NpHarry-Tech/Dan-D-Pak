<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>In ấn — POS/ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/runtime-config.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
body{overflow:hidden}
.print-page{height:calc(100dvh - var(--topbar-h,70px));display:grid;grid-template-rows:auto auto 1fr;gap:12px;padding:14px 16px;box-sizing:border-box;min-height:0}
.print-head{display:flex;align-items:center;gap:12px;min-width:0}
.print-title h1{font-size:20px;margin:0;font-weight:850}
.print-title .sub{font-size:12px;color:var(--muted);margin-top:2px}
.print-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.metric-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;min-width:0}
.metric .k{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:850}.metric .v{font-size:18px;font-weight:850;margin-top:3px}
.printer-devices{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.device{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:11px 12px;min-width:0;display:flex;flex-direction:column;gap:8px}
.device-top{display:flex;align-items:flex-start;gap:8px}.device-ic{font-size:20px}.device-name{font-weight:850;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.device-meta{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.device-actions{display:flex;gap:6px;flex-wrap:wrap}.device-actions .btn{height:28px;padding:0 9px;font-size:11px}
.status{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 8px;font-size:10.5px;font-weight:850;border:1px solid var(--border2);white-space:nowrap}.status i{width:7px;height:7px;border-radius:50%;background:currentColor}
.s-ready{color:var(--done);background:var(--done-bg)}.s-queued{color:var(--brand);background:var(--brand-dim)}.s-failed{color:var(--late);background:var(--late-bg)}.s-disabled{color:var(--muted);background:var(--surface2)}.s-printing{color:#b7791f;background:#fff7e6}
.history{background:var(--surface);border:1px solid var(--border);border-radius:8px;display:grid;grid-template-rows:auto 1fr;min-height:0;overflow:hidden}
.history-tools{display:flex;align-items:center;gap:8px;padding:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}.history-tools input{min-width:260px;flex:1;height:34px}.history-tools select{height:34px;min-width:130px}
.table-wrap{overflow:auto;min-height:0}
.jobs{width:100%;border-collapse:separate;border-spacing:0}.jobs th{position:sticky;top:0;background:var(--surface);z-index:1;color:var(--faint);font-size:10px;text-transform:uppercase;letter-spacing:.45px;text-align:left;padding:10px;border-bottom:1px solid var(--border)}
.jobs td{padding:10px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}.jobs tr{cursor:pointer}.jobs tr:hover td{background:var(--surface2)}
.job-main{font-weight:850;color:var(--text);max-width:460px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.job-sub{font-size:11px;color:var(--muted);margin-top:2px;max-width:460px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mono{font-family:var(--mono)}
.drawer{position:fixed;inset:0;background:rgba(15,23,42,.52);z-index:300;display:none;align-items:center;justify-content:flex-end;padding:14px}.drawer.show{display:flex}
.detail{width:min(940px,95%);height:min(680px,92dvh);background:var(--surface);border:1px solid var(--border);border-radius:10px;display:grid;grid-template-rows:auto 1fr auto;box-shadow:0 24px 70px rgba(15,23,42,.28);overflow:hidden}
.detail-head{display:flex;align-items:flex-start;gap:10px;padding:14px;border-bottom:1px solid var(--border)}.detail-head h2{font-size:16px;margin:0;font-weight:850}.detail-head .sub{font-size:11.5px;color:var(--muted);margin-top:2px}.detail-head .x{margin-left:auto}
.detail-body{display:grid;grid-template-columns:320px 1fr;gap:16px;padding:14px;min-height:0;overflow:hidden;background:var(--surface)}
.detail-pane{display:flex;flex-direction:column;min-height:0;overflow:hidden}
.detail-pane.scroll{overflow-y:auto;padding-right:4px}
.detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;background:transparent}
.detail-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px}.detail-box .k{font-size:10px;color:var(--faint);text-transform:uppercase;font-weight:850}.detail-box .v{font-size:12px;font-weight:750;margin-top:2px;word-break:break-word}
.preview{margin:0;padding:14px;overflow:auto;background:#fffdf5;color:#161616;font:12px/1.38 var(--mono);white-space:pre-wrap}
.detail-actions{display:flex;gap:8px;justify-content:flex-end;align-items:center;padding:12px;border-top:1px solid var(--border);flex-wrap:wrap}
.empty-print{padding:30px;text-align:center;color:var(--muted);font-size:12px}
@media(max-width:900px){body{overflow:auto}.print-page{height:auto;min-height:calc(100dvh - var(--topbar-h,70px));grid-template-rows:auto auto auto 1fr}.metric-row{grid-template-columns:repeat(2,1fr)}.jobs th:nth-child(4),.jobs td:nth-child(4){display:none}.history-tools input{min-width:180px}.drawer{justify-content:center}.detail{height:min(720px,96dvh);width:min(620px,95%);grid-template-rows:auto 1fr auto}.detail-body{grid-template-columns:1fr;grid-template-rows:1fr 1fr;overflow-y:auto;gap:12px}.detail-pane{overflow:visible}}
@media(max-width:560px){.print-page{padding:10px}.print-head{align-items:flex-start}.print-actions{width:100%;justify-content:flex-start;margin-left:0}.metric-row{grid-template-columns:1fr 1fr}.printer-devices{grid-template-columns:1fr}.jobs th:nth-child(5),.jobs td:nth-child(5){display:none}.detail-grid{grid-template-columns:1fr}}
</style></head>
<body>
<div id="top"></div>
<main class="print-page">

  <section class="metric-row" id="metrics"></section>
  <section class="printer-devices" id="devices"></section>

  <section class="history">
    <div class="history-tools">
      <input id="searchBox" placeholder="Tìm bàn, mã job, món, hóa đơn, phiếu kho...">
      <select id="printerFilter"></select>
      <select id="statusFilter">
        <option value="">Tất cả trạng thái</option>
        <option value="queued">Chờ in</option>
        <option value="printing">Đang in</option>
        <option value="printed">Đã in</option>
        <option value="failed">Lỗi</option>
      </select>
      <select id="typeFilter"></select>
    </div>
    <div class="table-wrap">
      <table class="jobs">
        <thead><tr><th>Thời gian</th><th>Nội dung</th><th>Máy in</th><th>Bàn/Ref</th><th>Trạng thái</th></tr></thead>
        <tbody id="jobRows"></tbody>
      </table>
    </div>
  </section>
</main>

<div class="drawer" id="detailDrawer">
  <div class="detail">
    <div class="detail-head">
      <div>
        <h2 id="detailTitle">Chi tiết job in</h2>
        <div class="sub" id="detailSub"></div>
      </div>
      <button class="btn sm x" id="detailClose">Đóng</button>
    </div>
    
    <div class="detail-body">
      <div class="detail-pane">
        <div style="font-size:10px;color:var(--faint);text-transform:uppercase;font-weight:850;margin-bottom:6px">Mẫu in (Preview)</div>
        <pre class="preview allow-select" id="detailPreview" style="flex:1;border:1px solid var(--border);border-radius:8px">Đang tải...</pre>
      </div>
      
      <div class="detail-pane scroll">
        <div style="font-size:10px;color:var(--faint);text-transform:uppercase;font-weight:850;margin-bottom:6px">Thông tin chi tiết</div>
        <div class="detail-grid" id="detailMeta"></div>
      </div>
    </div>

    <div class="detail-actions">
      <button class="btn" id="markPrintedBtn">Đánh dấu đã in</button>
      <button class="btn" id="sendPrinterBtn">Gửi máy in thật</button>
      <button class="btn primary" id="reprintPreviewBtn">In lại</button>
    </div>
  </div>
</div>

<script type="module">
import { api, connect, esc, toast, topbar, startClock, requireModuleAccess, renderUserChip } from '/shared/client.js';

document.getElementById('top').innerHTML = topbar('printers', {
  title: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>In ấn & thiết bị',
  sub: 'Máy in thật, két tiền, lịch sử in và in lại có kiểm tra trước.',
  actions: `<button class="btn sm" id="openDrawerBtn">Mở két</button>
      <a class="btn sm" href="/settings?tab=connections">Cấu hình máy in</a>
      <button class="btn sm primary" id="refreshBtn">Tải lại</button>`,
});
await requireModuleAccess('printing');
renderUserChip();

const STATUS = {
  queued:['Chờ in','s-queued'],
  printing:['Đang in','s-printing'],
  printed:['Đã in','s-ready'],
  failed:['Lỗi','s-failed'],
};
const TYPE = {
  kitchen_ticket:'Lên món / Phiếu bếp',
  receipt:'Hóa đơn / Tạm tính',
  cup_label:'Tem ly',
  product_label:'Tem sản phẩm',
  runner:'Phiếu chạy món',
  test:'In thử',
  cash_drawer:'Mở két tiền',
  inventory_document:'Phiếu kho',
  purchase:'Phiếu mua hàng',
  refund:'Hoàn / trả hàng',
};

let printers = [];
let jobs = [];
let currentJob = null;
let currentText = '';

const q = (id) => document.getElementById(id);
const fmtTime = (v) => v ? new Date(v).toLocaleString('vi-VN',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}) : '-';
const statusPill = (s) => { const [t,c]=STATUS[s]||[s||'Không rõ','s-disabled']; return `<span class="status ${c}"><i></i>${esc(t)}</span>`; };
const printerName = (id) => printers.find(p=>p.id===id)?.label || printers.find(p=>p.id===id)?.name || id || '-';
const targetLabel = (p) => p.connection==='lan' ? `${p.ip||'chưa có IP'}:${p.port||9100}` : (p.connection==='system' ? (p.systemName||p.name||'chưa chọn driver') : 'Trình duyệt');
const deviceIcon = (p) => /bill|receipt|hóa|hoa/i.test(`${p.id} ${p.output} ${p.label}`) ? '🧾' : /label|tem/i.test(`${p.output} ${p.label}`) ? '🏷️' : /runner|chạy/i.test(`${p.output} ${p.label}`) ? '🍽️' : /bar/i.test(`${p.id} ${p.label}`) ? '🍹' : '🔥';

function explainPrintError(err) {
  if (!err) return '';
  const e = String(err).toLowerCase();
  
  if (e.includes('invalidprinterexception') || e.includes('settings to access printer') || e.includes('out-printer')) {
    const match = err.match(/printer\s+['"]([^'"]+)['"]/i) || err.match(/Out-Printer\s+-Name\s+["']([^"']+)["']/i);
    const printerName = match ? match[1] : '';
    return `<div style="font-weight: 700; color: var(--late)">Máy in không tồn tại trên máy tính Server</div>
      <div style="margin-top: 6px; font-size: 12px; line-height: 1.5; color: var(--text)">
        Hệ thống không tìm thấy máy in có tên chính xác là <b>"${esc(printerName || 'Máy in')}"</b> trong cài đặt Windows của Server.
        <br><br>
        <b>Cách khắc phục nhanh:</b>
        <br>1. Vào phần <b>Cài đặt máy in</b> hoặc <b>Cài đặt -> Máy in</b> trong Dashboard.
        <br>2. Chọn đúng tên máy in thật được liệt kê ở cột <b>Máy in hệ điều hành (OS)</b> (hoặc gõ chính xác từng ký tự tên máy in hiển thị trong Windows Control Panel / Devices and Printers).
        <br>3. Kiểm tra xem máy in đã bật nguồn và cắm cáp kết nối USB/LAN vào máy tính Server chưa.
      </div>`;
  }
  
  if (e.includes('không kết nối được máy in lan') || e.includes('etimedout') || e.includes('ehostunreach') || e.includes('timeout')) {
    return `<div style="font-weight: 700; color: var(--late)">Lỗi kết nối mạng LAN tới máy in</div>
      <div style="margin-top: 6px; font-size: 12px; line-height: 1.5; color: var(--text)">
        Máy chủ không thể gửi lệnh in tới địa chỉ IP của máy in bếp/bar.
        <br><br>
        <b>Cách khắc phục nhanh:</b>
        <br>1. Kiểm tra xem dây mạng LAN đã cắm chắc chắn từ máy in vào Router/Switch mạng chưa (đèn cổng LAN phía sau máy in phải nhấp nháy).
        <br>2. Đảm bảo iPad/máy POS này và máy in đang dùng chung một mạng nội bộ (cùng Router/WiFi).
        <br>3. IP máy in có thể đã thay đổi. Hãy in phiếu kiểm tra (Self-Test) bằng cách tắt nguồn máy in, giữ nút <b>FEED</b> rồi bật nguồn lại. Xem IP ghi trên phiếu và cập nhật lại vào ô <b>IP máy in (LAN)</b> trong phần cài đặt.
      </div>`;
  }
  
  if (e.includes('thiếu ip')) {
    return `<div style="font-weight: 700; color: var(--late)">Thiếu địa chỉ IP máy in</div>
      <div style="margin-top: 6px; font-size: 12px; line-height: 1.5; color: var(--text)">
        Máy in này đang cấu hình kết nối LAN nhưng chưa có địa chỉ IP.
        <br><br>
        <b>Cách khắc phục nhanh:</b> Vào Cài đặt máy in và nhập IP của máy in (ví dụ: 192.168.1.50).
      </div>`;
  }

  if (e.includes('thiếu tên máy in')) {
    return `<div style="font-weight: 700; color: var(--late)">Chưa chọn máy in hệ điều hành</div>
      <div style="margin-top: 6px; font-size: 12px; line-height: 1.5; color: var(--text)">
        Chưa chọn tên máy in trong hệ điều hành Windows/macOS.
        <br><br>
        <b>Cách khắc phục nhanh:</b> Vào Cài đặt máy in, chọn đúng tên thiết bị từ danh sách hệ điều hành hiển thị.
      </div>`;
  }

  return `<div style="font-weight: 700; color: var(--late)">Lỗi hệ thống in ấn</div>
    <div style="margin-top: 6px; font-size: 12px; line-height: 1.5; color: var(--text)">
      Gặp lỗi khi xử lý lệnh in: <i>"${esc(err)}"</i>.
      <br><br>
      <b>Cách khắc phục nhanh:</b> Hãy kiểm tra xem máy in có bị kẹt giấy, hết giấy, tắt nguồn hoặc bị lỏng dây cáp không.
    </div>`;
}

function searchable(j){
  return [
    j.id,j.printer,j.type,j.title,j.status,j.error,
    j.meta?.action,j.meta?.table,j.meta?.ref,j.meta?.item_preview,
    JSON.stringify(j.payload||{}),
  ].join(' ').toLowerCase();
}

async function load(){
  const [p, js] = await Promise.all([
    api('/print/printers').catch(()=>[]),
    api('/print/jobs?limit=200').catch(()=>[]),
  ]);
  printers = Array.isArray(p) ? p : [];
  jobs = Array.isArray(js) ? js : [];
  draw();
}

function draw(){
  drawMetrics();
  drawDevices();
  drawFilters();
  drawRows();
}

function drawMetrics(){
  const ready = printers.filter(p=>p.status==='ready').length;
  const queued = jobs.filter(j=>j.status==='queued'||j.status==='printing').length;
  const failed = jobs.filter(j=>j.status==='failed').length;
  const printed = jobs.filter(j=>j.status==='printed').length;
  q('metrics').innerHTML = [
    ['Máy in sẵn sàng', `${ready}/${printers.length}`],
    ['Đang chờ xử lý', queued],
    ['Job lỗi', failed],
    ['Đã in gần đây', printed],
  ].map(([k,v])=>`<div class="metric"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('');
}

function drawDevices(){
  q('devices').innerHTML = printers.length ? printers.map(p=>{
    const cls = p.status==='ready' ? 's-ready' : p.status==='disabled' ? 's-disabled' : 's-failed';
    const label = p.status==='ready' ? 'Sẵn sàng' : p.status==='disabled' ? 'Tạm tắt' : p.status==='not_configured' ? 'Chưa cấu hình' : 'Cần kiểm tra';
    return `<article class="device">
      <div class="device-top">
        <div class="device-ic">${deviceIcon(p)}</div>
        <div style="min-width:0;flex:1">
          <div class="device-name">${esc(p.label||p.name||p.id)}</div>
          <div class="device-meta">${esc(p.location||'-')} · ${esc(p.connection||'browser')} · ${esc(targetLabel(p))}</div>
        </div>
        <span class="status ${cls}"><i></i>${esc(label)}</span>
      </div>
      <div class="device-actions">
        <button class="btn sm" data-test-printer="${esc(p.id)}">In thử</button>
        ${p.cashDrawer?`<button class="btn sm" data-open-drawer="${esc(p.id)}">Mở két</button>`:''}
      </div>
    </article>`;
  }).join('') : '<div class="empty-print">Chưa có danh mục máy in. Vào Cấu hình máy in để thêm tuyến in.</div>';
  q('devices').querySelectorAll('[data-test-printer]').forEach(b=>b.onclick=()=>testPrinter(b.dataset.testPrinter));
  q('devices').querySelectorAll('[data-open-drawer]').forEach(b=>b.onclick=()=>openDrawer(b.dataset.openDrawer));
}

function drawFilters(){
  const curP=q('printerFilter').value, curT=q('typeFilter').value;
  q('printerFilter').innerHTML = `<option value="">Tất cả máy in</option>${printers.map(p=>`<option value="${esc(p.id)}">${esc(p.label||p.id)}</option>`).join('')}`;
  q('typeFilter').innerHTML = `<option value="">Tất cả nội dung</option>${[...new Set(jobs.map(j=>j.type))].map(t=>`<option value="${esc(t)}">${esc(TYPE[t]||t)}</option>`).join('')}`;
  q('printerFilter').value = curP;
  q('typeFilter').value = curT;
}

function filteredJobs(){
  const s = q('searchBox').value.trim().toLowerCase();
  const pr = q('printerFilter').value;
  const st = q('statusFilter').value;
  const ty = q('typeFilter').value;
  return jobs.filter(j =>
    (!s || searchable(j).includes(s)) &&
    (!pr || j.printer===pr) &&
    (!st || j.status===st) &&
    (!ty || j.type===ty)
  );
}

function drawRows(){
  const list = filteredJobs();
  q('jobRows').innerHTML = list.length ? list.map(j=>{
    const m=j.meta||{};
    return `<tr data-job="${esc(j.id)}">
      <td class="mono">${esc(fmtTime(j.created_at))}</td>
      <td><div class="job-main">${esc(m.action||TYPE[j.type]||j.type)} · ${esc(j.title||'')}</div><div class="job-sub">${esc(m.item_preview||'')} ${j.error?`· Lỗi: ${j.error}`:''}</div></td>
      <td>${esc(printerName(j.printer))}<div class="job-sub">${esc(j.transport||'')} ${j.target?`· ${j.target}`:''}</div></td>
      <td><span class="mono">${esc(m.table||'-')}</span><div class="job-sub">${esc(m.ref||j.id)}</div></td>
      <td>${statusPill(j.status)}</td>
    </tr>`;
  }).join('') : '<tr><td colspan="5"><div class="empty-print">Không có job in phù hợp.</div></td></tr>';
  q('jobRows').querySelectorAll('[data-job]').forEach(tr=>tr.onclick=()=>openDetail(tr.dataset.job));
}

async function openDetail(id){
  currentJob = await api('/print/jobs/'+encodeURIComponent(id));
  const text = await api('/print/jobs/'+encodeURIComponent(id)+'/text').catch(()=>({text:''}));
  currentText = text.text || '';
  q('detailTitle').textContent = currentJob.meta?.action || TYPE[currentJob.type] || 'Chi tiết job in';
  q('detailSub').textContent = `${currentJob.title || ''} · #${currentJob.id}`;
  
  const metaItems = [
    ['Trạng thái', STATUS[currentJob.status]?.[0] || currentJob.status],
    ['Máy in', printerName(currentJob.printer)],
    ['Bàn / Ref', [currentJob.meta?.table,currentJob.meta?.ref].filter(Boolean).join(' · ') || '-'],
    ['Thời gian', fmtTime(currentJob.created_at)],
    ['Transport', currentJob.transport || printers.find(p=>p.id===currentJob.printer)?.connection || 'browser'],
  ].map(([k,v])=>`<div class="detail-box"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`);

  if (currentJob.error) {
    metaItems.push(`<div class="detail-box" style="grid-column: 1 / -1; border: 1px solid var(--border)">
      <div class="k">LỖI CUỐI (RAW LOG)</div>
      <div class="v" style="max-height: 75px; overflow-y: auto; font-family: var(--mono); font-size: 10px; line-height: 1.35; white-space: pre-wrap; word-break: break-all; margin-top: 4px; color: var(--muted)">${esc(currentJob.error)}</div>
    </div>`);
    
    const explanation = explainPrintError(currentJob.error);
    if (explanation) {
      metaItems.push(`<div class="detail-box" style="grid-column: 1 / -1; border: 1px solid var(--late); background: var(--late-bg); padding: 12px; border-radius: 8px; margin-top: 4px">
        <div class="k" style="color: var(--late); margin-bottom: 6px; font-weight: 850; font-size: 11px">💡 GIẢI THÍCH LỖI & HƯỚNG DẪN XỬ LÝ</div>
        <div class="v" style="font-size: 12px; font-weight: normal; line-height: 1.45; color: var(--text); max-height: 125px; overflow-y: auto">${explanation}</div>
      </div>`);
    }
  } else {
    metaItems.push(`<div class="detail-box"><div class="k">Lỗi cuối</div><div class="v">-</div></div>`);
  }

  q('detailMeta').innerHTML = metaItems.join('');
  q('detailPreview').textContent = currentText || 'Không có nội dung preview.';
  q('detailDrawer').classList.add('show');
}

function closeDetail(){ q('detailDrawer').classList.remove('show'); currentJob=null; currentText=''; }

async function sendCurrentToPrinter(){
  if(!currentJob) return;
  try{
    const out = await api('/print/jobs/'+currentJob.id+'/print',{method:'POST'});
    toast('Đã gửi máy in thật');
    await load();
    await openDetail(out.id || currentJob.id);
  }catch(e){ toast(e.message,true); await load(); }
}

async function markCurrentPrinted(){
  if(!currentJob) return;
  try{ await api('/print/jobs/'+currentJob.id+'/printed',{method:'POST'}); toast('Đã đánh dấu đã in'); closeDetail(); await load(); }
  catch(e){ toast(e.message,true); }
}

async function reprintPreview(){
  if(!currentJob) return;
  try{
    const j = await api('/print/jobs/'+currentJob.id+'/reprint',{method:'POST'});
    const out = await api('/print/jobs/'+j.id+'/text');
    openPrintWindow(j, out.text || currentText);
    closeDetail();
    await load();
  }catch(e){ toast(e.message,true); }
}

function openPrintWindow(job, text){
  const w = window.open('', '_blank', 'width=430,height=760');
  if(!w){ toast('Trình duyệt đã chặn cửa sổ in', true); return; }
  const safe = esc(text || '');
  w.document.write(`<!doctype html><html><head><title>In lại ${esc(job.id)}</title><style>
    @page{size:80mm auto;margin:4mm}
    body{margin:0;background:#f4f4f4;font-family:Arial,sans-serif}
    .bar{position:sticky;top:0;background:#fff;border-bottom:1px solid #ddd;padding:8px;display:flex;gap:8px;justify-content:flex-end}
    button{height:32px;border:1px solid #bbb;border-radius:6px;background:#fff;font-weight:700}
    pre{width:72mm;min-height:120mm;margin:12px auto;background:#fff;color:#111;padding:8px;font:12px/1.35 "JetBrains Mono",Consolas,monospace;white-space:pre-wrap;box-shadow:0 8px 24px rgba(0,0,0,.16)}
    @media print{body{background:#fff}.bar{display:none}pre{box-shadow:none;margin:0;width:auto}}
  </style></head><body><div class="bar"><button onclick="window.print()">In</button><button onclick="window.close()">Đóng</button></div><pre>${safe}</pre><script>
    window.onafterprint=function(){try{window.opener.postMessage({type:'dandpak:printed',id:${JSON.stringify(job.id)}},'*')}catch(e){}};
    setTimeout(function(){window.focus();window.print();},250);
  <\/script></body></html>`);
  w.document.close();
}

async function testPrinter(id){
  try{ await api('/print/printers/'+encodeURIComponent(id)+'/test',{method:'POST'}); toast('Đã gửi job in thử'); await load(); }
  catch(e){ toast(e.message,true); await load(); }
}

async function openDrawer(printer=''){
  try{ await api('/print/cash-drawer/open',{method:'POST',body:{printer}}); toast('Đã gửi lệnh mở két'); await load(); }
  catch(e){ toast(e.message,true); }
}

connect('printers', {
  'print:new': () => load(),
  'print:done': () => load(),
  'print:failed': () => load(),
});

q('refreshBtn').onclick = () => load();
q('openDrawerBtn').onclick = () => openDrawer('');
q('detailClose').onclick = closeDetail;
q('detailDrawer').onclick = (e) => { if(e.target.id==='detailDrawer') closeDetail(); };
q('sendPrinterBtn').onclick = sendCurrentToPrinter;
q('markPrintedBtn').onclick = markCurrentPrinted;
q('reprintPreviewBtn').onclick = reprintPreview;
['searchBox','printerFilter','statusFilter','typeFilter'].forEach(id => q(id).oninput = drawRows);
window.addEventListener('message', async (e) => {
  if(e.data?.type === 'dandpak:printed' && e.data.id){
    try{ await api('/print/jobs/'+e.data.id+'/printed',{method:'POST'}); await load(); }catch{}
  }
});

startClock();
await load();
</script>
</body></html>
