<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quản lý - Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app.css">
<script src="/socket.io/socket.io.js"></script>
<style>
.view{overflow-y:auto}
.adgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:980px){.adgrid{grid-template-columns:1fr}}
.hbar{display:flex;align-items:flex-end;gap:3px;height:130px;padding:8px 0 22px}
.hbar .b{flex:1;min-width:9px;max-width:60px;background:linear-gradient(180deg,#34d2ee,#1b7f94);border-radius:4px 4px 0 0;min-height:2px;position:relative;transition:height .4s}
.hbar .b.has-rev{background:linear-gradient(180deg,#0fb5d6,#0a6b80)}
.hbar .b.zero{background:var(--surface3)}
.hbar .b span{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:8.5px;color:var(--faint);font-family:var(--mono)}
.dash-window{margin:-4px 0 16px;color:var(--muted);font-size:12px;font-weight:650}
.dash-window b{color:var(--text)}
.payrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:12.5px}
.payrow .nm{width:125px}.payrow .bar{flex:1;margin:0 12px;height:8px;background:var(--surface3);border-radius:99px;overflow:hidden}
.payrow .bar i{display:block;height:100%;border-radius:99px}.payrow .vl{font-family:var(--mono);color:var(--brand);width:90px;text-align:right}
.togglerow{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px dashed var(--border);font-size:13px}
.togglerow:last-child{border:none}
.sw{width:42px;height:23px;border-radius:99px;background:var(--surface3);position:relative;cursor:pointer;transition:.15s;flex-shrink:0}
.sw::after{content:"";position:absolute;width:17px;height:17px;border-radius:99px;background:#fff;top:3px;left:3px;transition:.15s}
.sw.on{background:var(--done)}.sw.on::after{left:22px}
.mthumb{width:44px;height:44px;border-radius:9px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,#22303f,#18222e);flex-shrink:0}
.mthumb img{width:100%;height:100%;object-fit:cover}
.fimg{height:138px;border-radius:11px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:54px;background:linear-gradient(135deg,#22303f,#18222e);margin-bottom:10px}
.fimg img{width:100%;height:100%;object-fit:cover}
.modal select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px;font-family:var(--font)}
.modal input[type="checkbox"]{width:auto;margin-right:6px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
@media(max-width:760px){.frow,.frow3{grid-template-columns:1fr}}
.recipe-row{display:grid;grid-template-columns:1fr 90px 34px;gap:8px;margin-bottom:7px;align-items:center}
.days{display:flex;gap:7px;flex-wrap:wrap}.days label{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 8px}
.mini{font-size:10.5px;color:var(--faint);line-height:1.35}
.auditrow{display:grid;grid-template-columns:76px 1fr;gap:10px;padding:9px 2px;border-bottom:1px dashed var(--border);align-items:start}
.auditrow:last-child{border-bottom:none}
.auditrow .atime{font-family:var(--mono);font-size:11.5px;color:var(--faint);padding-top:2px}
.auditrow .atext{font-size:13px;color:var(--text);font-weight:650;line-height:1.4}
.auditrow .ameta{font-size:11px;color:var(--muted);line-height:1.45;margin-top:2px}
.auditrow .actor{display:inline-flex;align-items:center;gap:5px;margin-left:6px;padding:1px 7px;border-radius:99px;background:var(--surface2);color:var(--muted);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.3px}
.settings-tabs{display:flex;gap:7px;margin:10px 0 14px;flex-wrap:wrap}.settings-tab{padding:7px 12px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);font-size:12px;font-weight:800;color:var(--muted)}.settings-tab.on{background:var(--brand-dim);border-color:var(--brand);color:var(--brand)}
/* Cài đặt quản lý: phóng to full màn, header & nút Đóng cố định, chỉ vùng nội dung cuộn. */
.settings-modal{max-width:none;width:96vw;height:94vh;max-height:94vh;overflow:hidden;display:flex;flex-direction:column;position:relative}
.settings-modal>#settingsBody{flex:1 1 auto;overflow-y:auto;min-height:0;padding-right:4px}
.settings-modal>h2,.settings-modal>.sub,.settings-modal>.settings-tabs,.settings-modal>.mfoot{flex:0 0 auto}
.modal-x{position:absolute;top:14px;right:16px;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:20px;font-weight:800;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:3}
.modal-x:hover{background:var(--late);color:#fff;border-color:var(--late)}
.setting-row{display:grid;grid-template-columns:1fr 130px 90px 112px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--border)}.setting-row:last-child{border-bottom:none}
.setting-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px}
/* Danh mục in: mỗi dòng là 1 lưới cố định, mọi ô cao bằng nhau và thẳng hàng đáy. */
.printer-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.printer-row{display:grid;grid-template-columns:minmax(110px,1fr) minmax(150px,1.5fr) minmax(130px,1.1fr) 138px 138px 92px;gap:12px;align-items:end;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:14px}
.printer-row .pr-field{display:flex;flex-direction:column;gap:6px;min-width:0}
.printer-row .pr-field>label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:800}
.printer-row .pr-field input,.printer-row .pr-field select{height:40px;width:100%;box-sizing:border-box;margin:0}
.printer-row .pr-check{display:flex;align-items:center;justify-content:center;gap:8px;height:40px;border:1px solid var(--border);border-radius:9px;background:var(--surface);font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;transition:border-color .12s,color .12s,background .12s}
.printer-row .pr-check:has(input:checked){border-color:var(--brand);color:var(--brand);background:var(--brand-dim)}
.printer-row .pr-check input{width:16px;height:16px;margin:0;accent-color:var(--brand);cursor:pointer;flex:none}
.printer-row .pr-del{height:40px;width:100%;justify-content:center}
@media(max-width:980px){.printer-row{grid-template-columns:1fr 1fr;align-items:stretch}.printer-row .pr-del{grid-column:1/-1}}
.setting-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.setting-line{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:9px 0;border-bottom:1px dashed var(--border)}
.setting-line:last-child{border-bottom:none}
.integration-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:12px}
.integration-shell{display:grid;grid-template-columns:250px minmax(0,1fr);gap:12px;align-items:start}.integration-list{border:1px solid var(--border);border-radius:10px;background:var(--surface2);padding:8px;display:flex;flex-direction:column;gap:8px}.integration-tab{display:grid;grid-template-columns:38px 1fr;gap:9px;align-items:center;text-align:left;border:1px solid var(--border);background:var(--surface);border-radius:10px;padding:9px;color:var(--text)}.integration-tab.on{border-color:var(--brand);background:var(--brand-dim);color:var(--brand)}.integration-tab small{display:block;color:var(--muted);font-size:10.5px;margin-top:2px}.operations-method{display:grid;grid-template-columns:34px 1fr 118px 86px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px dashed var(--border)}.operations-method:last-child{border-bottom:none}.shift-label-row{display:grid;grid-template-columns:1fr 1fr 84px;gap:8px;align-items:center;margin-bottom:7px}
.integration-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:10px}
.integration-card.on{border-color:rgba(63,224,143,.55);box-shadow:0 0 0 3px rgba(63,224,143,.10)}
.integration-head{display:flex;align-items:flex-start;gap:10px}
.integration-ic{width:38px;height:38px;border-radius:10px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:19px;flex:0 0 auto;overflow:hidden;padding:4px}
.integration-ic img{width:100%;height:100%;object-fit:contain;display:block}
.integration-head b{font-size:14px}.integration-head .mini{margin-top:2px}
.payos-endpoints{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-top:2px}
.payos-endpoints code{font-family:var(--mono);font-size:11px;color:var(--brand);word-break:break-all}
.integration-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:auto}
.webhook-box{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--surface);border:1px dashed var(--border2);border-radius:9px;padding:8px 10px}
.webhook-box code{font-family:var(--mono);font-size:11px;color:var(--muted);word-break:break-all}
.permgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}.permitem{display:flex;align-items:flex-start;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;color:var(--text)}
.bookmenu-grid{display:grid;grid-template-columns:300px minmax(360px,1fr) 330px;gap:12px;align-items:start}
.bookmenu-preview{position:relative;width:100%;max-width:420px;margin:0 auto;background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 12px 30px rgba(18,31,45,.12);cursor:crosshair}
.bookmenu-preview img{width:100%;display:block;background:#eef2f7}
.bookmenu-dot{position:absolute;width:16px;height:16px;border-radius:999px;background:var(--brand);border:2px solid #fff;box-shadow:0 0 0 4px rgba(8,145,178,.18),0 8px 18px rgba(0,0,0,.18);transform:translate(-50%,-50%)}
.bookmenu-dot.on{background:var(--done);box-shadow:0 0 0 5px rgba(63,224,143,.22),0 8px 18px rgba(0,0,0,.2)}
.bookmenu-dot.off{opacity:.45;background:var(--late)}
.bookmenu-pagebar{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:10px;flex-wrap:wrap}
.bookmenu-list{max-height:360px;overflow:auto;border:1px solid var(--border);border-radius:8px;background:var(--surface)}
.bookmenu-list button{width:100%;text-align:left;border-bottom:1px dashed var(--border);border-radius:0;background:transparent;padding:9px 10px}
.bookmenu-list button:last-child{border-bottom:none}
.bookmenu-list button.on{background:var(--brand-dim);color:var(--brand)}
.label-designer{display:grid;grid-template-columns:320px minmax(440px,1fr) 320px;gap:12px;align-items:start}
.label-tools{display:flex;gap:7px;flex-wrap:wrap}
.label-workbench{background:#e9eef5;border:1px solid var(--border);border-radius:10px;padding:14px;min-height:410px;display:flex;align-items:center;justify-content:center;overflow:auto}
.label-canvas{position:relative;width:min(100%,620px);aspect-ratio:var(--label-ratio,5/3);background:#fff;color:#111;border:1px solid #b7c3d0;border-radius:4px;box-shadow:0 18px 42px rgba(18,31,45,.18);overflow:hidden;user-select:none;touch-action:none}
.label-workbench:has(.receipt-canvas){align-items:flex-start}
.receipt-canvas{width:min(100%,360px)}
.label-canvas::before{content:"";position:absolute;inset:6px;border:1px dashed rgba(20,33,47,.28);pointer-events:none}
.label-profile{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px}
.label-profile input,.label-profile select{min-width:0}
.label-print-summary{font-size:10.5px;color:var(--muted);line-height:1.45;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-top:10px}
.label-el{position:absolute;border:1px solid transparent;display:flex;overflow:hidden;cursor:move;touch-action:none;color:#111}
.label-el.sel{border-color:var(--brand);box-shadow:0 0 0 2px rgba(8,145,178,.16);background:rgba(8,145,178,.035)}
.label-el.text{align-items:center;padding:1px 2px;line-height:1.15;white-space:pre-wrap}
.receipt-canvas .label-el.text{display:block;align-items:flex-start;font-family:var(--mono);line-height:1.18;padding:7px 9px;word-break:normal}
.label-el.line{height:0!important;border-top:2px solid #111}
.label-el.image img{width:100%;height:100%;object-fit:contain}
.label-el.barcode,.label-el.qr{align-items:center;justify-content:center;background:#fff}
.barcode-art{width:100%;height:70%;background:repeating-linear-gradient(90deg,#111 0 2px,#fff 2px 4px,#111 4px 5px,#fff 5px 9px,#111 9px 12px,#fff 12px 15px);border:4px solid #fff}
.qr-art{width:min(100%,70px);aspect-ratio:1;background:conic-gradient(#111 25%,#fff 0 50%,#111 0 75%,#fff 0) 0 0/14px 14px;border:5px solid #fff;box-shadow:inset 0 0 0 3px #111}
.label-resize{position:absolute;right:-5px;bottom:-5px;width:12px;height:12px;border-radius:3px;background:var(--brand);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.22);cursor:nwse-resize}
.label-props .setting-form{grid-template-columns:repeat(2,1fr)}
.label-layer{display:flex;justify-content:space-between;gap:8px;align-items:center;border:1px solid var(--border);border-radius:8px;padding:7px 9px;background:var(--surface);font-size:11.5px;margin-bottom:6px}
.label-layer.on{border-color:var(--brand);background:var(--brand-dim);color:var(--brand)}
.billd-shell{position:relative;border:1px solid var(--border);border-radius:12px;background:var(--surface);overflow:hidden}
.billd-top{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:wrap}
.billd-presets,.billd-actions,.billd-tools{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.billd-status{font-size:11px;color:var(--muted);font-weight:800}
.billd-layout{display:grid;grid-template-columns:230px minmax(420px,1fr) 240px;min-height:690px}
.billd-side{background:var(--surface2);border-right:1px solid var(--border);padding:12px;overflow:auto}
.billd-side.right{border-right:none;border-left:1px solid var(--border)}
.billd-section{border:1px solid var(--border);border-radius:10px;background:var(--surface);padding:10px;margin-bottom:10px}
.billd-section h4{margin:0 0 8px;font-size:13px}.billd-section label{font-size:10.5px}
.billd-stage{position:relative;background:#eef3f8;overflow:auto;padding:22px;min-height:690px}
.billd-canvas{position:relative;margin:0 auto;background:#fff;color:#111;border:1px solid #afbccb;border-radius:4px;box-shadow:0 18px 45px rgba(18,31,45,.18);min-height:360px;user-select:none;touch-action:none}
.billd-canvas::before{content:"";position:absolute;inset:8px;border:1px dashed rgba(20,33,47,.25);pointer-events:none}
.billd-el{position:absolute;box-sizing:border-box;min-width:28px;min-height:16px;border:1px solid transparent;color:#111;overflow:hidden;cursor:move;touch-action:none}
.billd-el.selected{border-color:var(--brand);box-shadow:0 0 0 2px rgba(8,145,178,.16);background:rgba(8,145,178,.025)}
.billd-el.editing{cursor:text;z-index:999!important}
.billd-text-body{width:100%;height:100%;box-sizing:border-box;padding:2px 3px;white-space:pre-wrap;word-break:break-word;overflow:hidden;outline:none;line-height:1.18}
.billd-el:not(.editing) .billd-text-body{pointer-events:none}
.billd-line-body{position:absolute;left:0;right:0;top:50%;border-top:2px dashed #111}
.billd-img-body,.billd-qr-body{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#fff}
.billd-img-body img{max-width:100%;max-height:100%;object-fit:contain}.billd-img-empty{font-size:11px;color:var(--muted)}
.billd-qr-art{width:min(100%,84px);aspect-ratio:1;background:conic-gradient(#111 25%,#fff 0 50%,#111 0 75%,#fff 0) 0 0/14px 14px;border:6px solid #fff;box-shadow:inset 0 0 0 3px #111}
.bd-handle{display:none;position:absolute;width:9px;height:9px;border-radius:2px;background:var(--brand);border:1px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.24);z-index:5}
.billd-el.selected .bd-handle{display:block}.bd-handle.nw{left:-5px;top:-5px;cursor:nwse-resize}.bd-handle.n{left:50%;top:-5px;transform:translateX(-50%);cursor:ns-resize}.bd-handle.ne{right:-5px;top:-5px;cursor:nesw-resize}.bd-handle.e{right:-5px;top:50%;transform:translateY(-50%);cursor:ew-resize}.bd-handle.se{right:-5px;bottom:-5px;cursor:nwse-resize}.bd-handle.s{left:50%;bottom:-5px;transform:translateX(-50%);cursor:ns-resize}.bd-handle.sw{left:-5px;bottom:-5px;cursor:nesw-resize}.bd-handle.w{left:-5px;top:50%;transform:translateY(-50%);cursor:ew-resize}
.billd-toolbar{position:absolute;display:none;align-items:center;gap:5px;padding:6px;border:1px solid var(--border);border-radius:10px;background:#fff;box-shadow:0 12px 28px rgba(18,31,45,.18);z-index:20}
.billd-toolbar.show{display:flex}.billd-toolbar button,.billd-toolbar select{height:30px;padding:4px 8px;border-radius:7px}
.billd-toolbar button.on{background:var(--brand-dim);border-color:var(--brand);color:var(--brand)}
.billd-tool{width:100%;justify-content:flex-start;margin-bottom:7px;cursor:grab}.billd-tool:active{cursor:grabbing}
.billd-hint{margin-top:8px;padding:8px 10px;border-radius:9px;background:var(--brand-dim);color:var(--brand);font-size:11px;line-height:1.5;font-weight:600}.billd-hint b{font-weight:800}
.billd-stage:focus-visible{outline:none}
.billd-field{margin:0 5px 6px 0}.billd-layer{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;border:1px solid var(--border);border-radius:8px;background:var(--surface);padding:7px 8px;margin-bottom:6px;text-align:left;font-size:11.5px}
.billd-layer.on{border-color:var(--brand);background:var(--brand-dim);color:var(--brand)}
.billd-layer small{color:var(--muted);font-size:10px}
.print-switch{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.print-switch-btn{padding:9px 16px;border:1px solid var(--border);border-radius:10px;background:var(--surface);font-size:13px;font-weight:600;cursor:pointer}
.print-switch-btn.on{border-color:var(--brand);background:var(--brand-dim);color:var(--brand)}
.billd-img-tools{display:flex;flex-direction:column;gap:6px}.billd-img-tools button{width:100%;justify-content:flex-start}
.billd-img-tools button.on{border-color:var(--brand);background:var(--brand-dim);color:var(--brand)}
@media(max-width:1180px){.billd-layout{grid-template-columns:1fr}.billd-side,.billd-side.right{border:0;border-bottom:1px solid var(--border)}.billd-stage{min-height:560px}.billd-toolbar{position:fixed}}
@media(max-width:1120px){.label-designer{grid-template-columns:1fr}.label-workbench{min-height:330px}.label-canvas{width:min(100%,720px)}}
@media(max-width:1080px){.bookmenu-grid{grid-template-columns:1fr}.bookmenu-preview{max-width:520px}}
@media(max-width:720px){.setting-row{grid-template-columns:1fr}.permgrid{grid-template-columns:1fr}.integration-shell{grid-template-columns:1fr}.operations-method,.shift-label-row{grid-template-columns:1fr}}
.zone{margin-top:14px;font-weight:700;color:var(--muted);border-left:3px solid var(--brand);padding-left:8px;font-size:13px}
.tablegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:10px}
.tcard{padding:12px 10px;text-align:center;border:1px solid var(--border);border-radius:12px;background:var(--surface);display:flex;flex-direction:column;justify-content:space-between;align-items:center;height:95px;position:relative}
.tcard:hover{border-color:var(--brand);box-shadow:0 6px 16px rgba(18,31,45,.06)}
</style></head>
<body>
<div id="top"></div>
<div class="view">
  <div class="viewhead">
    <h1>📊 Quản lý</h1>
    <div class="sub">District 1 - HCMC · realtime sales, menu, inventory</div>
    <div class="right"><button class="btn sm" id="settingsBtn" title="Cài đặt">⚙ Cài đặt</button><span class="onlinedot"><i></i><span>Online</span></span></div>
  </div>

  <div class="cards" id="kpis"></div>
  <div class="dash-window" id="dashWindow"></div>

  <div class="adgrid">
    <div class="panel"><h3>Doanh thu theo giờ</h3><div class="hbar" id="hourChart"></div></div>
    <div class="panel"><h3>Phương thức thanh toán</h3><div id="payChart"><div class="empty">Chưa có dữ liệu</div></div>
      <h3 style="margin-top:16px">Doanh thu theo kênh</h3><div id="chanChart"></div></div>
  </div>

  <div class="adgrid">
    <div class="panel"><h3>Top món bán chạy hôm nay</h3>
      <table><thead><tr><th>Món</th><th>SL</th><th>Doanh thu</th></tr></thead><tbody id="topItems"></tbody></table></div>
    <div class="panel"><h3>Tải các station</h3><div id="stationLoad"></div></div>
  </div>

  <div class="panel"><h3>Thực đơn FnB <span style="margin-left:auto;display:flex;gap:7px"><button class="btn sm" id="manageCats">🗂️ Danh mục</button><button class="btn sm primary" id="addItem">➕ Thêm món</button></span></h3><div id="menuToggle"></div></div>

</div>

<script type="module">
import { api, connect, money, toast, esc, startClock, topbar, requireModuleAccess, renderUserChip } from '/shared/client.js';
document.getElementById('top').innerHTML = topbar('admin');
await requireModuleAccess('admin'); renderUserChip();

let menu={categories:[],items:[]}, ingredients=[];

connect('admin', {
  'stats:dirty':()=>loadDash(),
  'payment:done':()=>loadDash(),
  'shift:updated':()=>loadDash(),
  'order:new':()=>loadDash(),
  'order:item':()=>loadDash(),
  'inventory:updated':()=>{loadDash();loadIngredients();},
  'inventory:alert':a=>toast(`Tồn thấp: ${a.name} còn ${a.stock}${a.unit}`,true),
  'menu:updated':()=>loadMenu(),
  'sync:status':s=>{ renderSync(s); if(document.getElementById('settingsSyncChip')) renderSettingsSync(s); },
  'invoice:issued':()=>{ loadInvoices(); if(document.getElementById('settingsInvList')) loadSettingsInvoices(); },
});

async function loadDash(){
  const kpisEl=document.getElementById('kpis');
  if(kpisEl && !kpisEl.dataset.loaded){
    kpisEl.innerHTML=Array(5).fill('<div class="card"><span class="skeleton" style="display:block;width:55%;height:10px"></span><span class="skeleton" style="display:block;width:80%;height:22px;margin-top:9px"></span></div>').join('');
  }
  let d;
  try{ d=await api('/dashboard'); }
  catch(e){ if(kpisEl) kpisEl.innerHTML=`<div class="empty" style="grid-column:1/-1">Không tải được số liệu (${esc(e.message)}). <button class="btn sm" onclick="location.reload()">Thử lại</button></div>`; return; }
  if(kpisEl) kpisEl.dataset.loaded='1';
  document.getElementById('kpis').innerHTML=`
    ${kpi('Doanh thu ca hôm nay',money(d.revenue),'cy')}
    ${kpi('Số bill',d.bills,'gr')}
    ${kpi('Bill trung bình',money(d.avg),'')}
    ${kpi('Đơn đang mở',d.openOrders,'yl')}
    ${kpi('Cảnh báo kho',d.lowStock.length,d.lowStock.length?'rd':'gr')}`;
  document.getElementById('dashWindow').innerHTML=dashboardWindowText(d.window);

  const max=Math.max(1,...d.byHour);
  const hours=dashboardHours(d.window);
  document.getElementById('hourChart').innerHTML=hours.map(h=>{
    const v=d.byHour[h]||0;
    return `<div class="b ${v>0?'has-rev':'zero'}" style="height:${v>0?Math.max(6,Math.round(v/max*100)):3}%" title="${String(h).padStart(2,'0')}:00 — ${money(v)}"><span>${h}h</span></div>`;
  }).join('');

  renderBars('payChart', d.methods, 'method', 'amt', {
    cash:'Tiền mặt', card:'Thẻ', qr:'QR', voucher:'Voucher', bank_transfer:'Chuyển khoản', online:'Online',
  }, { cash:'#3fe08f', card:'#5ea3ff', qr:'#b58cff', voucher:'#ffc24d', bank_transfer:'#34d2ee', online:'#ff8f70' });

  const chans=Object.entries(d.byChannel||{}).map(([channel,amt])=>({channel,amt}));
  renderBars('chanChart', chans, 'channel', 'amt', { dine_in:'Tại bàn', retail:'Retail', online:'Online' }, { dine_in:'#3fe08f', retail:'#34d2ee', online:'#b58cff' });

  document.getElementById('topItems').innerHTML=d.topItems.length?d.topItems.map(t=>
    `<tr><td>${t.emoji||''} ${esc(t.name)}</td><td>${t.qty}</td><td style="color:var(--brand);font-family:var(--mono)">${money(t.revenue)}</td></tr>`).join('')
    :'<tr><td colspan="3" class="empty">Chưa bán món nào</td></tr>';

  const stMap={kitchen:'Bếp',bar:'Bar',salad:'Salad',beverage:'Beverage'};
  document.getElementById('stationLoad').innerHTML=['kitchen','bar','salad','beverage'].map(s=>{const n=d.stations.find(x=>x.station===s)?.n||0;
    return `<div class="payrow"><span class="nm">${stMap[s]}</span><div class="bar"><i style="width:${Math.min(100,n*20)}%;background:${n>4?'var(--late)':'var(--done)'}"></i></div><span class="vl">${n} món</span></div>`;}).join('');

}
function dashboardWindowText(w){
  if(!w) return '';
  const start=new Date(w.start), end=new Date(w.end);
  const startText=start.toLocaleString('vi-VN',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'});
  const endText=w.closed
    ? end.toLocaleString('vi-VN',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',year:'numeric'})
    : 'hiện tại';
  return w.source==='shift'
    ? `Doanh thu được tính từ lúc <b>mở ca đầu ngày ${startText}</b> đến <b>${endText}</b>.`
    : `Chưa có ca được mở hôm nay, tạm tính theo ngày lịch từ <b>${startText}</b> đến <b>${endText}</b>.`;
}
function dashboardHours(w){
  const nowH=new Date().getHours();
  let from, to;
  if(!w?.start || !w?.end){ from=8; to=Math.max(nowH,8); }
  else {
    from=new Date(w.start).getHours();
    to=new Date(w.end).getHours();
    if(to<from) return [...Array(24).keys()]; // window spans midnight → show full day
  }
  from=Math.max(0,Math.min(23,from)); to=Math.max(from,Math.min(23,to));
  // Always show at least 8 hourly columns so it reads as a time axis, not one block
  const MIN=8;
  if(to-from+1 < MIN) from=Math.max(0, to-(MIN-1));
  return [...Array(to-from+1).keys()].map(i=>from+i);
}
function renderBars(id, rows, key, val, labels, colors){
  const el=document.getElementById(id);
  if(!rows.length){ el.innerHTML='<div class="empty">Chưa có dữ liệu</div>'; return; }
  const total=rows.reduce((s,r)=>s+(r[val]||0),0)||1;
  el.innerHTML=rows.map(r=>`<div class="payrow"><span class="nm">${labels[r[key]]||r[key]}</span>
    <div class="bar"><i style="width:${(r[val]||0)/total*100}%;background:${colors[r[key]]||'#34d2ee'}"></i></div>
    <span class="vl">${money(r[val]||0)}</span></div>`).join('');
}
const kpi=(l,v,c)=>`<div class="card"><div class="lb">${l}</div><div class="vl ${c}">${v}</div></div>`;

async function loadIngredients(){ ingredients=await api('/inventory?item_type=ingredient'); }
async function loadMenu(){
  await loadIngredients();
  menu=await api('/menu/manage');
  const mt = document.getElementById('menuToggle');
  const smt = document.getElementById('settingsMenuToggle');
  const html = menu.items.map(i=>`
    <div class="togglerow">
      <span class="mthumb">${thumb(i)}</span>
      <span style="line-height:1.35">${esc(i.name)} ${i.hidden?'<span class="chip c-muted">Ẩn</span>':''} ${!i.schedule_available?'<span class="chip c-doing">Ngoài lịch</span>':''}<br>
        <span style="font-size:10.5px;color:var(--faint)">${esc(catName(i.category_id))} · ${money(i.price)} · ${stationLabel(i.station)}</span></span>
      <button class="btn sm" data-edit="${i.id}" style="margin-left:auto">Sửa</button>
      <button class="btn sm" data-hide="${i.id}">${i.hidden?'Hiện':'Ẩn'}</button>
      <button class="btn sm danger" data-del="${i.id}">Xóa</button>
      <div class="sw ${i.available?'on':''}" data-id="${i.id}" data-av="${i.available?1:0}" title="Bật/tắt tạm thời"></div>
    </div>`).join('');
  if (mt) mt.innerHTML = html;
  if (smt) smt.innerHTML = html;
  
  const selectors = ['#menuToggle', '#settingsMenuToggle'];
  selectors.forEach(sel => {
    const root = document.getElementById(sel.slice(1));
    if (!root) return;
    
    root.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      const it=menu.items.find(x=>x.id===b.dataset.del); if(!confirm(`Xóa món "${it.name}"?\n(Nếu món đã từng được order, hệ thống sẽ lưu trữ ẩn thay vì xóa cứng.)`))return;
      try{ const r=await api('/menu/'+it.id+'/delete',{method:'POST'}); toast(r.archived?'Đã lưu trữ món (đã có order)':'Đã xóa món'); loadMenu(); }catch(e){toast(e.message,true);}
    });
    root.querySelectorAll('.sw').forEach(s=>s.onclick=async()=>{
      const av=s.dataset.av==='1'?0:1;
      try{await api('/menu/'+s.dataset.id+'/availability',{method:'POST',body:{available:!!av}});
        s.dataset.av=av;s.classList.toggle('on',!!av);toast(av?'Đã bật món':'Đã tắt món');}catch(e){toast(e.message,true);}
    });
    root.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openItemForm(menu.items.find(x=>x.id===b.dataset.edit)));
    root.querySelectorAll('[data-hide]').forEach(b=>b.onclick=async()=>{const it=menu.items.find(x=>x.id===b.dataset.hide);await api('/menu/'+it.id+'/hide',{method:'POST',body:{hidden:!it.hidden}});toast(it.hidden?'Đã hiện món':'Đã ẩn món');loadMenu();});
  });
}
const catName=id=>menu.categories.find(c=>c.id===id)?.name||'';
const thumb=i=>i.image?`<img src="${esc(i.image)}" onerror="this.remove()">`:(i.emoji||'🍽️');
const stationLabel=s=>({kitchen:'Bếp',bar:'Bar',salad:'Salad/Lạnh',beverage:'Beverage'}[s]||s);

function openItemForm(item){
  const isEdit=!!item; let imgData=item?.image||'';
  let recipe=(item?.recipe||[]).map(r=>({inventory_item_id:r.inventory_item_id,qty:r.qty}));
  const schedule=item?.schedule||{mode:'always'};
  const ov=document.createElement('div'); ov.className='overlay show';
  ov.innerHTML=`<div class="modal" style="max-width:760px">
    <h2>${isEdit?'Sửa món':'Thêm món mới'}</h2>
    <div class="sub">Ảnh · mô tả · nguyên liệu/allergen · recipe trừ kho · lịch bán</div>
    <label>Ảnh món</label><div class="fimg" id="prev">${imgData?`<img src="${esc(imgData)}">`:(item?.emoji||'🍽️')}</div>
    <div class="frow"><button type="button" class="btn sm" id="upBtn">Tải ảnh</button><button type="button" class="btn sm" id="urlBtn">Dán URL ảnh</button></div>
    <input type="file" id="file" accept="image/*" style="display:none">
    <label>Tên món</label><input id="name" value="${esc(item?.name||'')}" placeholder="VD: Bún bò Huế">
    <div class="frow3">
      <div><label>Giá</label><input type="number" id="price" value="${item?.price||''}"></div>
      <div><label>Emoji</label><input id="emoji" value="${esc(item?.emoji||'🍽️')}"></div>
      <div><label>SLA phút</label><input type="number" id="sla" value="${item?.sla_minutes||10}"></div>
    </div>
    <div class="frow">
      <div><label>Nhóm</label><select id="cat">${menu.categories.map(c=>`<option value="${c.id}" ${item?.category_id===c.id?'selected':''}>${esc(c.icon||'')} ${esc(c.name)}</option>`).join('')}<option value="__new__">➕ Tạo nhóm mới…</option></select></div>
      <div><label>Station</label><select id="station">${['kitchen','bar','salad','beverage'].map(s=>`<option value="${s}" ${item?.station===s?'selected':''}>${stationLabel(s)}</option>`).join('')}</select></div>
    </div>
    <label>Mô tả món</label><textarea id="desc" rows="2">${esc(item?.description||'')}</textarea>
    <div class="frow">
      <div><label>Nguyên liệu hiển thị cho khách</label><textarea id="ingredients" rows="2" placeholder="thịt bò, hành, sữa...">${esc((item?.ingredients||[]).join(', '))}</textarea></div>
      <div><label>Allergen / dị ứng</label><textarea id="allergens" rows="2" placeholder="sữa, trứng, gluten...">${esc((item?.allergens||[]).join(', '))}</textarea></div>
    </div>
    <label>Công thức trừ kho</label><div id="recipeBox"></div><button class="btn sm" id="addRecipe" type="button">➕ Thêm nguyên liệu recipe</button>
    <label>Món ăn kèm & Extra</label><div id="addonBox"></div><button class="btn sm" id="addAddon" type="button">➕ Thêm món kèm / extra</button>
    <div class="mini">Ăn kèm = liên kết món có sẵn (tự đồng bộ "tạm hết" theo món gốc). Extra = topping tự nhập. <b>Tặng kèm</b> = miễn phí · <b>Mua thêm</b> = bù tiền.</div>
    <label>Lịch bán</label>
    <div class="frow3">
      <div><select id="schedMode"><option value="always">Bán cả ngày</option><option value="daily">Theo giờ mỗi ngày</option><option value="weekly">Theo ngày trong tuần</option><option value="date">Chỉ một ngày</option></select></div>
      <div><input id="start" type="time" value="${schedule.start||'00:00'}"></div>
      <div><input id="end" type="time" value="${schedule.end||'23:59'}"></div>
    </div>
    <div class="days" id="days">${[['0','CN'],['1','T2'],['2','T3'],['3','T4'],['4','T5'],['5','T6'],['6','T7']].map(([d,l])=>`<label><input type="checkbox" value="${d}"> ${l}</label>`).join('')}</div>
    <div class="frow"><div><label>Ngày bán riêng</label><input id="date" type="date" value="${schedule.date||''}"></div><label style="padding-top:28px"><input id="hidden" type="checkbox" ${item?.hidden?'checked':''}> Ẩn khỏi iPad/POS</label></div>
    <div class="mfoot"><button class="btn" id="cancel">Hủy</button><button class="btn primary" id="save">${isEdit?'Lưu thay đổi':'Tạo món'}</button></div>
  </div>`;
  document.body.appendChild(ov);
  // inline category creation from the Nhóm dropdown
  const catSel=ov.querySelector('#cat'); let lastCat=catSel.value;
  function refillCats(sel){ catSel.innerHTML=menu.categories.map(c=>`<option value="${c.id}" ${sel===c.id?'selected':''}>${esc(c.icon||'')} ${esc(c.name)}</option>`).join('')+`<option value="__new__">➕ Tạo nhóm mới…</option>`; }
  catSel.onchange=async()=>{
    if(catSel.value!=='__new__'){ lastCat=catSel.value; return; }
    const name=prompt('Tên nhóm mới (vd: Lẩu, Món nướng):'); if(!name||!name.trim()){ catSel.value=lastCat; return; }
    const icon=(prompt('Icon/emoji cho nhóm (tuỳ chọn):','🍽️')||'🍽️').trim()||'🍽️';
    try{ const c=await api('/categories',{method:'POST',body:{name:name.trim(),icon}}); menu.categories.push(c); refillCats(c.id); lastCat=c.id; toast('Đã tạo nhóm '+c.name); }
    catch(e){ toast(e.message,true); catSel.value=lastCat; }
  };
  ov.querySelector('#schedMode').value=schedule.mode||'always';
  (schedule.days||[]).forEach(d=>{const cb=ov.querySelector(`#days input[value="${d}"]`); if(cb) cb.checked=true;});
  const prev=ov.querySelector('#prev');
  function setImg(src){imgData=src;prev.innerHTML=src?`<img src="${src}">`:(ov.querySelector('#emoji').value||'🍽️');}
  ov.querySelector('#upBtn').onclick=()=>ov.querySelector('#file').click();
  ov.querySelector('#file').onchange=e=>{const f=e.target.files[0];if(!f)return;if(f.size>1.5e6)return toast('Ảnh quá lớn (>1.5MB)',true);const r=new FileReader();r.onload=()=>setImg(r.result);r.readAsDataURL(f);};
  ov.querySelector('#urlBtn').onclick=()=>{const u=prompt('Dán URL ảnh:',imgData.startsWith('http')?imgData:'');if(u!==null)setImg(u.trim());};
  ov.querySelector('#emoji').oninput=()=>{if(!imgData)prev.textContent=ov.querySelector('#emoji').value||'🍽️';};
  function drawRecipe(){
    ov.querySelector('#recipeBox').innerHTML=recipe.map((r,idx)=>`<div class="recipe-row">
      <select data-ri="${idx}">${ingredients.map(i=>`<option value="${i.id}" ${r.inventory_item_id===i.id?'selected':''}>${esc(i.name)} (${esc(i.unit)})</option>`).join('')}</select>
      <input type="number" step="0.01" data-rq="${idx}" value="${r.qty||''}" placeholder="qty">
      <button class="btn sm danger" data-rr="${idx}" type="button">×</button>
    </div>`).join('') || '<div class="mini">Chưa có recipe. Món vẫn bán được nhưng sẽ không trừ nguyên liệu.</div>';
    ov.querySelectorAll('[data-ri]').forEach(s=>s.onchange=()=>recipe[+s.dataset.ri].inventory_item_id=s.value);
    ov.querySelectorAll('[data-rq]').forEach(inp=>inp.oninput=()=>recipe[+inp.dataset.rq].qty=parseFloat(inp.value)||0);
    ov.querySelectorAll('[data-rr]').forEach(b=>b.onclick=()=>{recipe.splice(+b.dataset.rr,1);drawRecipe();});
  }
  ov.querySelector('#addRecipe').onclick=()=>{recipe.push({inventory_item_id:ingredients[0]?.id,qty:1});drawRecipe();};
  drawRecipe();
  // ---- Add-ons / Extras editor ----
  let addons=(item?.addons||[]).map(a=>({kind:a.kind,type:a.type,price:a.price,ref_item_id:a.ref_item_id,name:a.name,available:a.available!==false}));
  const addonBox=ov.querySelector('#addonBox');
  const otherItems=()=>menu.items.filter(m=>m.id!==item?.id);
  function drawAddons(){
    addonBox.innerHTML = addons.length ? addons.map((a,i)=>`<div style="display:grid;grid-template-columns:92px 1fr 104px 88px 30px;gap:6px;margin-bottom:6px;align-items:center">
      <select data-ak="${i}"><option value="combo" ${a.kind==='combo'?'selected':''}>Ăn kèm</option><option value="extra" ${a.kind!=='combo'?'selected':''}>Extra</option></select>
      ${a.kind==='combo'
        ? `<select data-ar="${i}">${otherItems().map(m=>`<option value="${m.id}" ${a.ref_item_id===m.id?'selected':''}>${esc(m.name)}</option>`).join('')}</select>`
        : `<input data-an="${i}" value="${esc(a.name||'')}" placeholder="Tên extra (Trân châu...)">`}
      <select data-at="${i}"><option value="paid" ${a.type!=='free'?'selected':''}>Mua thêm</option><option value="free" ${a.type==='free'?'selected':''}>Tặng kèm</option></select>
      <input data-ap="${i}" type="number" value="${a.price||0}" ${a.type==='free'?'disabled':''} placeholder="giá">
      <button class="btn sm danger" data-axx="${i}" type="button">×</button>
    </div>`).join('') : '<div class="mini">Chưa có món kèm / extra.</div>';
    addonBox.querySelectorAll('[data-ak]').forEach(s=>s.onchange=()=>{const a=addons[+s.dataset.ak];a.kind=s.value;if(a.kind==='combo'&&!a.ref_item_id)a.ref_item_id=otherItems()[0]?.id;drawAddons();});
    addonBox.querySelectorAll('[data-ar]').forEach(s=>s.onchange=()=>{const a=addons[+s.dataset.ar];a.ref_item_id=s.value;const m=menu.items.find(x=>x.id===s.value);a.name=m?.name;});
    addonBox.querySelectorAll('[data-an]').forEach(inp=>inp.oninput=()=>addons[+inp.dataset.an].name=inp.value);
    addonBox.querySelectorAll('[data-at]').forEach(s=>s.onchange=()=>{const a=addons[+s.dataset.at];a.type=s.value;if(a.type==='free')a.price=0;drawAddons();});
    addonBox.querySelectorAll('[data-ap]').forEach(inp=>inp.oninput=()=>addons[+inp.dataset.ap].price=parseInt(inp.value)||0);
    addonBox.querySelectorAll('[data-axx]').forEach(b=>b.onclick=()=>{addons.splice(+b.dataset.axx,1);drawAddons();});
  }
  ov.querySelector('#addAddon').onclick=()=>{addons.push({kind:'combo',type:'paid',price:0,ref_item_id:otherItems()[0]?.id,name:otherItems()[0]?.name});drawAddons();};
  drawAddons();
  ov.querySelector('#cancel').onclick=()=>ov.remove();
  ov.querySelector('#save').onclick=async()=>{
    const mode=ov.querySelector('#schedMode').value;
    const schedule={mode,start:ov.querySelector('#start').value,end:ov.querySelector('#end').value,date:ov.querySelector('#date').value||null,days:[...ov.querySelectorAll('#days input:checked')].map(x=>+x.value)};
    const body={ name:ov.querySelector('#name').value.trim(), price:ov.querySelector('#price').value,
      emoji:ov.querySelector('#emoji').value.trim(), image:imgData, description:ov.querySelector('#desc').value.trim(),
      category_id:ov.querySelector('#cat').value, station:ov.querySelector('#station').value, sla_minutes:ov.querySelector('#sla').value,
      ingredients:ov.querySelector('#ingredients').value, allergens:ov.querySelector('#allergens').value, schedule,
      hidden:ov.querySelector('#hidden').checked, recipe:recipe.filter(r=>r.inventory_item_id && r.qty>0),
      addons:addons.filter(a=>a.kind==='combo'?a.ref_item_id:(a.name&&a.name.trim())) };
    if(!body.name) return toast('Nhập tên món',true);
    try{ if(isEdit) await api('/menu/'+item.id+'/update',{method:'POST',body}); else await api('/menu',{method:'POST',body});
      ov.remove(); toast(isEdit?'Đã lưu món':'Đã tạo món mới'); loadMenu();
    }catch(e){toast(e.message,true);}
  };
}

async function loadAudit(){
  const auditEl=document.getElementById('audit');
  if(!auditEl) return;
  const rows=await api('/audit');
  auditEl.innerHTML=rows.slice(0,18).map(r=>{
    const t=new Date(r.created_at).toLocaleTimeString('vi-VN');
    return `<div style="font-size:12px;padding:5px 2px;border-bottom:1px dashed var(--border);color:var(--muted)">
      <span style="font-family:var(--mono);color:var(--faint);margin-right:8px">${t}</span>
      <b style="color:var(--text)">${esc(r.action)}</b> · ${esc(typeof r.detail==='string'?r.detail:'')}</div>`;
  }).join('')||'<div class="empty">Chưa có hoạt động</div>';
}

async function loadAuditNatural(){
  const auditEl=document.getElementById('audit');
  if(!auditEl) return;
  const rows=await api('/audit');
  auditEl.innerHTML=rows.slice(0,18).map(r=>{
    const t=new Date(r.created_at).toLocaleTimeString('vi-VN');

// Nhật ký có thể trải nhiều ngày: hôm nay chỉ hiện giờ, ngày khác kèm ngày/tháng.
function auditTime(iso){
  const d=new Date(iso), n=new Date();
  const sameDay=d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();
  return sameDay
    ? d.toLocaleTimeString('vi-VN')
    : d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
}
function parseAuditDetail(r){
  if(!r.detail) return {};
  if(typeof r.detail==='object') return r.detail;
  try{return JSON.parse(r.detail);}catch{return {raw:String(r.detail)};}
}

// ---- Cloud Sync / Offline ----
async function loadSync(){ try{ renderSync(await api('/sync/status')); }catch{} }
function renderSync(s){
  const chip=document.getElementById('syncChip');
  if(!chip) return;
  chip.innerHTML = s.online
    ? `<span class="chip c-done">☁ Cloud Online</span>`
    : `<span class="chip c-late">⚠ Offline — queue ${s.pending}</span>`;
  document.getElementById('syncBody').innerHTML=`
    Trạng thái: <b style="color:${s.online?'var(--done)':'var(--late)'}">${s.online?'Đang đồng bộ cloud':'Mất internet — lưu local'}</b><br>
    Sự kiện chờ sync: <b>${s.pending}</b> · Sync gần nhất: ${new Date(s.lastSyncAt).toLocaleTimeString('vi-VN')}`;
  document.getElementById('toggleOffline').textContent = s.online ? '⚡ Ngắt internet (giả lập)' : '🔌 Khôi phục internet';
  document.getElementById('syncEvents').innerHTML = (s.recent||[]).slice(0,6).map(e=>
    `<div style="font-size:11px;color:var(--faint);padding:2px 0">⏳ ${esc(e.action)} <span style="color:var(--muted)">${esc(typeof e.detail==='string'?e.detail:'')}</span></div>`).join('');
}
let syncOffline=false;
const syncNowBtn=document.getElementById('syncNow');
if(syncNowBtn) syncNowBtn.onclick=async()=>{ try{ renderSync(await api('/sync/now',{method:'POST'})); toast('Đã sync lên cloud'); }catch(e){toast(e.message,true);} };
const toggleOfflineBtn=document.getElementById('toggleOffline');
if(toggleOfflineBtn) toggleOfflineBtn.onclick=async()=>{ try{ syncOffline=!syncOffline; renderSync(await api('/sync/offline',{method:'POST',body:{offline:syncOffline}})); toast(syncOffline?'Đã giả lập mất internet':'Đã khôi phục internet'); }catch(e){toast(e.message,true);} };

const AUDIT_PAGE=50;
let auditCursor=null; // mốc thời gian dòng cũ nhất đang hiển thị, dùng để "Xem thêm"
function auditRowHtml(r){
  const msg=auditMessage(r);
  return `<div class="auditrow">
    <div class="atime">${auditTime(r.created_at)}</div>
    <div>
      <div class="atext">${esc(msg.text)}${r.actor&&r.actor!=='system'?`<span class="actor">${esc(r.actor)}</span>`:''}</div>
      ${msg.meta?`<div class="ameta">${esc(msg.meta)}</div>`:''}
    </div>
  </div>`;
}
async function loadSettingsAudit(append=false){
  const el=document.getElementById('settingsAudit');
  if(!el) return;
  el.querySelector('#settingsAuditMore')?.remove();
  el.querySelector('#settingsAuditEnd')?.remove();
  if(!append){ auditCursor=null; el.innerHTML='<div class="empty">Đang tải...</div>'; }
  const qs=new URLSearchParams({limit:String(AUDIT_PAGE)});
  if(append&&auditCursor) qs.set('before',auditCursor);
  const rows=await api('/audit?'+qs).catch(()=>[]);
  const html=rows.map(auditRowHtml).join('');
  if(!append) el.innerHTML=html||'<div class="empty">Chưa có hoạt động</div>';
  else if(html) el.insertAdjacentHTML('beforeend',html);
  if(rows.length) auditCursor=rows[rows.length-1].created_at;
  if(rows.length>=AUDIT_PAGE){
    el.insertAdjacentHTML('beforeend','<button class="btn sm" id="settingsAuditMore" style="margin:12px auto;display:block">Xem thêm</button>');
    el.querySelector('#settingsAuditMore').onclick=()=>loadSettingsAudit(true);
  } else if(append||rows.length){
    el.insertAdjacentHTML('beforeend','<div class="empty" id="settingsAuditEnd" style="padding:10px">Đã hết — nhật ký chỉ lưu 7 ngày gần nhất.</div>');
  }
}

  function normalizeLabelTemplate(tpl,c=readCfg('labels')){
    const def=defaultLabelTemplate(c);
    const out={...def,...(tpl||{})};
    out.elements=Array.isArray(out.elements)?out.elements:[];
    if(!out.widthMm||!out.heightMm){ const [w,h]=labelPaperSize(out.paper||'50x30'); out.widthMm=w; out.heightMm=h; }
    out.elements=out.elements.map((el,i)=>({
      id:el.id||('lb_'+i+'_'+Math.random().toString(36).slice(2,6)),
      type:['text','barcode','qr','image','line'].includes(el.type)?el.type:'text',
      x:Math.max(0,Math.min(100,Number(el.x)||5)), y:Math.max(0,Math.min(100,Number(el.y)||5)),
      w:Math.max(2,Math.min(100,Number(el.w)||30)), h:Math.max(0,Math.min(100,Number(el.h)||12)),
      text:el.text??(el.type==='barcode'?'{barcode}':'Text'), fontSize:Number(el.fontSize)||7,
      bold:!!el.bold, align:el.align||'left', human:el.human!==false,
      src:el.src||'', originalSrc:el.originalSrc||el.src||'', bw:!!el.bw,
      imgMode:el.imgMode||(el.bw?'threshold':'color'), threshold:Number(el.threshold)||150, contrast:Number(el.contrast)||1,
    }));
    if(!out.elements.some(e=>e.id===out.selectedId)) out.selectedId=out.elements[0]?.id||null;
    return out;
  }

  async function fileToDataUrl(file){ return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=reject;r.readAsDataURL(file);}); }
  // mode: 'grayscale' (xám mượt) | 'threshold' (đen trắng 1-bit) | 'dither' (chấm điểm Floyd–Steinberg) | 'color'
  async function processImage(src,mode='grayscale',opt={}){
    return new Promise((resolve,reject)=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas'), ctx=c.getContext('2d');
        c.width=img.naturalWidth||img.width; c.height=img.naturalHeight||img.height;
        ctx.drawImage(img,0,0,c.width,c.height);
        if(mode==='color'){ resolve(c.toDataURL('image/png')); return; }
        const d=ctx.getImageData(0,0,c.width,c.height), p=d.data, w=c.width, h=c.height;
        const contrast=Number(opt.contrast)||1;
        const gray=new Float32Array(w*h);
        for(let i=0,j=0;i<p.length;i+=4,j++){
          let g=p[i]*.299+p[i+1]*.587+p[i+2]*.114;
          g=(g-128)*contrast+128;                       // tăng/giảm tương phản
          gray[j]=g<0?0:g>255?255:g;
        }
        if(mode==='grayscale'){
          for(let i=0,j=0;i<p.length;i+=4,j++){ const v=Math.round(gray[j]); p[i]=p[i+1]=p[i+2]=v; }
        } else if(mode==='threshold'){
          const t=Number(opt.threshold)||150;
          for(let i=0,j=0;i<p.length;i+=4,j++){ const v=gray[j]>=t?255:0; p[i]=p[i+1]=p[i+2]=v; }
        } else if(mode==='dither'){
          const t=Number(opt.threshold)||128;
          for(let y=0;y<h;y++) for(let x=0;x<w;x++){
            const idx=y*w+x, old=gray[idx], nv=old<t?0:255, err=old-nv; gray[idx]=nv;
            if(x+1<w) gray[idx+1]+=err*7/16;
            if(y+1<h){ if(x>0) gray[idx+w-1]+=err*3/16; gray[idx+w]+=err*5/16; if(x+1<w) gray[idx+w+1]+=err/16; }
          }
          for(let i=0,j=0;i<p.length;i+=4,j++){ const v=gray[j]<128?0:255; p[i]=p[i+1]=p[i+2]=v; }
        }
        ctx.putImageData(d,0,0); resolve(c.toDataURL('image/png'));
      };
      img.onerror=reject; img.src=src;
    });
  }

  function numOr(v,fallback,min,max){

    if(Number.isFinite(max)) n=Math.min(max,n);

  }

  function normalizePrintTemplate(tpl,kind,c){

    if(!tpl || tpl.kind!==def.kind) tpl=def;
    if(kind==='bill'){
      const legacyBcm=tpl.standard==='bcm_fiscal_receipt' && (Number(tpl.version||0)<3 || Number(tpl.heightMm||0)>260 || (tpl.elements||[]).some(el=>String(el.text||'').includes('HOA DON BAN HANG')));

    }
    const out={...def,...tpl};
    out.widthMm=numOr(out.widthMm,def.widthMm,kind==='bill'?40:20,kind==='bill'?90:120);
    out.heightMm=numOr(out.heightMm,def.heightMm,kind==='bill'?120:15,kind==='bill'?260:80);

    out.elements=out.elements.map((el,i)=>({
      id:el.id||('pt_'+i+'_'+Math.random().toString(36).slice(2,6)),
      type:['text','image','line','qr'].includes(el.type)?el.type:'text',
      x:Math.max(0,Math.min(100,Number(el.x)||5)), y:Math.max(0,Math.min(100,Number(el.y)||5)),
      w:Math.max(2,Math.min(100,Number(el.w)||30)), h:Math.max(0,Math.min(100,Number(el.h)||12)),
      text:el.text??'Text', fontSize:Number(el.fontSize)||6,

  function ensureInteract(){
    if(window.interact) return Promise.resolve(window.interact);

    // Ưu tiên bản đóng gói cục bộ (chạy được cả khi máy offline); nếu thiếu mới tải từ CDN.
    const sources=['/vendor/interact.min.js','https://cdn.jsdelivr.net/npm/interactjs@1.10.27/dist/interact.min.js'];

      const tryLoad=i=>{
        if(i>=sources.length) return reject(new Error('Không tải được interact.js'));

        s.src=sources[i];
        s.onload=()=>window.interact?resolve(window.interact):tryLoad(i+1);

      };

    });

  }

  function collectIntegrations(){
    const channels=JSON.parse(JSON.stringify(integrationsCfg?.channels||{}));
    integrationDefs.forEach(def=>{
      const inputs=[...ov.querySelectorAll(`[data-integ="${def.key}"]`)];
      if(!inputs.length){
        channels[def.key]=channels[def.key]||{};
        if(def.type!=='misa') channels[def.key].channel=def.channel;
        return;
      }
      const row={...(channels[def.key]||{})};
      inputs.forEach(el=>{
        const field=el.dataset.field;
        if(!field) return;
        row[field]=el.type==='checkbox'?el.checked:(el.value||'').trim();
      });
      if(def.type!=='misa') row.channel=def.channel;
      channels[def.key]=row;
    });
    return { version:1, channels };
  }
  function integrationMissing(def,c){
    if(!c.enabled) return `${def.name} đang tắt, bật kết nối trước khi kiểm tra.`;
    if(def.type==='misa'){
      const miss=['apiBase','taxCode','companyName'].filter(k=>!String(c[k]||'').trim());
      return miss.length?`MISA còn thiếu: ${miss.join(', ')}.`:'';
    }
    if(def.type==='website') return '';
    if(def.type==='payos'){
      const miss=['clientId','apiKey','checksumKey'].filter(k=>!String(c[k]||'').trim());
      return miss.length?`payOS còn thiếu: ${miss.join(', ')}.`:'';
    }
    const miss=['merchantId','storeId','clientId'].filter(k=>!String(c[k]||'').trim());
    return miss.length?`${def.name} còn thiếu: ${miss.join(', ')}.`:'';
  }

      const h={id:makeId('hs_'),page:bookPageIdx,x:50,y:50,angle:0,menu_item_id:first.id,label:first.name,enabled:true};
      book.hotspots.push(h); bookHotspotId=h.id; draw();
    };
    q('#bmDeleteHotspot').onclick=()=>{
      if(!bookHotspotId) return;
      if(!confirm('Xóa chấm tương tác này?')) return;
      book.hotspots=book.hotspots.filter(h=>h.id!==bookHotspotId);
      bookHotspotId=null; saveBookMenuSettings();
    };
    q('#bmSaveHotspot').onclick=()=>{
      const itemId=q('#bmHsItem').value;
      if(!itemId) return toast('Chọn món cho chấm tương tác',true);
      let h=selectedHotspot(book);
      if(!h){ h={id:makeId('hs_'),page:bookPageIdx}; book.hotspots.push(h); bookHotspotId=h.id; }
      h.page=bookPageIdx;
      h.menu_item_id=itemId;
      h.label=q('#bmHsLabel').value.trim()||menuItemName(itemId);
      h.x=clamp(q('#bmHsX').value,0,100);
      h.y=clamp(q('#bmHsY').value,0,100);
      h.angle=clamp(q('#bmHsAngle').value,-180,180);
      h.enabled=q('#bmHsEnabled').checked;
      saveBookMenuSettings();
    };
  }
  function bindMenuTab(){
    const tabManageCats = ov.querySelector('#tabManageCats');
    const tabAddItem = ov.querySelector('#tabAddItem');
    if (tabManageCats) tabManageCats.onclick = openCategoryManager;
    if (tabAddItem) tabAddItem.onclick = () => { if(!menu.categories?.length) return toast('Hãy tạo danh mục trước (🗂️ Danh mục)',true); openItemForm(null); };
    loadMenu();
  }

  async function bindTablesTab(){
    const container = ov.querySelector('#settingsTablesContainer');
    if (!container) return;
    
    let tables = [];
    try {
      tables = await api('/tables');
    } catch (e) {
      container.innerHTML = `<div class="empty" style="color:var(--late)">${esc(e.message)}</div>`;
      return;
    }

    container.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start">
        <div>
          <div class="panel" style="margin:0">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
              <h3 style="margin:0">Layout Sơ Đồ Bàn</h3>
              <span class="badge role" id="tableCountBadge" style="margin-left:auto;background:var(--brand-dim);color:var(--brand);padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700">${tables.length} bàn</span>
            </div>
            <div id="settingsFloor"></div>
          </div>
        </div>
        
        <div style="display:flex;flex-direction:column;gap:16px">
          <div class="panel" style="margin:0">
            <h3 id="formTitle">Thêm bàn mới</h3>
            <form id="tableForm" style="display:flex;flex-direction:column;gap:8px">
              <input type="hidden" id="editTableId" value="">
              <div style="display:flex;flex-direction:column;gap:4px">
                <label style="font-size:12px;font-weight:700">Khu vực / Zone</label>
                <select id="tableZoneSelect" required style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px"></select>
                <input type="text" id="tableZoneNew" placeholder="Nhập tên khu vực mới (VD: Lầu 1)" style="display:none;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px;margin-top:6px">
              </div>
              
              <div style="display:flex;flex-direction:column;gap:4px">
                <label style="font-size:12px;font-weight:700">Mã số bàn</label>
                <input type="text" id="tableCode" placeholder="A01" required autocomplete="off" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px">
              </div>
              
              <div style="display:flex;flex-direction:column;gap:4px">
                <label style="font-size:12px;font-weight:700">Số lượng ghế</label>
                <input type="number" id="tableSeats" min="1" max="50" value="4" required style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px">
              </div>
              
              <div style="display:flex;gap:8px;margin-top:10px">
                <button type="submit" class="btn primary" id="saveTableBtn" style="flex:1">Thêm bàn</button>
                <button type="button" class="btn" id="cancelEditTableBtn" style="display:none">Hủy sửa</button>
              </div>
            </form>
          </div>

          <div class="panel" style="margin:0">
            <h3>Tạo bàn hàng loạt</h3>
            <form id="bulkTableForm" style="display:flex;flex-direction:column;gap:8px">
              <div style="display:flex;flex-direction:column;gap:4px">
                <label style="font-size:12px;font-weight:700">Khu vực / Zone</label>
                <select id="bulkZoneSelect" required style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px"></select>
                <input type="text" id="bulkZoneNew" placeholder="Nhập tên khu vực mới (VD: Lầu 1)" style="display:none;width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px;margin-top:6px">
              </div>
              
              <div style="display:flex;flex-direction:column;gap:4px">
                <label style="font-size:12px;font-weight:700">Mã bắt đầu (Tiền tố)</label>
                <input type="text" id="bulkPrefix" placeholder="B" required autocomplete="off" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px">
              </div>
              
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                <div style="display:flex;flex-direction:column;gap:4px">
                  <label style="font-size:12px;font-weight:700">Bắt đầu từ số</label>
                  <input type="number" id="bulkStart" min="1" value="1" required style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px">
                </div>
                <div style="display:flex;flex-direction:column;gap:4px">
                  <label style="font-size:12px;font-weight:700">Số lượng bàn</label>
                  <input type="number" id="bulkCount" min="1" max="100" value="6" required style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px">
                </div>
              </div>

              <div style="display:flex;flex-direction:column;gap:4px">
                <label style="font-size:12px;font-weight:700">Số ghế mỗi bàn</label>
                <input type="number" id="bulkSeats" min="1" max="50" value="4" required style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px">
              </div>
              
              <label style="display:flex;align-items:center;gap:8px;margin:6px 0;font-size:11.5px;color:var(--muted);cursor:pointer;font-weight:normal;letter-spacing:0;text-transform:none">
                <input type="checkbox" id="bulkZeroPadding" checked style="width:auto"> Thêm số 0 phía trước (ví dụ B01 thay vì B1)
              </label>

              <button type="submit" class="btn primary" style="margin-top:4px">Tạo tự động</button>
            </form>
          </div>
        </div>
      </div>
    `;

    const floor = container.querySelector('#settingsFloor');
    const tableZoneSelect = container.querySelector('#tableZoneSelect');
    const tableZoneNew = container.querySelector('#tableZoneNew');
    const bulkZoneSelect = container.querySelector('#bulkZoneSelect');
    const bulkZoneNew = container.querySelector('#bulkZoneNew');

    // Handle show/hide new zone text inputs
    tableZoneSelect.onchange = () => {
      if (tableZoneSelect.value === '__new__') {
        tableZoneNew.style.display = 'block';
        tableZoneNew.required = true;
        tableZoneNew.focus();
      } else {
        tableZoneNew.style.display = 'none';
        tableZoneNew.required = false;
        tableZoneNew.value = '';
      }
    };

    bulkZoneSelect.onchange = () => {
      if (bulkZoneSelect.value === '__new__') {
        bulkZoneNew.style.display = 'block';
        bulkZoneNew.required = true;
        bulkZoneNew.focus();
      } else {
        bulkZoneNew.style.display = 'none';
        bulkZoneNew.required = false;
        bulkZoneNew.value = '';
      }
    };

    function drawSettingsFloor() {
      const activeZones = [...new Set(tables.map(t => t.zone))];
      
      // Keep track of current selection before rebuilding select options
      const prevSingleSel = tableZoneSelect.value;
      const prevBulkSel = bulkZoneSelect.value;

      const selectOpts = `
        <option value="">-- Chọn khu vực --</option>
        ${activeZones.map(z => `<option value="${esc(z)}">${esc(z)}</option>`).join('')}
        <option value="__new__">+ Thêm khu vực mới...</option>
      `;

      tableZoneSelect.innerHTML = selectOpts;
      bulkZoneSelect.innerHTML = selectOpts;

      // Restore values
      if (activeZones.includes(prevSingleSel) || prevSingleSel === '__new__') tableZoneSelect.value = prevSingleSel;
      if (activeZones.includes(prevBulkSel) || prevBulkSel === '__new__') bulkZoneSelect.value = prevBulkSel;

      if (!tables.length) {
        floor.innerHTML = `<div class="empty">Chưa có bàn nào được cấu hình. Sử dụng các form bên phải để tạo bàn.</div>`;
        return;
      }

      floor.innerHTML = activeZones.map(z => {
        const zoneTables = tables.filter(t => t.zone === z);
        return `
          <div class="zone">${esc(z)}</div>
          <div class="tablegrid">
            ${zoneTables.map(t => `
              <div class="tcard" data-id="${t.id}">
                <b style="font-size:14.5px;color:var(--text);margin-top:2px">${esc(t.code)}</b>
                <span style="font-size:10.5px;color:var(--muted)">👤 ${t.seats} ghế</span>
                <div style="display:flex;gap:4px;margin-top:6px;width:100%">
                  <button class="btn sm" data-edit-tbl="${t.id}" style="flex:1;padding:2px 0;font-size:10.5px;min-height:22px">Sửa</button>
                  <button class="btn sm danger" data-del-tbl="${t.id}" style="flex:1;padding:2px 0;font-size:10.5px;min-height:22px">Xóa</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }).join('');

      // Bind edit events
      floor.querySelectorAll('[data-edit-tbl]').forEach(btn => {
        btn.onclick = () => {
          const id = btn.dataset.editTbl;
          const t = tables.find(x => x.id === id);
          if (!t) return;
          
          container.querySelector('#editTableId').value = t.id;
          
          if (activeZones.includes(t.zone)) {
            tableZoneSelect.value = t.zone;
            tableZoneNew.style.display = 'none';
            tableZoneNew.required = false;
            tableZoneNew.value = '';
          } else {
            tableZoneSelect.value = '__new__';
            tableZoneNew.style.display = 'block';
            tableZoneNew.required = true;
            tableZoneNew.value = t.zone;
          }

          container.querySelector('#tableCode').value = t.code;
          container.querySelector('#tableSeats').value = t.seats;
          
          container.querySelector('#formTitle').textContent = 'Sửa thông tin bàn';
          container.querySelector('#saveTableBtn').textContent = 'Lưu thay đổi';
          container.querySelector('#cancelEditTableBtn').style.display = 'inline-block';
          container.querySelector('#tableCode').focus();
        };
      });

      // Bind delete events
      floor.querySelectorAll('[data-del-tbl]').forEach(btn => {
        btn.onclick = async () => {
          const id = btn.dataset.delTbl;
          const t = tables.find(x => x.id === id);
          if (!t) return;
          
          if (!confirm(`Bạn có chắc chắn muốn xóa bàn "${t.code}"?`)) return;
          
          try {
            await api(`/settings/tables/${id}/delete`, { method: 'POST' });
            toast(`Đã xóa bàn ${t.code}`);
            tables = tables.filter(x => x.id !== id);
            drawSettingsFloor();
            container.querySelector('#tableCountBadge').textContent = `${tables.length} bàn`;
          } catch (e) {
            toast(e.message, true);
          }
        };
      });
    }

    // Draw initial
    drawSettingsFloor();

    const cancelBtn = container.querySelector('#cancelEditTableBtn');
    const editIdInput = container.querySelector('#editTableId');
    const codeInput = container.querySelector('#tableCode');
    const seatsInput = container.querySelector('#tableSeats');
    const saveBtn = container.querySelector('#saveTableBtn');
    const formTitle = container.querySelector('#formTitle');

    function resetForm() {
      editIdInput.value = '';
      tableZoneSelect.value = '';
      tableZoneNew.value = '';
      tableZoneNew.style.display = 'none';
      tableZoneNew.required = false;
      codeInput.value = '';
      seatsInput.value = '4';
      formTitle.textContent = 'Thêm bàn mới';
      saveBtn.textContent = 'Thêm bàn';
      cancelBtn.style.display = 'none';
    }

    cancelBtn.onclick = resetForm;

    // Form submit (Add/Edit)
    container.querySelector('#tableForm').onsubmit = async (e) => {
      e.preventDefault();
      const id = editIdInput.value;
      const zoneSel = tableZoneSelect.value;
      const zoneVal = (zoneSel === '__new__' ? tableZoneNew.value : zoneSel).trim();

      if (!zoneVal) {
        toast('Vui lòng chọn hoặc nhập tên khu vực mới', true);
        return;
      }

      const body = {
        zone: zoneVal,
        code: codeInput.value.trim(),
        seats: parseInt(seatsInput.value) || 4
      };

      try {
        if (id) {
          const updated = await api(`/settings/tables/${id}/update`, { method: 'POST', body });
          toast('Đã cập nhật bàn thành công');
          tables = tables.map(x => x.id === id ? updated : x);
        } else {
          const created = await api('/settings/tables', { method: 'POST', body });
          toast('Đã thêm bàn mới thành công');
          tables.push(created);
        }
        tables.sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));
        resetForm();
        drawSettingsFloor();
        container.querySelector('#tableCountBadge').textContent = `${tables.length} bàn`;
      } catch (e) {
        toast(e.message, true);
      }
    };

    // Bulk creation form submit
    container.querySelector('#bulkTableForm').onsubmit = async (e) => {
      e.preventDefault();
      const zoneSel = bulkZoneSelect.value;
      const zoneVal = (zoneSel === '__new__' ? bulkZoneNew.value : zoneSel).trim();

      if (!zoneVal) {
        toast('Vui lòng chọn hoặc nhập tên khu vực mới', true);
        return;
      }

      const prefix = container.querySelector('#bulkPrefix').value.trim();
      const start = parseInt(container.querySelector('#bulkStart').value) || 1;
      const count = parseInt(container.querySelector('#bulkCount').value) || 1;
      const seats = parseInt(container.querySelector('#bulkSeats').value) || 4;
      const pad = container.querySelector('#bulkZeroPadding').checked;

      if (count > 100) {
        toast('Số lượng tạo hàng loạt tối đa là 100 bàn', true);
        return;
      }

      let createdCount = 0;
      let errors = [];

      const promises = [];
      for (let i = 0; i < count; i++) {
        const num = start + i;
        const codeSuffix = pad ? String(num).padStart(2, '0') : String(num);
        const code = prefix + codeSuffix;
        
        promises.push((async () => {
          try {
            const created = await api('/settings/tables', {
              method: 'POST',
              body: { zone: zoneVal, code, seats }
            });
            tables.push(created);
            createdCount++;
          } catch (err) {
            errors.push(`${code}: ${err.message}`);
          }
        })());
      }

      try {
        await Promise.all(promises);
        if (createdCount > 0) {
          toast(`Đã tạo thành công ${createdCount} bàn`);
          tables.sort((a, b) => a.code.localeCompare(b.code, undefined, { numeric: true }));
          drawSettingsFloor();
          container.querySelector('#tableCountBadge').textContent = `${tables.length} bàn`;
          
          // Reset form fields
          bulkZoneSelect.value = '';
          bulkZoneNew.value = '';
          bulkZoneNew.style.display = 'none';
          bulkZoneNew.required = false;
          container.querySelector('#bulkPrefix').value = '';
          container.querySelector('#bulkStart').value = '1';
          container.querySelector('#bulkCount').value = '6';
          container.querySelector('#bulkSeats').value = '4';
        }
        if (errors.length > 0) {
          toast(`Gặp lỗi tại ${errors.length} bàn: ${errors.slice(0, 3).join(', ')}`, true);
        }
      } catch (err) {
        toast(err.message, true);
      }
    };
  }
  function collectPrinterRows(){
    return [...ov.querySelectorAll('[data-print-row]')].map((row,idx)=>({
      id:(row.querySelector('[data-pr-id]').value||`printer_${idx+1}`).trim(),
      name:(row.querySelector('[data-pr-name]').value||`Máy in ${idx+1}`).trim(),
      type:row.querySelector('[data-pr-type]').value,
      active:row.querySelector('[data-pr-active]').checked,
      auto:row.querySelector('[data-pr-auto]').checked,
    }));
  }
  function savePrinterRows(rows=collectPrinterRows()){
    printCfg=normalizePrintCfg(printCfg);
    printCfg.printers=rows;
  }
  function bindPrinters(){
    loadSettingsPrintJobs();
    ov.querySelector('#savePrinterRows').onclick=async()=>{try{savePrinterRows();await savePrintCfg(false);toast('Đã lưu danh mục in');draw();}catch(e){toast(e.message,true);}};
    ov.querySelector('#addPrinterRow').onclick=()=>{
      const rows=collectPrinterRows();
      rows.push({id:`printer_${rows.length+1}`,name:'Máy in mới',type:'Hóa đơn',active:true,auto:false});
      savePrinterRows(rows); draw();
    };
    ov.querySelectorAll('[data-del-printer]').forEach(b=>b.onclick=()=>{
      const idx=Number(b.dataset.delPrinter);
      const rows=collectPrinterRows().filter((_,i)=>i!==idx);
      savePrinterRows(rows); draw();
    });
  }
  load();
}

startClock(); loadDash(); loadMenu();
setInterval(loadDash, 15000);
setInterval(()=>{ if(document.getElementById('settingsSyncChip')) loadSettingsSync(); }, 7000);
</script>
</body></html>
