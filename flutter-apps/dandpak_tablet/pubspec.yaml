name: dandpak_tablet
description: "Dan D Pak Tablet App — Unified Waiter Ordering, KDS, and Inventory Module."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  dandpak_core:
    path: ../dandpak_core
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  # iPad Self-order: bê nguyên màn khách tự gọi món /ipad (web đã chạy ổn
  # định qua fleet-sim) vào tablet — không viết lại UI mới.
  webview_flutter: ^4.9.0

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/DanOnLogo.png
